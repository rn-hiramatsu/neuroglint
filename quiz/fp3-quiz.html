const categories = [...new Set(allQuestions.map(q => q.category))].sort();

let questions = [];
let currentIndex = 0;
let selectedAnswers = [];
let showResult = false;
let score = 0;
let quizComplete = false;
let quizMode = 'menu';
let questionCount = 10;
let wrongAnswers = [];
let selectedCategory = 'all';
let selectedSubcategory = 'all';

function shuffleArray(array) {
  const shuffled = [...array];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function startQuiz(count, category, subcategory) {
  category = category || 'all';
  subcategory = subcategory || 'all';
  questionCount = count;
  selectedCategory = category;
  selectedSubcategory = subcategory;
  
  let pool = allQuestions;
  if (category !== 'all') pool = pool.filter(q => q.category === category);
  if (subcategory !== 'all') pool = pool.filter(q => q.subcategory === subcategory);
  
  if (count === 0) {
    questions = shuffleArray(pool);
    questionCount = questions.length;
  } else {
    questions = shuffleArray(pool).slice(0, Math.min(count, pool.length));
    questionCount = questions.length;
  }
  
  currentIndex = 0;
  selectedAnswers = [];
  showResult = false;
  score = 0;
  quizComplete = false;
  quizMode = 'quiz';
  wrongAnswers = [];
  render();
}

function backToMenu() {
  quizMode = 'menu';
  selectedCategory = 'all';
  selectedSubcategory = 'all';
  render();
}

function showCategorySelect() { quizMode = 'category'; render(); }

function showSubcategorySelect(category) {
  selectedCategory = category;
  quizMode = 'subcategory';
  render();
}

function getOptionLetter(option) { return option.charAt(0); }

function isCorrectAnswer(optionLetter) { return questions[currentIndex].answer === optionLetter; }

function handleAnswerSelect(optionLetter) {
  if (showResult) return;
  selectedAnswers = [optionLetter];
  render();
}

function checkAnswer() {
  if (selectedAnswers.length === 0) return;
  const q = questions[currentIndex];
  if (q.answer === selectedAnswers[0]) {
    score++;
  } else {
    wrongAnswers.push({question: q, userAnswers: [...selectedAnswers], correctAnswers: [q.answer]});
  }
  showResult = true;
  render();
}

function nextQuestion() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    selectedAnswers = [];
    showResult = false;
  } else {
    quizComplete = true;
  }
  render();
}

function getOptionStyle(optionLetter) {
  const isSelected = selectedAnswers.includes(optionLetter);
  if (!showResult) {
    return isSelected ? 'background:#dbeafe;border:2px solid #3b82f6;' : 'background:white;border:1px solid #d1d5db;';
  }
  if (isCorrectAnswer(optionLetter)) return 'background:#dcfce7;border:2px solid #22c55e;';
  if (isSelected && !isCorrectAnswer(optionLetter)) return 'background:#fee2e2;border:2px solid #ef4444;';
  return 'background:#f3f4f6;border:1px solid #d1d5db;';
}

function getCategoryCount(cat) { return allQuestions.filter(q => q.category === cat).length; }

function getSubcategoriesForCategory(cat) {
  return [...new Set(allQuestions.filter(q => q.category === cat).map(q => q.subcategory))];
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    '金融資産運用': 'bg-purple-100 text-purple-800 hover:bg-purple-200',
    'タックスプランニング': 'bg-green-100 text-green-800 hover:bg-green-200',
    '不動産': 'bg-orange-100 text-orange-800 hover:bg-orange-200',
    '相続・事業承継': 'bg-pink-100 text-pink-800 hover:bg-pink-200',
  };
  return '<div class="max-w-2xl mx-auto"><div class="bg-white rounded-xl shadow-lg p-8">' +
    '<h1 class="text-xl font-bold text-center mb-6">📁 分野別に挑戦</h1>' +
    '<div class="space-y-3">' +
    categories.map(function(cat) {
      var c = colors[cat] || 'bg-gray-100 text-gray-800 hover:bg-gray-200';
      return '<div class="space-y-1">' +
        '<button onclick="startQuiz(0, \'' + cat + '\')" class="w-full ' + c + ' py-3 px-6 rounded-xl font-medium transition cursor-pointer text-left">' +
        '<span class="font-semibold">' + cat + '</span><span class="float-right">' + getCategoryCount(cat) + '問</span></button>' +
        '<button onclick="showSubcategorySelect(\'' + cat + '\')" class="w-full text-xs text-gray-500 hover:text-blue-600 py-1 px-6 transition cursor-pointer text-left">→ 小分野で絞り込む</button></div>';
    }).join('') +
    '</div>' +
    '<div class="mt-6"><button onclick="backToMenu()" class="w-full bg-gray-600 text-white py-3 px-6 rounded-xl font-semibold hover:bg-gray-700 transition cursor-pointer">← メニューに戻る</button></div>' +
    '</div></div>';
}

function renderSubcategorySelect() {
  var subcats = getSubcategoriesForCategory(selectedCategory);
  return '<div class="max-w-2xl mx-auto"><div class="bg-white rounded-xl shadow-lg p-8">' +
    '<h1 class="text-xl font-bold text-center mb-2">📁 ' + selectedCategory + '</h1>' +
    '<p class="text-gray-500 text-center mb-6 text-sm">小分野を選択</p>' +
    '<div class="space-y-3">' +
    subcats.map(function(sub) {
      var cnt = allQuestions.filter(function(q) { return q.subcategory === sub; }).length;
      return '<button onclick="startQuiz(0, \'' + selectedCategory + '\', \'' + sub + '\')" class="w-full bg-gray-50 text-gray-800 hover:bg-gray-100 py-3 px-6 rounded-xl font-medium transition cursor-pointer text-left border">' +
        '<span class="font-semibold">' + sub + '</span><span class="float-right text-gray-500">' + cnt + '問</span></button>';
    }).join('') +
    '</div>' +
    '<div class="mt-6 space-y-2">' +
    '<button onclick="showCategorySelect()" class="w-full bg-gray-200 text-gray-700 py-3 px-6 rounded-xl font-semibold hover:bg-gray-300 transition cursor-pointer">← 大分野に戻る</button>' +
    '<button onclick="backToMenu()" class="w-full bg-gray-600 text-white py-3 px-6 rounded-xl font-semibold hover:bg-gray-700 transition cursor-pointer">← メニューに戻る</button>' +
    '</div></div></div>';
}

function renderResult() {
  var pct = Math.round((score / questions.length) * 100);
  var rc = pct >= 60 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';
  var bg = pct >= 60 ? '#dcfce7' : pct >= 40 ? '#fef3c7' : '#fee2e2';
  var tc = pct >= 60 ? '#166534' : pct >= 40 ? '#92400e' : '#991b1b';
  var msg = pct >= 60 ? '🎉 素晴らしい！合格ラインです。' : pct >= 40 ? '📚 もう少しです。復習して再挑戦しましょう。' : '💪 基礎からしっかり復習しましょう。';
  var catLabel = selectedCategory === 'all' ? '' : selectedSubcategory !== 'all' ? ' (' + selectedSubcategory + ')' : ' (' + selectedCategory + ')';
  
  var wrongHtml = wrongAnswers.length > 0 ? (
    '<div class="mt-6 border-t pt-6">' +
    '<h3 class="font-bold text-lg mb-4 text-red-600">❌ 間違えた問題 (' + wrongAnswers.length + '問)</h3>' +
    '<div class="space-y-4 max-h-[32rem] overflow-y-auto pr-2">' +
    wrongAnswers.map(function(item) {
      return '<div class="p-5 bg-white rounded-xl border border-red-200 shadow-sm">' +
        '<div class="flex items-center gap-2 mb-2">' +
        '<span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded">' + escapeHtml(item.question.category) + '</span>' +
        '<span class="text-xs bg-gray-50 text-gray-500 px-2 py-1 rounded">' + escapeHtml(item.question.subcategory) + '</span>' +
        '<span class="text-xs text-yellow-600">' + item.question.difficulty + '</span></div>' +
        '<p class="font-medium mb-3 text-gray-800 leading-relaxed question-text">' + escapeHtml(item.question.question) + '</p>' +
        '<div class="flex gap-4 text-sm mb-3">' +
        '<p class="text-red-600">❌ あなた: <span class="font-medium">' + item.userAnswers.join(', ') + '</span></p>' +
        '<p class="text-green-600">✅ 正解: <span class="font-medium">' + item.correctAnswers.join(', ') + '</span></p></div>' +
        '<details class="group"><summary class="text-blue-600 text-sm cursor-pointer hover:text-blue-700 font-medium">📖 解説を見る</summary>' +
        '<div class="mt-3 p-3 bg-blue-50 rounded-lg"><p class="explanation-text text-sm">' + escapeHtml(item.question.explanation) + '</p></div></details></div>';
    }).join('') +
    '</div></div>'
  ) : '';
  
  return '<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-8">' +
    '<h1 class="text-2xl font-bold text-center mb-6">🎯 試験結果' + escapeHtml(catLabel) + '</h1>' +
    '<div class="text-center mb-8">' +
    '<div class="text-6xl font-bold mb-2" style="color:' + rc + '">' + score + ' / ' + questions.length + '</div>' +
    '<div class="text-2xl text-gray-600">正解率: ' + pct + '%</div></div>' +
    '<div class="mb-6 p-4 rounded-lg" style="background:' + bg + '"><p class="text-center font-medium" style="color:' + tc + '">' + msg + '</p></div>' +
    '<div class="space-y-3">' +
    '<button onclick="startQuiz(' + (questionCount === questions.length ? 0 : questionCount) + ', \'' + selectedCategory + '\', \'' + selectedSubcategory + '\')" class="w-full bg-blue-600 text-white py-3 px-6 rounded-xl font-semibold hover:bg-blue-700 transition cursor-pointer shadow-md">🔄 同じ設定でもう一度</button>' +
    '<button onclick="backToMenu()" class="w-full bg-gray-600 text-white py-3 px-6 rounded-xl font-semibold hover:bg-gray-700 transition cursor-pointer shadow-md">📋 メニューに戻る</button></div>' +
    wrongHtml + '</div>';
}

function renderQuiz() {
  var q = questions[currentIndex];
  var isOX = q.questionType === 'ox';
  
  var optionsHtml = q.options.map(function(option) {
    var letter = getOptionLetter(option);
    var style = getOptionStyle(letter);
    var cursor = showResult ? 'cursor-default' : 'cursor-pointer hover:shadow-md';
    var content = option.substring(3);
    return '<button onclick="handleAnswerSelect(\'' + letter + '\')" class="w-full text-left p-4 rounded-xl transition ' + cursor + '" style="' + style + '"' + (showResult ? ' disabled' : '') + '>' +
      '<div class="flex items-start gap-3">' +
      '<span class="flex-shrink-0 w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-600">' + letter + '</span>' +
      '<span class="option-text pt-1">' + escapeHtml(content) + '</span></div></button>';
  }).join('');
  
  var explanationHtml = showResult ? (
    '<div class="mt-6 p-5 bg-gradient-to-br from-blue-50 to-indigo-50 rounded-xl border border-blue-200">' +
    '<p class="font-bold text-blue-800 mb-3 flex items-center gap-2"><span class="text-xl">📖</span> 解説</p>' +
    '<div class="explanation-text text-gray-700">' + escapeHtml(q.explanation) + '</div></div>'
  ) : '';
  
  var buttonHtml = !showResult 
    ? '<button onclick="checkAnswer()" class="flex-1 py-4 px-6 rounded-xl font-semibold transition cursor-pointer shadow-md ' + (selectedAnswers.length === 0 ? 'bg-gray-300 cursor-not-allowed text-gray-500' : 'bg-blue-600 hover:bg-blue-700 text-white hover:shadow-lg') + '"' + (selectedAnswers.length === 0 ? ' disabled' : '') + '>✅ 回答する</button>'
    : '<button onclick="nextQuestion()" class="flex-1 bg-green-600 text-white py-4 px-6 rounded-xl font-semibold hover:bg-green-700 transition cursor-pointer shadow-md hover:shadow-lg">' + (currentIndex < questions.length - 1 ? '➡️ 次の問題へ' : '📊 結果を見る') + '</button>';
  
  return '<div class="max-w-2xl mx-auto">' +
    '<div class="bg-white rounded-xl shadow-md p-4 mb-4">' +
    '<div class="flex justify-between items-center mb-2">' +
    '<span class="text-sm font-medium text-gray-600">📝 問題 ' + (currentIndex + 1) + ' / ' + questions.length + '</span>' +
    '<span class="text-sm font-medium text-blue-600">🏆 スコア: ' + score + '</span></div>' +
    '<div class="bg-gray-200 rounded-full h-2.5">' +
    '<div class="bg-gradient-to-r from-blue-500 to-blue-600 h-2.5 rounded-full transition-all duration-300" style="width:' + ((currentIndex + 1) / questions.length * 100) + '%"></div></div></div>' +
    '<div class="bg-white rounded-xl shadow-lg p-6">' +
    '<div class="mb-4 flex flex-wrap gap-2">' +
    '<span class="inline-block bg-gray-100 text-gray-700 text-xs px-3 py-1.5 rounded-full font-medium">📁 ' + escapeHtml(q.category) + '</span>' +
    '<span class="inline-block bg-gray-50 text-gray-500 text-xs px-3 py-1.5 rounded-full font-medium">' + escapeHtml(q.subcategory) + '</span>' +
    '<span class="inline-block bg-yellow-50 text-yellow-700 text-xs px-3 py-1.5 rounded-full font-medium">' + q.difficulty + '</span>' +
    (isOX ? '<span class="inline-block bg-indigo-100 text-indigo-800 text-xs px-3 py-1.5 rounded-full font-medium">○×問題</span>' : '<span class="inline-block bg-emerald-100 text-emerald-800 text-xs px-3 py-1.5 rounded-full font-medium">三択問題</span>') +
    '</div>' +
    '<h2 class="text-lg font-semibold mb-6 text-gray-800 question-text">' + escapeHtml(q.question) + '</h2>' +
    '<div class="space-y-3">' + optionsHtml + '</div>' +
    explanationHtml +
    '<div class="mt-6 flex gap-3">' + buttonHtml + '</div></div>' +
    '<div class="text-center mt-4">' +
    '<button onclick="backToMenu()" class="text-gray-500 hover:text-blue-600 text-sm transition">← メニューに戻る</button></div></div>';
}

function render() {
  var app = document.getElementById('app');
  if (quizMode === 'menu') app.innerHTML = renderMenu();
  else if (quizMode === 'category') app.innerHTML = renderCategorySelect();
  else if (quizMode === 'subcategory') app.innerHTML = renderSubcategorySelect();
  else if (quizComplete) app.innerHTML = renderResult();
  else app.innerHTML = renderQuiz();
  window.scrollTo(0, 0);
}

render();
  </script>
</body>
</html>
