const ALL_Q = [{"id": 1, "dom": 2, "cat": "ビジュアライゼーション", "q": "利益と割引を経時的に示す次のグラフがあります。次のグラフに示すように、線を結合する必要があります。何をすべきですか?", "opts": ["A. [割引]をマークカードの[色]にドラッグします", "B. [割引]を不連続に変換します", "C. [割引]を二重軸に設定します", "D. [割引]を[列]シェルフにドラッグします"], "ans": ["C"], "exp": "A. [割引]をマークカードの[色]にドラッグします - これを行うと、通常、1つのメジャー(この場合は利益)の線が、割引の値に基づいて色分けされます。2つの異なるメジャー(利益と割引)を個別の線として同じグラフにプロットするわけではありません。\nB. [割引]を不連続に変換します - メジャーを不連続(青色のピル)に変換すると、グラフの軸がカテゴリカルになります。これにより、通常は線グラフではなく、個別の値を持つヘッダーが作成され、目的の結合された線グラフにはなりません。\nC. [割引]を二重軸に設定します - 正解です。二重軸を使用すると、2つの異なるメジャー(利益と割引など)を同じグラフ領域にプロットできます。それぞれが独自のY軸(左側と右側)を持つため、スケールが異なるメジャーを経時的に比較するのに最適です。\nD. [割引]を[列]シェルフにドラッグします - [割引]を[列]シェルフにドラッグすると、[割引]の値に基づいて水平軸(X軸)が作成されます。これは、利益と割引を経時的に示す2本の線を1つのグラフに結合する目的には適していません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA3MDAgMzAwIiB3aWR0aD0iNzAwIiBoZWlnaHQ9IjMwMCI+CjxyZWN0IHdpZHRoPSI3MDAiIGhlaWdodD0iMzAwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIzNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7liKnnm4rjgajlibLlvJXjga7ntYzmmYLlpInljJYgLSDkuozph43ou7jjgafntZDlkIjjgZnjgovliY08L3RleHQ+CjwhLS0gTGVmdCBjaGFydDogUHJvZml0IGJhcnMgLS0+CjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDMwLDQwKSI+Cjx0ZXh0IHg9IjEzMCIgeT0iMCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjExIiBmaWxsPSIjNTU1Ij7liKnnm4ogKFByb2ZpdCk8L3RleHQ+CjxsaW5lIHgxPSIzMCIgeTE9IjEwIiB4Mj0iMzAiIHkyPSIyMTAiIHN0cm9rZT0iIzk5OSIgc3Ryb2tlLXdpZHRoPSIxIi8+CjxsaW5lIHgxPSIzMCIgeTE9IjIxMCIgeDI9IjI4MCIgeTI9IjIxMCIgc3Ryb2tlPSIjOTk5IiBzdHJva2Utd2lkdGg9IjEiLz4KPHRleHQgeD0iMjUiIHk9IjIwIiB0ZXh0LWFuY2hvcj0iZW5kIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iOSIgZmlsbD0iIzg4OCI+NDBLPC90ZXh0Pgo8dGV4dCB4PSIyNSIgeT0iMTEwIiB0ZXh0LWFuY2hvcj0iZW5kIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iOSIgZmlsbD0iIzg4OCI+MjBLPC90ZXh0Pgo8dGV4dCB4PSIyNSIgeT0iMjEzIiB0ZXh0LWFuY2hvcj0iZW5kIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iOSIgZmlsbD0iIzg4OCI+ クリプションを管理することも可能ですが、[マイコンテンツ]ページは、ユーザーが所有または受信しているすべてのコンテンツ(サブスクリプションを含む)を一元管理する場所です。\nD. [マイコンテンツ]概要ページから、サブスクリプションを変更します。 - 正解です。Tableau ServerまたはTableau Cloudでは、[マイコンテンツ](または個人の設定領域)に、ユーザーが管理するすべてのサブスクリプションが一覧表示されます。このページから既存のサブスクリプションを選択して変更し、他の利害関係者を(受信者として)追加することができます。", "img": ""}, {"id": 4, "dom": 1, "cat": "データ操作", "q": "新しい項目を作成せずにディメンションの値を変更する必要があります。何をすべきですか?", "opts": ["A. 項目名を変更します", "B. エイリアスを作成します", "C. グループを作成します", "D. 項目を変換します"], "ans": ["B"], "exp": "A. 項目名を変更します - 項目名を変更すると、データペインに表示されるディメンション(項目)自体の名前が変わります。ディメンション内の個々の値(メンバー)を変更するものではありません。\nB. エイリアスを作成します - 正解です。エイリアスは、ディメンション内の特定のメンバー(値)に対して、新しい項目を作成せずに表示名(別名)を割り当てる機能です。これにより、元のデータを変更することなく、視覚化での表示を変更できます。\nC. グループを作成します - グループを作成すると、ディメンションの複数のメンバーをまとめて新しいカテゴリを作成します。これは通常、元のディメンションとは別に新しい「(グループ)」項目をデータペインに作成します。\nD. 項目を変換します - 「項目を変換する」という操作は、この文脈では具体的ではありません。Tableauにはピボットや分割などのデータ変換機能がありますが、これらはディメンションの個々の値を単純に変更する目的とは異なります。", "img": ""}, {"id": 5, "dom": 3, "cat": "ダッシュボード", "q": "次の図に示すように、ダッシュボードに「ドラフト」の透かしを追加したいと考えています。どのタイプのオブジェクトを使用すべきですか?", "opts": ["A. 画像", "B. シート", "C. Webページ", "D. 水平"], "ans": ["A"], "exp": "A. 画像 - 正解です。透かし(ウォーターマーク)は、背景に配置されるテキストやロゴであり、通常は透明度を持つ画像ファイル(.pngなど)として作成されます。Tableauのダッシュボードでは、[画像]オブジェクトを使用してこのファイルを追加し、浮動(Floating)に設定してダッシュボードの背後に配置することで実現します。\nB. シート - シートは、棒グラフ、折れ線グラフ、テキスト表など、Tableauで作成される個別の視覚化(ワークシート)を指します。透かしを作成するために使用するオブジェクトではありません。\nC. Webページ - [Webページ]オブジェクトは、ダッシュボード内に外部のWebサイトやURLを埋め込むために使用されます。静的な「ドラフト」という透かしを追加する機能ではありません。\nD. 水平 - [水平]オブジェクトは、他のダッシュボードオブジェクト(シート、画像、テキストなど)を水平方向(横並び)に配置するためのレイアウトコンテナです。透かしというコンテンツそのものではありません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MDAgMzIwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjMyMCI+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iMzIwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIyNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7jg4Djg4Pjgrfjg6Xjg5zjg7zjg4kgLSDjgIxEUkFGVOOAjemAj TETRUNCは日付を指定された単位(月など)の最初の日付に切り捨てます。DATEADDは日付に期間を加算します。月の最初の日付を見つけることはできますが、その日が何曜日かを判断する機能(DATEPART)がなければ、最初の火曜日を特定するための正しい日数を加算することができません。\nB. DATEDIFF, DATEPART - DATEDIFFは2つの日付の差を計算します。DATEPARTは日付の特定の部分(曜日など)を抽出します。この組み合わせでは、計算の基準点となる「月の最初の日」を簡単に見つけることができません。\nC. DATETRUNC, DATEPART - 正解です。まず、DATETRUNC('month', [日付])を使用して、各月の最初の日付(1日)を取得します。次に、DATEPART('weekday', [1日の日付])を使用して、その1日が週の何日目であるかを特定します。この2つの関数を組み合わせることで、1日から最初の火曜日までの日数を計算するためのロジックを構築できます。\nD. DATEADD, DATENAME - DATEADDは日付に期間を加算します。DATENAMEは日付の部分の名前(例:「火曜日」)を文字列として返します。DATENAMEは計算ロジックではなく、表示用の文字列を返すため、この計算には適していません。", "img": ""}, {"id": 7, "dom": 2, "cat": "フィルター", "q": "Sheet1、Sheet2、Sheet3という名前の3つのワークシートを含むTableauワークブックがあります。あなたはいくつかのフィルターを作成しました。[データソース]ページから、データソースフィルターを追加する予定です。「データソースフィルターを編集」ダイアログボックスには、どのタイプのフィルターが表示されますか?", "opts": ["A. シートで使用される表計算フィルター", "B. Sheet1とSheet2のディメンションに対する上位N条件フィルター", "C. Sheet3のディメンションに対するコンテキストフィルター", "D. すべてのシートに対するディメンションフィルター"], "ans": ["D"], "exp": "A. シートで使用される表計算フィルター - 表計算フィルターは、Tableauがデータを視覚化した後にビューレベルで適用されます。データがデータベースから読み込まれる前のデータソースレベルでは適用できません。\nB. Sheet1とSheet2のディメンションに対する上位N条件フィルター - 上位Nフィルターや、特定のシート(Sheet1とSheet2)にのみ適用されるフィルターは、ワークシートレベルのフィルターです。データソースフィルターは、特定のシートに限定されません。\nC. Sheet3のディメンションに対するコンテキストフィルター - コンテキストフィルターは、ワークシートレベルのフィルターの一種であり、Tableauのクエリ実行順序を制御しますが、データソースレベルのフィルターではありません。\nD. すべてのシートに対するディメンションフィルター - 正解です。データソースフィルターは、データソースから返されるデータ自体を制限するものであり、そのデータソースを使用する すべて のワークシートに影響を与えます。このダイアログボックスでは、データソース内のディメンション(またはメジャー)に基づいて、すべてのシートに適用されるフィルターを設定します。", "img": ""}, {"id": 8, "dom": 2, "cat": "計算・関数", "q": "次のデータセットがあります。Categoryという名前の新しい計算ディメンション項目を作成し、次の条件を満たすようにしたいと考えています:\n・ SubjectがComputer ScienceまたはScienceの場合、CategoryはSciencesでなければなりません。\n・ SubjectがEnglishまたはSocial Studiesの場合、CategoryはHumanitiesでなければなりません。\nどの2つの論理関数がこの目標を達成しますか? 2つ選択してください。", "opts": ["A. IF [Subject]- 'Science' THEN 'Sciences' ELSEIF [Subject]='English' THEN 'Humanities' ELSEIF [Subject]-'Social Studies' THEN 'Humanities' ELSEIF [Subject]= 'Computer Science' THEN 'Sciences' END", "B. IIF(( CONTAINS ([Subject], 'Science') = TRUE) , 'Humanities', 'Sciences')", "C. IF ENDSWITH ( [Subject], 'Computer Science') THEN 'Sciences' ELSE 'Humanities' END", "D. CASE [Subject] WHEN 'Computer Science' THEN 'Sciences' WHEN 'Science' THEN 'Sciences' WHEN 'English' THEN 'Humanities' WHEN 'Social Studies' THEN 'Humanities' End"], "ans": ["A", "D"], "exp": "A. IF構文 - 正解です。このIF ELSEIF構文は、(構文エラー-が=であると仮定した場合) 4つのSubject('Science', 'English', 'Social Studies', 'Computer Science')すべてを個別に評価し、要件で指定された通りに 'Sciences' または 'Humanities' を正しく割り当てます。\nB. IIF関数 - この関数は、[Subject]に 'Science' という文字列が含まれている場合('Science'と'Computer Science'の両方でTRUE)、'Humanities' を返します。これは要件とは逆の結果であり、'English' と 'Social Studies' も処理できません。\nC. IF ENDSWITH - この関数は、[Subject]が 'Computer Science' で終わるかどうかのみをチェックします。'Computer Science' は正しく 'Sciences' に分類されますが、'Science'、'English'、'Social Studies' はすべて 'Humanities' として誤って分類されます。\nD. CASE [Subject] - 正解です。このCASE文は、[Subject]の値を指定されたWHENのリスト('Computer Science', 'Science', 'English', 'Social Studies')と比較し、それぞれに対応するTHENの値('Sciences' または 'Humanities')を返します。これは要件を正確に満たしています。", "img": ""}, {"id": 9, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、使用準備のできたTableau Prepフローを作成しました。この出力は、同僚がTableau CloudまたはTableau Server上でダッシュボードを構築するために使用されます。アナリストはデータをどこに出力すべきですか?", "opts": ["A. Salesforce Data Cloud", "B. CRM Analytics", "C. Tableauデータ抽出ファイル", "D. パブリッシュされたデータソース"], "ans": ["D"], "exp": "A. Salesforce Data Cloud - Salesforce Data Cloudは、Tableau Prepの出力先として設定可能ですが、主に顧客データを統合・活用するためのプラットフォームです。同僚がTableau Cloud/Serverでダッシュボードを構築するための直接的なデータソースとしては、最適ではありません。\nB. CRM Analytics - CRM Analytics(旧Tableau CRM)は、Tableau Cloud/Serverとは異なる分析プラットフォームです。Tableau PrepフローはCRM Analyticsに出力できますが、今回の要件はTableau Cloud/Serverでダッシュボードを構築することであるため、出力先として不適切です。\nC. Tableauデータ抽出ファイル - これは、ローカルの .hyper ファイル(抽出ファイル)として出力することを意味します。同僚は、このファイルをローカルに受け取り、手動でTableau Cloud/Serverにアップロードする必要があります。これは非効率であり、データの一元管理や自動更新の利点を活かせません。\nD. パブリッシュされたデータソース - 正解です。Tableau Prepフローの出力を「パブリッシュされたデータソース」としてTableau CloudまたはTableau Serverに直接公開することがベストプラクティスです。これにより、同僚はサーバー上の最新の準備済みデータに直接接続して、ダッシュボードを構築できます。", "img": ""}, {"id": 10, "dom": 2, "cat": "表計算", "q": "すべての州について、各年の累計合計を表示したいと考えています。どの簡易表計算を使用すべきですか?", "opts": ["A. 累計", "B. 前年比成長率", "C. 年初来累計", "D. VTD Growth"], "ans": ["A"], "exp": "A. 累計 - 正解です。「累計」(Running Total)は、ディメンション(この場合は時間、つまり年)に沿ってメジャーの値を継続的に加算していきます。これにより、州ごとに各年の累計合計を表示するという要件が満たされます。\nB. 前年比成長率 - 「前年比成長率」(Year Over Year Growth)は、今年のデータと前年の同期間のデータを比較し、その変化率(パーセンテージ)を計算します。これは累計合計を計算するものではありません。\nC. 年初来累計 - 「年初来累計」(YTD Total)は、年の初めから現在の日付までの累計を計算します。これは特定の時点までの累計であり、要件である「各年」の(通年の)累計合計を表示するものではありません。\nD. VTD Growth - 「VTD Growth」は、Tableauの標準的な簡易表計算の用語ではありません。仮にこれが何らかの成長率を計算するものだとしたら、要件である累計合計とは異なります。", "img": ""}, {"id": 11, "dom": 1, "cat": "データ接続", "q": "図書館の本に関するデータを含む次の2つのテーブルがあります。両方のテーブルは不完全であるため、テーブルから欠落している本があります。テーブルを結合する必要があります。この解決策では、すべてのデータが保持されるようにする必要があります。どのタイプの結合を使用すべきですか?", "opts": ["A. 完全外部結合", "B. 右結合", "C. 左結合", "D. 内部結合"], "ans": ["A"], "exp": "A. 完全外部結合 - 正解です。完全外部結合は、両方のテーブルのすべてのレコードを返します。左側または右側のテーブルに一致するレコードがない場合でも、両方のテーブルのレコードが含まれます。これにより、「すべてのデータが保持される」という要件が満たされます。\nB. 右結合 - 右結合は、右側のテーブルのすべてのレコードと、左側のテーブルで一致したレコードのみを返します。この方法では、左側のテーブルにしか存在しない本(データ)は失われてしまいます。\nC. 左結合 - 左結合は、左側のテーブルのすべてのレコードと、右側のテーブルで一致したレコードのみを返します。この方法では、右側のテーブルにしか存在しない本(データ)は失われてしまいます。\nD. 内部結合 - 内部結合は、両方のテーブルに一致するレコードが存在する場合にのみ、そのレコードを返します。どちらか一方のテーブルにしか存在しない本(データ)はすべて失われるため、要件を満たしません。", "img": ""}, {"id": 12, "dom": 4, "cat": "Tableau Server/Cloud", "q": "抽出を使用するダッシュボードをパブリッシュします。抽出は毎週月曜日の10:00に更新されます。抽出が毎月の最終日の18:00にも更新されるようにする必要があります。何をすべきですか?", "opts": ["A. Tableau Serverから[スケジュール]を選択し、抽出のスケジュールを見つけて、頻度を毎月の最終日に変更します。", "B. Tableau Serverから[スケジュール]を選択し、既存のスケジュールの優先度を変更します。", "C. Tableau Serverからワークブックを選択し、[抽出の更新]を選択してから、新しい抽出の更新を追加します。", "D. Tableau Desktopから[ワークブックをパブリッシュ]ダイアログボックスを開き、スケジュールを構成します。"], "ans": ["C"], "exp": "A. Tableau Serverから[スケジュール]を選択し、抽出のスケジュールを見つけて、頻度を毎月の最終日に変更します。 - [スケジュール]ページでは、サーバー全体で利用可能な更新スケジュール(例:「毎朝9時」)を定義・管理します。特定のワークブックのスケジュールを変更する場所ではありません。また、既存のスケジュールを変更すると、月曜日の更新が失われてしまいます。\nB. Tableau Serverから[スケジュール]を選択し、既存のスケジュールの優先度を変更します。 - スケジュールの優先度は、複数のタスクが同時に実行される際の実行順序を制御するものであり、新しい更新タイミングを追加する操作とは関係ありません。\nC. Tableau Serverからワークブックを選択し、[抽出の更新]を選択してから、新しい抽出の更新を追加します。 - 正解です。既にパブリッシュされているワークブックの抽出更新スケジュールは、Tableau Server上でそのワークブックの[抽出の更新]設定から直接管理します。ここで既存のスケジュール(月曜10時)に加えて、新しいスケジュール(毎月最終日18時)を追加できます。\nD. Tableau Desktopから[ワークブックをパブリッシュ]ダイアログボックスを開き、スケジュールを構成します。 - [ワークブックをパブリッシュ]ダイアログボックスは、通常、ワークブックを初めてパブリッシュする際、または上書きパブリッシュする際に使用します。既にパブリッシュ済みのワークブックのスケジュールを後から変更・追加する場合は、Tableau Server上で操作するのが一般的です。", "img": ""}, {"id": 13, "dom": 2, "cat": "LOD表現", "q": "データアナリストは、各州が地域の売上に占める割合(パーセント)を計算する必要があります。最初のステップとして、アナリストは地域ごとの総売上高を計算する必要があります。これを実行するために、アナリストはどの計算を使用すべきですか?", "opts": ["A. [FIXED [Region]: TOTAL([Sales])]", "B. {FIXED [Region]: SUM([Sales])}", "C. {FIXED [State], [Region]: SUM([Sales])}", "D. {FIXED [State]: SUM([Sales])}"], "ans": ["B"], "exp": "A. [FIXED [Region]: TOTAL([Sales])] - この構文は無効です。LOD(詳細レベル)表現は {} (波括弧) を使用する必要があり、また、LOD表現内で TOTAL() (表計算関数) を使用することはできません。\nB. {FIXED [Region]: SUM([Sales])} - 正解です。これはFIXED LOD計算であり、ビューの詳細レベル(例えば、ビューに州が表示されている場合)に関係なく、指定されたディメンション([Region])レベルで売上の合計(SUM)を計算します。これにより、必要な「地域ごとの総売上高」が得られます。\nC. {FIXED [State], [Region]: SUM([Sales])} - この計算は、[State](州)と[Region](地域)の両方の組み合わせで売上合計を計算します。これは通常、州レベルの売上高と同じ結果になります(州が地域に属しているため)。地域全体の合計ではありません。\nD. {FIXED [State]: SUM([Sales])} - この計算は、[State](州)ごとの総売上高を計算します。要件は「地域ごと」の総売上高であるため、これは不適切です。", "img": ""}, {"id": 14, "dom": 2, "cat": "計算・関数", "q": "人々とその人たちが受賞した賞を含むデータセットがあります。受賞したさまざまな賞の種類の数を取得するには、どの式を使用すべきですか?", "opts": ["A. COVAR({Award})", "B. COUNTD({Award})", "C. COUNTD {[NAME]}", "D. MAX {[Award]}", "E. INDEX()"], "ans": ["B"], "exp": "A. COVAR({Award}) - COVARは共分散を計算する関数です。これは2つの変数が一緒にどのように変化するかを測定する統計尺度であり、異なる種類の数を数えるためには使用しません。\nB. COUNTD({Award}) - 正解です。COUNTDは「Count Distinct」(個別カウント)の略です。この関数は、項目(この場合は{Award})内の一意な(異なる)値の数を数えます。これは「受賞したさまざまな賞の種類の数」という要件に正確に一致します。\nC. COUNTD {[NAME]} - この関数は([NAME]が人物名項目であると仮定すると)、データセット内の「異なる人物」の数を数えます。賞の種類を数えるものではありません。\nD. MAX {[Award]} - MAXは項目の最大値を返します。{Award}が文字列の場合、アルファベット順で最後の値を返します。これは異なる種類の数を数える関数ではありません。\nE. INDEX() - INDEX()は表計算関数です。パーティション内の現在の行のインデックス(行番号)を返します。これは位置の参照に使用されるものであり、データセットから個別の値を数えるものではありません。", "img": ""}, {"id": 15, "dom": 2, "cat": "計算・関数", "q": "あるデータセットに、データアナリストはNameという名前の文字列項目を持っていますが、これには不要なセミコロンが含まれています。アナリストがName項目からセミコロンを削除するために使用すべき関数はどれですか?", "opts": ["A. CONTAINS", "B. FIND", "C. REPLACE", "D. SPLIT"], "ans": ["C"], "exp": "A. CONTAINS - CONTAINS関数は、文字列内に特定のサブストリングが含まれているかどうかをチェックし、TrueまたはFalseを返します。セミコロンを削除する機能はありません。\nB. FIND - FIND関数は、文字列内でサブストリングが最初に出現する位置(インデックス番号)を返します。文字列を変更したり削除したりするものではありません。\nC. REPLACE - 正解です。REPLACE関数は、文字列内の一部(この場合は';')を別の文字列(この場合は空文字'')で置き換えるために使用されます。REPLACE([Name], ';', '') のように使用することで、すべてのセミコロンを効果的に削除できます。\nD. SPLIT - SPLIT関数は、区切り文字(セミコロンなど)を使用して文字列を複数の部分に分割します。これは文字列を削除するのではなく、分割して新しい複数の文字列を生成します。", "img": ""}, {"id": 16, "dom": 2, "cat": "ビジュアライゼーション", "q": "さまざまな日付からの売上の累計を示す次のグラフがあります。次のグラフに示すように、月が表示されるようにしたいと考えています。何をすべきですか?", "opts": ["A. 日付を「正確な日付」に変換します", "B. 日付を「連続」に変換します", "C. 日付の「欠落値を表示」を選択します", "D. 日付を「属性」に変換します"], "ans": ["A"], "exp": "A. 日付を「正確な日付」に変換します - 正解です。日付を「正確な日付」に設定すると、Tableauは日付を個別の(不連続な)日付ポイントとして扱います。これにより、データセットに存在するすべての日付が個別に表示されます。\nB. 日付を「連続」に変換します - 日付を「連続」(緑色のピル)に変換すると、単一の時系列の軸が作成されます。これは月を表示する一般的な方法ですが、この場合の要件とは異なります。\nC. 日付の「欠落値を表示」を選択します - このオプションは、データが存在しない期間(月など)を視覚化上で補完し、時系列のギャップを埋めるために使用されます。\nD. 日付を「属性」に変換します - 日付を「属性」(ATTR)に変換すると、特定の詳細レベルで日付が一意である場合にその日付を表示し、そうでない場合はアスタリスク(*)を表示します。時系列の表示には適していません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA3MDAgMjgwIiB3aWR0aD0iNzAwIiBoZWlnaHQ9IjI4MCI+CjxyZWN0IHdpZHRoPSI3MDAiIGhlaWdodD0iMjgwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIzNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7ntK/ . RUNNING_AVG", "C. INCLUDE", "D. AVG"], "ans": ["A"], "exp": "A. EXCLUDE - 正解です。EXCLUDEはLOD(詳細レベル)表現関数です。ビューの詳細レベルから指定されたディメンションを除外して(つまり、より粗いレベルで)集計計算を実行します。これにより、ビューの粒度よりも粗い粒度で平均を計算するという要件が満たされます。\nB. RUNNING_AVG - RUNNING_AVGは表計算関数であり、ビュー内のデータポイントに沿って移動平均を計算します。これは計算の粒度(詳細レベル)を変更するものではありません。\nC. INCLUDE - INCLUDEはLOD表現関数です。ビューの詳細レベルに指定されたディメンションを追加し、計算を より 詳細な(more-granular)レベルで行います。これは要件とは逆です。\nD. AVG - AVGは標準の集計関数です。この関数は、ビューの現在の詳細レベル(ビューにあるディメンション)で平均を計算します。より粗いレベルで計算することはできません。", "img": ""}, {"id": 22, "dom": 2, "cat": "LOD表現", "q": "次のデータセットがあります。すべての地域の総合計を計算するには、どのLOD(詳細レベル)表現を使用すべきですか?", "opts": ["A. {FIXED [Region] : SUM([Sales])}", "B. {FIXED : SUM([Sales])}", "C. {INCLUDE [Region] : SUM([Sales])}", "D. {EXCLUDE [Region] : SUM([Sales])}"], "ans": ["B"], "exp": "A. {FIXED [Region] : SUM([Sales])} - 各地域ごとの売上合計を計算するFIXED LOD表現です。地域ごとに異なる値を返すため「すべての地域の総計」にはなりません。\nB. {FIXED : SUM([Sales])} - 正解です。FIXEDの後にディメンションを指定しないと、データセット全体を1つのグループとして集計します。ビュー内のディメンションに関係なく全データの売上総計を返します。\nC. {INCLUDE [Region] : SUM([Sales])} - INCLUDEはビューにRegionを追加して計算しますが、全体の総計を返す式ではありません。\nD. {EXCLUDE [Region] : SUM([Sales])} - EXCLUDEはRegionを除外して計算しますが、他のディメンションがあればそのレベルで集計されます。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMDAgMTkwIiB3aWR0aD0iMzAwIiBoZWlnaHQ9IjE5MCI+CjxyZWN0IHdpZHRoPSIzMDAiIGhlaWdodD0iMTkwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIxNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7jg4fjg7zjgr/jgrvjg4Pjg4ggLSDlnLDln5/liKXlo7LkuIo8L3RleHQ+CjxyZWN0IHg9IjMwIiB5PSIzNSIgd2lkdGg9IjI0MCIgaGVpZ2h0PSIxNDUiIGZpbGw9IndoaXRlIiBzdHJva2U9IiNEREQiIHJ4PSI0Ii8+CjxyZWN0IHg9IjMwIiB5PSIzNSIgd2lkdGg9IjEyMCIgaGVpZ2h0PSIyNCIgZmlsbD0iIzFCM0E1QyIvPgo8cmVjdCB4PSIxNTAiIHk9IjM1IiB3aWR0aD0iMTIwIiBoZWlnaHQ9IjI0IiBmaWxsPSIjMUIzQTVDIi8+Cjx0ZXh0IHg9IjkwIiB5PSI1MiIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjExIiBmaWxsPSJ3aGl0ZS ns": ["D"], "exp": "A. 文字列、FIXED 詳細レベル(LOD)、Viz に依存 - Dynamic Zone Visibilityは、ブール値(True/False)を返す項目に基づいています。文字列やFIXED LODは、この機能の直接的な要件ではありません。\nB. ブール値、パラメータ、単一の値 - パラメータを使用して単一の値を提供し、それをブール値に変換することはできますが、このオプションは属性の要件を不正確に組み合わせています。\nC. 単一の値、整数、Viz に非依存 - 制御項目は「単一の値」である必要がありますが、「整数」である必要はありません。主要な要件はブール値(True/False)であることです。\nD. ブール値、単一の値、Viz に非依存 - 正解です。Dynamic Zone Visibilityを制御する項目(またはパラメータ)は、必ず単一の値(Single Value)を返す必要があり、その値はブール値(Boolean)、つまりTrueまたはFalseでなければなりません。この値はVizのマークに依存しない(Independent of the viz)必要があります。", "img": ""}, {"id": 24, "dom": 3, "cat": "ダッシュボード", "q": "次のダッシュボードがあります。現在、マップはダッシュボード上の他のシートのデータに影響を与えるフィルターとして使用されています。マップ上のデータポイントを選択すると、「Detail table」(詳細テーブル)のみがフィルタリングされるようにダッシュボードを設定する必要があります。何をすべきですか?", "opts": ["A. [Sales by Category] のコンテキストメニューから、[アクションを無視] を選択します。", "B. [Sales by Category] のコンテキストメニューから、[ダッシュボードアイテムの削除] を選択します。", "C. [Map] のコンテキストメニューから、[フィルターとして使用] の選択を解除します。", "D. [Sales by Category] のコンテキストメニューから、[選択解除] を選択します。"], "ans": ["A"], "exp": "A. [Sales by Category] のコンテキストメニューから、[アクションを無視] を選択します。 - 正解です。ダッシュボードのフィルターアクション設定では、ソースシート（Map）からのフィルターがデフォルトで他のすべてのシートに適用されます。[Detail Table] のみをフィルター対象にしたい場合、フィルターから除外したいシート（[Sales by Category]）のコンテキストメニューで「アクションを無視」を選択します。これにより、そのシートだけがフィルターアクションの影響を受けなくなります。\nB. [Sales by Category] のコンテキストメニューから、[ダッシュボードアイテムの削除] を選択します。 - これはシート自体をダッシュボードから完全に削除してしまいます。フィルター対象から除外したいだけなので、削除は不適切です。\nC. [Map] のコンテキストメニューから、[フィルターとして使用] の選択を解除します。 - これを解除するとMapからのフィルターアクション自体が無効になり、Detail Tableへのフィルターも含めてすべてのフィルターが停止してしまいます。\nD. [Sales by Category] のコンテキストメニューから、[選択解除] を選択します。 - Tableauのコンテキストメニューに「選択解除」という選択肢は存在しません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2MDAgMzIwIiB3aWR0aD0iNjAwIiBoZWlnaHQ9IjMyMCI+CjxyZWN0IHdpZHRoPSI2MDAiIGhlaWdodD0iMzIwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIzMDAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7jg4Djg4Pjgrfjg6Xjg5zj ラッグします。", "D. マークタイプを[密度]に変更します。", "E. マークタイプを[マップ]に変更します。"], "ans": ["D"], "exp": "A. [Location]をマークカードの[サイズ]にドラッグします。 - [Location](場所)は地理的ディメンションであり、[サイズ]にドラッグしても(通常は機能しないか、意図した結果にならず)、密度マップは作成されません。\nB. 不透明度を75%に変更します。 - 不透明度の変更は、マークの透明度を調整するだけであり、視覚化のタイプを密度マップ(ヒートマップ)に変更するものではありません。\nC. [Population]をマークカードの[サイズ]にドラッグします。 - [Population](人口)などのメジャーを[サイズ]にドラッグすると、値の大きさに応じて円のサイズが変わる「比例シンボルマップ」が作成されます。これは、ポイントの密集度を示す密度マップではありません。\nD. マークタイプを[密度]に変更します。 - 正解です。Tableauでは、マークタイプを([自動]や[円]などから)[密度]に変更することにより、データポイントが密集している領域を色(通常は熱)で示す密度マップ(ヒートマップ)を作成できます。\nE. マークタイプを[マップ]に変更します。 - マークタイプ[マップ]は、通常、国や州などの定義された地理的領域を色で塗りつぶす「塗りつぶしマップ」(ポリゴンマップ)を作成するために使用されます。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NTAgMjYwIiB3aWR0aD0iNjUwIiBoZWlnaHQ9IjI2MCI+CjxyZWN0IHdpZHRoPSI2NTAiIGhlaWdodD0iMjYwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIzMjUiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7jg57jg4Pjg5fjgr/jgqTjg5fjga7lpInmm7QgLSDjgrfjg7Pjg5zjg6vjg57jg4Pjg5cg4oaSIOWhl+OCiuOBpOOBtuOBl+ODnuODg+ODlzwvdGV4dD4KPCEtLSBCZWZvcmU6IFN5bWJvbCBtYXAgLS0+CjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDEwLDM1KSI+Cjx0ZXh0IHg9IjE1MCIgeT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMSIgZmlsbD0iI0UxNTc1OSIgZm9udC13ZWlnaHQ9ImJvbGQiPkJlZm9yZTog44K344Oz44Oc44Or44Oe44OD44OXPC90ZXh0Pgo8cmVjdCB4PSIxNSIgeT0iMjAiIHdpZHRoPSIyNzAiIGhlaWdodD0iMTkwIiBmaWxsPSIjRThGMEY4IiBzdHJva2U9IiNEREQiIHJ4PSIzIi8+CjxwYXRoIGQ9Ik00MCwxNjAgUTgwLDEwMCAxMjAsMTIwIFExNDAsNjAgMTgwLDgwIFEyMjAsNzAgMjYwLDEwMCBMMjYwLDIwMCBMNDAsMjAwIFoiIGZpbGw9IiNEREU4REQiIHN0cm9rZT0iI0JCQiIgb3BhY2l0eT0iMC41Ii8+CjxjaXJjbGUgY3g9IjgwIiBjeT0iMTMwIiByPSIxMCIgZmlsbD0iIzRFNzlBNyIgb3BhY2l0eT0iMC44Ii8+CjxjaXJjbGUgY3g9IjE0MCIgY3k9IjEwMCIgcj0iMTYiIGZpbGw9IiM0RTc5QTciIG9wYWNpdHk9IjAuOCIvPgo8Y2lyY2xlIGN4PSIyMDAiIGN5PSI5MCIgcj0iOCIgZmlsbD0iIzRFNzlBNyIgb3BhY2l0eT0iMC44Ii8+CjxjaXJjbGUgY3g9IjEyMCIgY3k9IjE2MCIgcj0iM レンドライン - トレンドラインは、ビューに表示されているデータの過去の傾向(パターン)を視覚的に表現する線(線形、対数、指数など)を追加する機能です。これは過去の傾向を示しますが、将来の値を予測する機能ではありません。\nD. パラメータ - パラメータは、ユーザー入力を受け付け、計算項目やフィルタの値などを動的に変更するために使用される独立した項目です。これは、特定の予測機能そのものではありません。", "img": ""}, {"id": 28, "dom": 4, "cat": "Tableau Server/Cloud", "q": "あなたはアラートの所有者です。アラートが一時停止されたというEメール通知を受け取りました。どこから一時停止されたアラートを再開できますか?", "opts": ["A. Tableau Desktopのデータソースページ", "B. Tableau Prepの通知エリア", "C. Tableau Webページの[マイコンテンツ]エリア", "D. [自分と共有]ページ"], "ans": ["C"], "exp": "A. Tableau Desktopのデータソースページ - このページは、Tableau Desktop内でデータに接続し、準備するためのものです。Tableau ServerまたはTableau Cloudで作成されたアラートを管理する場所ではありません。\nB. Tableau Prepの通知エリア - Tableau Prepはデータ準備ツールです。Tableau Server/Cloudで設定されたデータドリブンアラートを管理するものではありません。\nC. Tableau Webページの[マイコンテンツ]エリア - 正解です。アラートが(多くの場合エラーによって)一時停止された場合、所有者はTableau ServerまたはTableau Cloudの[マイコンテンツ]エリアに移動し、[アラート]セクションを見つけて、一時停止されたアラートを手動で再開することができます。\nD. [自分と共有]ページ - このページ([自分と共有])には、他のユーザーがあなたと共有したコンテンツが表示されます。アラートの基になっているビューが表示されるかもしれませんが、あなた 自身 の一時停止されたアラートを管理する主要な場所ではありません。", "img": ""}, {"id": 29, "dom": 1, "cat": "Tableau Prep", "q": "あなたはTableau Prepを使用してデータベースサーバーに接続しています。データベースサーバーにはRole1という名前のデータ役割があります。データには次の項目があります。Material項目にRole1データ役割を適用する必要があります。どの2つのアクションを実行すべきですか? 2つ選択してください。", "opts": ["A. [Materials]の[その他のアクション]メニューから、[値の表示]セクションで[有効]を選択します。", "B. [Material]項目のデータ型で[カスタム]を選択し、[Role1]を選択します。", "C. [Materials]の[その他のアクション]メニューから、[値のグループ化]を選択し、[スペル]を選択します。", "D. [Materials]の[その他のアクション]メニューから、選択した値をフィルターします。"], "ans": ["B", "C"], "exp": "A. [Materials]の[その他のアクション]メニューから、[値の表示]セクションで[有効]を選択します。 - このオプションは、データ役割が すでに 適用されている場合に、その役割の基準(有効な値)に基づいてデータを表示またはフィルターするために使用されます。データ役割を適用するアクションではありません。\nB. [Material]項目のデータ型で[カスタム]を選択し、[Role1]を選択します。 - 正解です。Tableau Prepでは、[データ役割]は特殊なデータ型として扱われます。既存のデータ役割(Role1)を項目に適用するには、その項目のデータ型をクリックし、[カスタム](またはデータ役割のカテゴリ)から[Role1]を選択します。\nC. [Materials]の[その他のアクション]メニューから、[値のグループ化]を選択し、[スペル]を選択します。 - 正解です。データ役割を適用する主な目的は、データを標準化し、有効な値のみを許可することです。[値のグループ化] > [スペル]は、データ内のわずかなスペルミスや表記ゆれを自動的に検出し、標準的な値にまとめるためのクリーニングステップです。\nD. [Materials]の[その他のアクション]メニューから、選択した値をフィルターします。 - フィルターはデータを除外しますが、データ役割の標準に準拠するように値をクリーンアップまたは修正するものではありません。", "img": ""}, {"id": 30, "dom": 1, "cat": "データ操作", "q": "次のデータセットがあります。ワークシートでデータセットを使用する際、次の表に示すように [Sales] が自動的に表示されるようにしたいと考えています。何をすべきですか?", "opts": ["A. [Sales] 項目のデータ型を文字列に変更します", "B. 'S' * str (Round((sales],2)) + 'k' という式を使用する計算項目を作成します", "C. [Sales] 項目のデフォルトの数値形式を変更します", "D. 'S' + stri < (Sales)/1000)) という式を使用する計算項目を作成します"], "ans": ["C"], "exp": "A. [Sales] 項目のデータ型を文字列に変更します - データ型を文字列に変更すると、その項目は数値(メジャー)として扱われなくなり、合計や平均などの集計ができなくなります。これは自動的な書式設定の方法ではありません。\nB. 'S' * str (Round((sales],2)) + 'k' という式を使用する計算項目を作成します - この(構文に誤りがある)式は、[Sales] 項目とは別に、新しい 文字列 の計算項目を作成しようとしています。これは元の[Sales]項目のデフォルトの表示形式を変更するものではありません。\nC. [Sales] 項目のデフォルトの数値形式を変更します - 正解です。データペインでメジャー([Sales]項目)を右クリックし、[既定のプロパティ] > [数値形式] を選択して設定すると、その項目がワークシートで使用されるたびに、指定された形式(例:通貨、'K'単位での表示)で 自動的に 表示されます。\nD. 'S' + stri < (Sales)/1000)) という式を使用する計算項目を作成します - この(構文に誤りがある)式も、オプションBと同様に、新しい 文字列 項目を作成するものです。元の[Sales]項目が自動的に特定の形式で表示されるようにはなりません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MDAgMTkwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjE5MCI+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iMTkwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIyNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTIiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj5bU2FsZXNdIOOBruODh+ODleOCqeODq+ODiOaVsOWApOW9ouW8j+OBruWkieabtDwvdGV4dD4KPCEtLSBCZWZvcmUgLS0+CjxnIHRyYW5zZm9ybT0idHJhbnNsYXRlKDE1LDM1KSI+Cjx0ZXh0IHg9IjEwMCIgeT0iMTIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMCIgZmlsbD0iI0UxNTc1OSIgZm9udC13ZWlnaHQ9ImJvbGQiPkJlZm9yZTog44OH44OV44Kp44Or44OI5b2i5byPPC90ZXh0Pgo8cmVjdCB4PSIxMCIgeT0iMTgiIHdpZHRoPSIxOTUiIGhlaWdodD0iMTMwIiBmaWxsPSJ3aGl0ZSIgc3Ryb2tlPSIjREREIiByeD0iMyIvPgo8cmVjdCB4PSIxMCIgeT0iMTgiIHdpZHRoPSI5NSIgaGVpZ2h0PSIyMiIgZmlsbD0iIzFCM0E1QyIvPgo8cmVjdCB4PSIxMDUiIHk9IjE4IiB3aWR0aD0iMTAwIiBoZWlnaHQ 0Pgo8L3N2Zz4="}, {"id": 31, "dom": 2, "cat": "セット", "q": "Tableauワークブックに次のセットがあります。\nTop N Customers\nCustomers of 2020\nTop N Products\nSellers of 2020\nどの2つのセットを組み合わせることができますか? 2つ選択してください。", "opts": ["A. Sellers of 2020", "B. Customers of 2020", "C. Top N Products", "D. Top N Customers"], "ans": ["B", "D"], "exp": "Tableauで2つのセットを組み合わせる(例:和集合、積集合、差集合を作成する)ための基本的なルールは、両方のセットが同じディメンションに基づいている必要があることです。\nA. Sellers of 2020 - このセットは [Seller](販売者)ディメンションに基づいていると推測されます。これは他のどのセットともディメンションが一致しないため、組み合わせることができません。\nB. Customers of 2020 - 正解です。このセットは [Customer](顧客)ディメンションに基づいています。これは、オプションDの [Top N Customers] と同じディメンションであるため、組み合わせることが可能です。\nC. Top N Products - このセットは [Product](製品)ディメンションに基づいています。これは他のどのセットともディメンションが一致しないため、組み合わせることができません。\nD. Top N Customers - 正解です。このセットは [Customer](顧客)ディメンションに基づいています。これは、オプションBの [Customers of 2020] と同じディメンションであるため、組み合わせることが可能です。", "img": ""}, {"id": 32, "dom": 1, "cat": "データ接続", "q": "あなたは Start Date という名前のパラメータを含むダッシュボードを持っています。Microsoft Excelファイルから抽出を作成する必要があります。抽出は Start Date に基づいてフィルターされる必要があります。何をすべきですか?", "opts": ["A. Excel ワークシートに基づいてデータソースを作成し、Start Date に基づいて計算項目を作成します。計算項目を抽出フィルターに追加します。", "B. カスタムSQLクエリを作成してデータソースを定義し、Start Date に基づいて計算項目を作成します。計算項目を抽出フィルターに追加します。", "C. Excel ワークシートに基づいてデータソースを作成し、Start Date に基づいて計算項目を作成します。[データ]ペインから、計算項目をデータソースフィルターに追加します。", "D. WHERE句で Start Date を参照するカスタムSQLクエリを作成します。"], "ans": ["A"], "exp": "A. Excel ワークシートに基づいてデータソースを作成し、Start Date に基づいて計算項目を作成します。計算項目を抽出フィルターに追加します。 - 正解です。パラメータ [Start Date] を使用する計算項目(例: [日付項目] >= [Start Date])を作成できます。抽出を作成する際([データソース]タブで[抽出]を選択したとき)、[編集...] をクリックして抽出ダイアログを開き、[フィルター]セクションで [追加...] を選択して、この計算項目を抽出フィルターとして追加できます。\nB. カスタムSQLクエリを作成してデータソースを定義し、Start Date に基づいて計算項目を作成します。計算項目を抽出フィルターに追加します。 - Excelファイルに対してカスタムSQLを使用することは可能ですが、このシナリオでは不要です。\nC. Excel ワークシートに基づいてデータソースを作成し、Start Date に基づいて計算項目を作成します。[データ]ペインから、計算項目をデータソースフィルターに追加します。 - データソースフィルターは結果的に抽出をフィルタリングしますが、抽出フィルターがより直接的な方法です。\nD. WHERE句で Start Date を参照するカスタムSQLクエリを作成します。 - Tableauの標準的なパラメータは、カスタムSQLクエリのWHERE句内で直接参照することはできません。", "img": ""}, {"id": 33, "dom": 4, "cat": "Tableau Server/Cloud", "q": "あなたはいくつかのビューにサブスクライブしています。これらのビューからサブスクライブを解除する必要があります。何を使用すべきですか?", "opts": ["A. Tableau Webページの[マイコンテンツ]エリア", "B. Tableau Prepの通知エリア", "C. Tableau Desktopのデータソースページ", "D. [自分と共有]ページ"], "ans": ["A"], "exp": "A. Tableau Webページの[マイコンテンツ]エリア - 正解です。Tableau ServerまたはTableau Cloudでは、[マイコンテンツ]エリア(または個人の設定ページ)に、自分がサブスクライブしているすべてのビューとワークブックのリストが表示されます。このページから、不要なサブスクリプションを選択して解除することができます。\nB. Tableau Prepの通知エリア - Tableau Prepはデータ準備ツールです。Tableau Server/Cloud上でパブリッシュされたコンテンツのサブスクリプションを管理する機能はありません。\nC. Tableau Desktopのデータソースページ - Tableau Desktopは、ワークブックを作成および編集するためのオーサリングツールです。パブリッシュされたコンテンツのサブスクリプション管理は行えません。\nD. [自分と共有]ページ - [自分と共有]ページには、他のユーザーがあなたと共有したコンテンツが表示されますが、サブスクリプションを管理するための主要な場所ではありません。", "img": ""}, {"id": 34, "dom": 2, "cat": "表計算", "q": "次のデータセットがあります。[Calculation] 項目に示されているように、前年の同じ四半期と比較した売上のパーセント差を計算する式はどれですか?", "opts": ["A. (SUM ([Sales]) - LOOKUP (SUM ( [Sales]), -4))", "B. (SUM ([Sales]) - LOOKUP (SUM ([Sales]), -4) ) / (LOOKUP (SUM ([Sales]), -4) )", "C. (SUM([Sales]) / (LOOKUP (SUM ([Sales]), -4))", "D. (ZN (SUM ([Sales]) ) - LOOKUP (ZN (SUM ([Sales]) ), -4) )"], "ans": ["B"], "exp": "A. (SUM ([Sales]) - LOOKUP (SUM ( [Sales]), -4)) - この式は、現在の売上 (SUM([Sales])) と、4期前(前年の同じ四半期)の売上 (LOOKUP(SUM([Sales]), -4)) との 絶対差 を計算します。パーセント差(変化率)ではありません。\nB. (SUM ([Sales]) - LOOKUP (SUM ([Sales]), -4) ) / (LOOKUP (SUM ([Sales]), -4) ) - 正解です。この式は「(現在の値 - 過去の値) / 過去の値」という標準的なパーセント差の計算式です。LOOKUP(..., -4) は、データが四半期単位でソートされていると仮定した場合、4期前(前年の同じ四半期)の値を正しく参照します。\nC. (SUM([Sales]) / (LOOKUP (SUM ([Sales]), -4)) - この式は、現在の売上と4期前の売上との 比率 を計算します(例:1.10)。パーセント差(例:0.10 または 10%)を計算するものではありません。\nD. (ZN (SUM ([Sales]) ) - LOOKUP (ZN (SUM ([Sales]) ), -4) ) - この式は、オプションAと同様に 絶対差 を計算しますが、ZN() 関数を使用してNULL値を0に変換しています。パーセント差は計算していません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MDAgMjAwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjIwMCI+CjxyZWN , "img": ""}, {"id": 36, "dom": 4, "cat": "Tableau Server/Cloud", "q": "Tableau DesktopからTableau Serverサイトにサインインします。パブリッシュされたデータソースを検索するとき、利用可能なデータソースのリストに何が表示されますか?", "opts": ["A. サイトにパブリッシュされたすべてのデータソース", "B. Tableau Serverにパブリッシュされたすべてのデータソース", "C. アクセス権を持つフォルダ内の、サイトにパブリッシュされたすべてのデータソース", "D. アクセス権を持つフォルダ内の、Tableau Serverにパブリッシュされたすべてのデータソース"], "ans": ["C"], "exp": "A. サイトにパブリッシュされたすべてのデータソース - サイトにパブリッシュされていても、ユーザーが表示権限を持たないプロジェクト(フォルダ)内のデータソースはリストに表示されません。\nB. Tableau Serverにパブリッシュされたすべてのデータソース - Tableau Serverは複数のサイトを持つことができます。表示されるのは、現在サインインしている特定のサイト内のデータソースのみであり、サーバー全体のデータソースではありません。\nC. アクセス権を持つフォルダ内の、サイトにパブリッシュされたすべてのデータソース - 正解です。Tableau ServerまたはTableau Cloud(サイト)では、データソースを含むコンテンツへのアクセスは、サインインしたサイト内、かつユーザーが権限を持つプロジェクト(フォルダ)によって制御されます。\nD. アクセス権を持つフォルダ内の、Tableau Serverにパブリッシュされたすべてのデータソース - 表示範囲はサーバー全体ではなく、現在サインインしている特定のサイトに限られます。", "img": ""}, {"id": 37, "dom": 4, "cat": "Tableau Server/Cloud", "q": "データアナリストが、抽出データソースを使用するワークブックを持っています。アナリストはワークブックをTableau Serverにパブリッシュします。アナリストがTableau Serverの [抽出の更新] ページから実行できる3つのアクションはどれですか?(3つ選択)", "opts": ["A. 更新の削除", "B. 更新の頻度の変更", "C. 更新の実行", "D. 更新を完全から増分に変更", "E. 更新の優先度の変更"], "ans": ["B", "C", "E"], "exp": "A. 更新の削除 - Tableau ServerのUIで更新スケジュールをリストから削除(登録解除)することは可能ですが、この設問で正解として指定されている主要な管理アクション(B, C, E)とは異なります。\nB. 更新の頻度の変更 - 正解です。[抽出の更新] ページでは、既存の更新スケジュールを選択し、その実行頻度(例:毎日、毎週月曜、毎時)を変更することが可能です。\nC. 更新の実行 - 正解です。[抽出の更新] ページには「今すぐ実行」オプションがあり、スケジュールされた時刻以外でも手動で抽出の更新を即座に開始させることができます。\nD. 更新を完全から増分に変更 - 抽出の更新タイプ(完全更新か増分更新か)は、Tableau Desktopでデータ抽出を設定する際に定義するものであり、Tableau Serverの [抽出の更新] ページ(Web UI)から直接変更することはできません。\nE. 更新の優先度の変更 - 正解です。サーバー上で複数のバックグラウンドタスクが競合する場合に備えて、特定の更新タスクの優先度(0~100の数値)を高く(または低く)設定することができます。", "img": ""}, {"id": 38, "dom": 3, "cat": "エクスポート", "q": "[ワークシート] メニューからワークシートをエクスポートできる3つの形式はどれですか?(3つ選択)", "opts": ["A. .png", "B. .html", "C. .xlsx", "D. .txt", "E. .pptx", "F. .csv"], "ans": ["A", "C", "E"], "exp": "A. .png - 正解です。Tableau Desktopの [ワークシート] メニューから [エクスポート] > [画像] を選択すると、ワークシートのビューを .png 画像ファイルとして保存できます。\nB. .html - [ワークシート] メニューの [エクスポート] オプションには、 .html 形式は含まれていません。\nC. .xlsx - 正解です。[ワークシート] メニューから [エクスポート] > [クロス集計を Excel にエクスポート] を選択すると、ビューのクロス集計データを .xlsx 形式のExcelファイルとして保存できます。\nD. .txt - [ワークシート] メニューの [エクスポート] オプションには、.txt 形式で直接エクスポートする標準機能はありません。\nE. .pptx - 正解です。[ワークシート] メニューから [エクスポート] > [PowerPoint] を選択すると、ワークシートのビュー(画像)を含む .pptx 形式のPowerPointスライドとして保存できます。\nF. .csv - [ワークシート] メニューの [エクスポート] > [データ] から基になるデータを .csv 形式で保存すること自体は可能ですが、この問題で求められている正解の組み合わせ(A, C, E)には含まれていません。", "img": ""}, {"id": 39, "dom": 1, "cat": "データ接続", "q": "データアナリストが、テーブル形式でデータを表示するWebサイトを持っています。アナリストは、最小限の労力でWebサイトのデータに接続したいと考えています。アナリストがデータに接続するために使用すべきものは何ですか?", "opts": ["A. ODBCコネクタ", "B. クリップボード", "C. CSVファイル", "D. Webデータコネクタ"], "ans": ["B"], "exp": "A. ODBCコネクタ - ODBC(Open Database Connectivity)コネクタは、様々なデータベース管理システムに接続するための標準インターフェースです。Webサイト上のHTMLテーブルに直接接続するものではなく、より多くの設定と労力が必要です。\nB. クリップボード - 正解です。Webサイト上のテーブルデータをコピー(Ctrl+C)し、Tableau Desktopの画面に直接貼り付ける(Ctrl+V)ことで、データソースとして即座に認識させることができます。これは最も手軽で「最小限の労力」の方法です。\nC. CSVファイル - この方法では、まずWebサイトのデータを手動または他のツールでCSVファイルとして抽出し、保存してから、TableauでそのCSVファイルを開く必要があります。クリップボードへの貼り付けよりも手順が多くなります。\nD. Webデータコネクタ - Webデータコネクタ(WDC)は、API経由など、Tableauが標準でサポートしていないWeb上のデータソースに接続するために使用されます。WDCの利用には設定や開発が必要な場合があり、「最小限の労力」とは言えません。", "img": ""}, {"id": 40, "dom": 3, "cat": "書式設定", "q": "データアナリストは、営業チームの財務実績を分析する必要があります。ダッシュボードを理解しやすくするために、アナリストは財務数値の前にドル記号($)を表示するように書式設定する必要があります。アナリストがワークブック全体でこの書式設定を有効にするには、どうすればよいですか?", "opts": ["A. データペインでメジャーを右クリックし、[作成]、[計算項目] の順にクリックして文字列に変換し、$ 記号を追加します。", "B. [分析] タブをクリックし、[予測] を選択します。", "C. データペインでメジャーを右クリックし、[デフォルトのプロパティ]、[数値形式] の順にクリックします。", "D. [書式設定] タブをクリックし、[ワークブックのテーマ] を選択します。"], "ans": ["C"], "exp": "A. データペインでメジャーを右クリックし、[作成]、[計算項目] の順にクリックして文字列に変換し、$ 記号を追加します。 - この方法では、数値データが文字列データに変換されてしまいます。これにより、その後の集計や数値計算(合計、平均など)ができなくなるため、不適切です。\nB. [分析] タブをクリックし、[予測] を選択します。 - [予測] は、データに基づいて将来の傾向を予測するための機能であり、数値の表示形式(通貨記号の追加)とは関係ありません。\nC. データペインでメジャーを右クリックし、[デフォルトのプロパティ]、[数値形式] の順にクリックします。 - 正解です。この方法で数値形式(例:通貨)を設定すると、その設定がメジャーのデフォルトとして保存されます。これにより、ワークブック全体でそのメジャーを使用する際に、自動的に指定した書式($記号付き)が適用されます。\nD. [書式設定] タブをクリックし、[ワークブックのテーマ] を選択します。 - [ワークブックのテーマ] は、ワークブック全体のフォント、色、レイアウトなどの全体的な外観を変更する機能であり、特定のメジャーの数値表示形式を設定するものではありません。", "img": ""}, {"id": 41, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、同僚のTableau Prepフローのドラフト結果を、パブリッシュされる前に受け取り、ダッシュボードの作業を開始したいと考えています。これを達成するためにアナリストは何をすべきですか?", "opts": ["A. Tableau Desktopを開き、Tableau Prepへの接続を作成し、接続したい同僚のフローを選択します。", "B. Tableau Desktopの [接続] ページで、[ファイルへ] の下にある [その他...] を選択し、ローカルファイルシステム上の同僚の .tfl ファイルを参照します。", "C. 同僚にフローの結果を .hyper ファイルに出力してもらいます。Tableau Desktopの [接続] ページで、[ファイルへ] の下にある [その他...] を選択し、ローカルファイルシステム上の .hyper ファイルを参照します。", "D. 同僚にフローの結果を .hyper ファイルに出力してもらいます。Tableau Cloudで新しいワークブックを作成し、[データに接続] ページで [ファイル] を選択し、コンピュータから .hyper ファイルをアップロードします。"], "ans": ["C"], "exp": "A. Tableau Desktopを開き、Tableau Prepへの接続を作成し、接続したい同僚のフローを選択します。 - Tableau Desktopは、Tableau Prepのフロー自体(実行中のプロセス)にデータソースとして直接接続することはできません。フローの「出力」結果に接続する必要があります。\nB. Tableau Desktopの [接続] ページで、[ファイルへ] の下にある [その他...] を選択し、ローカルファイルシステム上の同僚の .tfl ファイルを参照します。 - .tfl(または .tflx)ファイルは、Tableau Prepのフロー定義ファイル(設計図)であり、データそのものではありません。Tableau Desktopはこれをデータソースとして読み込めません。\nC. 同僚にフローの結果を .hyper ファイルに出力してもらいます。Tableau Desktopの [接続] ページで、[ファイルへ] の下にある [その他...] を選択し、ローカルファイルシステム上の .hyper ファイルを参照します。 - 正解です。Tableau Prepでは、[出力] ステップを使用して処理済みのデータを .hyper ファイル(Tableauの高性能な抽出ファイル)としてローカルに保存できます。Tableau Desktopは、このローカルの .hyper ファイルに直接接続して分析を開始できます。\nD. 同僚にフローの結果を .hyper ファイルに出力してもらいます。Tableau Cloudで新しいワークブックを作成し、[データに接続] ページで [ファイル] を選択し、コンピュータから .hyper ファイルをアップロードします。 - この操作は .hyper ファイルをTableau Cloudにアップロードし、パブリッシュされたデータソースを作成するものです。ローカルのTableau Desktopで「作業を開始する」ための最も直接的な方法は、Cのローカルファイル接続です。", "img": ""}, {"id": 42, "dom": 2, "cat": "分析", "q": "次の棒グラフがあります。グラフを次の図に示すように表示させたいと考えています。何を追加すべきですか?", "opts": ["A. リファレンス バンド", "B. リファレンス ライン", "C. 平均線", "D. 分布帯"], "ans": ["B"], "exp": "A. リファレンス バンド - 2つの値の間の領域(範囲)を網掛けまたは色付けする機能です。グラフ上に線を追加する機能ではありません。\nB. リファレンス ライン - 正解です。この問題は、恐らく変更後の図で軸上の特定の値(固定値、計算結果、目標値など)に線が引かれている状態を想定しています。リファレンスラインは、このような線を追加するためのTableauの標準機能です。\nC. 平均線 - 平均線は、リファレンスラインの特定のタイプであり、ビュー内のデータの平均値に線を引きます。リファレンスライン機能の一部と言えます。\nD. 分布帯 - 分布帯は、リファレンスバンドの一種であり、パーセンタイルや標準偏差など、値の統計的な分布範囲を網掛けする機能です。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NTAgMjYwIiB3aWR0aD0iNjUwIiBoZWlnaHQ9IjI2MCI+CjxyZWN0IHdpZHRoPSI2NTAiIGhlaWdodD0iMjYwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIzMjUiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7mo5LjgrDjg6njg5Xjgbjjga7lubPlnYflj4Lnhafnt5rjga7ov73liqA8L3RleHQ+CjwhLS0gQmVmb3JlIC0tPgo8ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgxMCwzNSkiPgo8dGV4dCB4PSIxNTAiIHk9IjEyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTEiIGZpbGw9IiNFMTU3NTkiIGZvbnQtd2VpZ2h0PSJib2xkIj5CZWZvcmU8L3RleHQ+CjxyZWN0IHg9IjE1IiB5PSIyMCIgd2lkdGg9IjI3MCIgaGVpZ2h0PSIxOTAiIGZpbGw9IndoaXRlIiBzdHJva2U9IiNEREQiIHJ4PSIzIi8+CjxsaW5lIHgxPSI1MCIgeTE9IjMwIiB4Mj0iNTAiIHkyPSIxOTUiIHN0cm9rZT0iI0NDQyIvPgo8bGluZSB4MT0iNTAiIHkxPSIxOTUiIHgyPSIyNzAiIHkyPSIxOTUiIHN0cm9rZT0iI0NDQyIvPgo8cmVjdCB4PSI2NSIgeT0iMTA1IiB3aWR0aD0iMzAiIGhlaWdodD0iOTAiIGZpbGw9IiM0RTc5QTciIHJ4PSIyIi8+CjxyZWN0IHg9IjExMCIgeT0iNTUiIHdpZHRoPSIzMCIgaGVpZ2h0PSIxNDAiIGZpbGw9IiM0RTc5QTciIHJ4PSIyIi8+CjxyZWN0IHg9IjE1NSIgeT0iMTI1IiB3aWR0aD0iMzAiIGhlaWdodD0iNzAiIGZpbGw9IiM0RTc5QTciIHJ4PSIyIi8+CjxyZWN0IHg9IjIwMCIgeT0iNzUiIHdpZHRoPSIzMCIgaGVpZ2h0PSIxMjAiIGZpbGw9IiM0RTc5QTciIHJ4PSIyIi8+Cjx0ZXh0IHg9IjgwIiB5PSIyMDgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSI5IiBmaWxsPSIjODg4Ij5BPC90ZXh0Pgo8dGV4dCB4PSIxMjUiIHk9IjIwOCIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjkiIGZpbGw9IiM4ODgiPkI8L3RleHQ+Cjx0ZXh0IHg9IjE3MCIgeT0iMjA4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iOSIgZmlsbD0iIzg4OCI+QzwvdGV4dD4KPHRleHQgeD0iMjE1IiB5PSIyMDgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvb ッシュボードがあります。このデータは、医療従事者のチームのために常に最新である必要があります。医療従事者とダッシュボードを共有するにはどうすればよいですか?", "opts": ["A. ダッシュボードをTableau Publicにパブリッシュする", "B. ダッシュボードをPDFに印刷する", "C. ダッシュボードをTableau Serverにパブリッシュする", "D. ダッシュボードを .twbx としてエクスポートする"], "ans": ["C"], "exp": "A. ダッシュボードをTableau Publicにパブリッシュする - Tableau Publicは、インターネット上で誰でも閲覧できる一般公開プラットフォームです。患者の「機密情報」を共有する方法としては絶対に不適切です。\nB. ダッシュボードをPDFに印刷する - PDFは、エクスポートした時点の静的なスナップショットです。「常に最新である必要がある」という要件を満たすことができず、データの更新が反映されません。\nC. ダッシュボードをTableau Serverにパブリッシュする - 正解です。Tableau Server(またはTableau Cloud)は、組織内のセキュアな環境であり、権限を持つユーザー(医療従事者チーム)だけがアクセスできるように制御できます。また、データソースへのライブ接続や定期的な抽出更新により、「常に最新」の状態を保つことができます。\nD. ダッシュボードを .twbx としてエクスポートする - .twbx(パッケージドワークブック)ファイルも、エクスポート時点のデータを含む静的なファイルです。これをメールなどで配布しても、元のデータが更新されてもファイル内のデータは更新されないため、「常に最新」の要件を満たせません。", "img": ""}, {"id": 44, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、Table1とTable2という名前の2つのテーブルを持つデータソースを持っています。Table1はプライマリテーブル、Table2はセカンダリテーブルです。アナリストはTableau Prepを使用してテーブルを結合したいと考えています。結合後のテーブルには、Table1の値のうち、Table2のどの値とも一致しない値のみが含まれるようにする必要があります。Table2の項目値はnull値として表示されなければなりません。アナリストはどのタイプの結合を使用すべきですか?", "opts": ["A. 左", "B. 内部", "C. ユニオン", "D. 左のみ", "E. 完全外部"], "ans": ["D"], "exp": "A. 左 - 左結合(Left Join)は、Table1のすべての行と、Table2の一致する行を含みます。これには、Table1とTable2の両方に一致する行も含まれてしまうため、「Table1にのみ存在する」という要件を満たしません。\nB. 内部 - 内部結合(Inner Join)は、Table1とTable2の両方に一致する行のみを含みます。これは要件と正反対です。\nC. ユニオン - ユニオンは、テーブルを縦方向(行を追加する形)に結合するものであり、列を基準にテーブルを横方向に結合する要件とは異なります。\nD. 左のみ - 正解です。Tableau Prepの結合ステップでは、結合結果ペインで「左のみ (Left Only)」を選択できます。これは、Table1には存在するが、Table2には一致するキーがない行のみを抽出します。この場合、Table2由来の項目は自動的にnullになります。\nE. 完全外部 - 完全外部結合(Full Outer Join)は、両方のテーブルのすべての行(一致するものも、しないものも)を含みます。これも要件を満たしません。", "img": ""}, {"id": 45, "dom": 2, "cat": "パラメータ", "q": "Regionという名前の項目からの値を含むChoose Regionという名前のパラメータを作成します。ユーザーがChoose Regionパラメータを使用して、異なる地域を切り替えることでチャートを操作できるようにしたいと考えています。次に何をすべきですか?", "opts": ["A. [リージョン] を [フィルター] カードに追加します。", "B. [リージョン] = [Choose Region] という式を [フィルター] カードに追加します。", "C. [Choose Region] パラメータを [ページ] カードに追加します。", "D. [Choose Region] パラメータを [単一値(リスト)] に設定します。"], "ans": ["B"], "exp": "A. [リージョン] を [フィルター] カードに追加します。 - [リージョン] 項目を直接フィルターカードに追加すると、標準のクイックフィルターが作成されますが、これは作成した [Choose Region] パラメータとは連動しません。\nB. [リージョン] = [Choose Region] という式を [フィルター] カードに追加します。 - 正解です。パラメータは、それ自体ではビューに影響を与えません。パラメータを機能させるには、計算項目やフィルターで使用する必要があります。この計算式(結果が真または偽になるブール計算)をフィルターシェルフに配置し、「真」を選択することで、パラメータで選択された値と[リージョン]項目の値が一致するデータのみがビューに表示されるようになります。\nC. [Choose Region] パラメータを [ページ] カードに追加します。 - [ページ] カードは、ディメンションのメンバーに基づいてビューを順番に(アニメーションのように)表示するために使用されます。パラメータをインタラクティブなフィルターとして機能させるために[ページ] カードに追加することはできません。\nD. [Choose Region] パラメータを [単一値(リスト)] に設定します。 - これは、パラメータコントロール(ユーザーが操作するインターフェース)の表示形式を設定するものです。パラメータがビューと連動して動作するための「次のステップ」(=フィルター設定)ではなく、パラメータの作成・設定の一部です。", "img": ""}, {"id": 46, "dom": 1, "cat": "データ接続", "q": "Dorm_Codeという名前のディメンションを含むプライマリデータソースがあります。更新された寮コードを含むセカンダリデータソースを受け取ります。更新された寮コードをTableauに取り込み、既存のビジュアライゼーションで使用する必要があります。新しい寮コードは、Dorm_Codeという既存の項目名を使用する必要があります。何をすべきですか?", "opts": ["A. セカンダリデータソースをユニオンとして取り込みます。", "B. セカンダリテーブルをプライマリデータソースへの左結合として取り込みます。 [データソース] ページで、[Dorm_Name] 項目で [計算項目の作成] を選択し、計算ウィンドウに [Dcrm_Name_New] を入力します。", "C. リレーションシップを使用してセカンダリデータソースを取り込みます。 [データ] ペインで、[Dorm_Name] を右クリックし、[参照の置換] を選択し、[Dorm_Name_New] を選択します。", "D. データブレンドを作成し、[プライマリエイリアスの編集] を選択して、プライマリデータソースのエイリアス値をセカンダリデータソースの値に置き換えます。"], "ans": ["C"], "exp": "A. セカンダリデータソースをユニオンとして取り込みます。 - ユニオンは、テーブルを縦方向(行を追加)に結合します。このシナリオでは、既存のデータに新しい情報(列)を関連付けるか、値を置き換える必要があるため、不適切です。\nB. セカンダリテーブルをプライマリデータソースへの左結合として取り込みます。 [データソース] ページで、[Dorm_Name] 項目で [計算項目の作成] を選択し、計算ウィンドウに [Dcrm_Name_New] を入力します。 - 結合は正しい方向性ですが、新しい計算項目を作成するだけでは、「既存のビジュアライゼーション」で使用されている古い項目が自動的に更新されません。手動ですべてのワークシートを修正する必要があります。\nC. リレーションシップを使用してセカンダリデータソースを取り込みます。 [データ] ペインで、[Dorm_Name] を右クリックし、[参照の置換] を選択し、[Dorm_Name_New] を選択します。 - 正解です。まずリレーションシップで新しいデータ(Dorm_Name_Newを含む)を接続します。次に、[参照の置換] 機能を使用すると、ワークブック全体で古い項目(Dorm_Name)が使用されているすべての場所(計算、フィルター、シェルフ)を、新しい項目(Dorm_Name_New)に自動的に置き換えることができます。\nD. データブレンドを作成し、[プライマリエイリアスの編集] を選択して、プライマリデータソースのエイリアス値をセカンダリデータソースの値に置き換えます。 - [エイリアスの編集] は、ディメンションのメンバー(値)の表示名(エイリアス)を変更する機能です。項目(列)自体を新しい項目に置き換える「参照の置換」とは異なる機能であり、要件を満たしません。", "img": ""}, {"id": 47, "dom": 2, "cat": "並べ替え", "q": "データアナリストは、Tableauで複数のディメンションにわたって「Sales」(売上)でデータを並べ替えるにはどうすればよいですか?", "opts": ["A. セット機能を使用してディメンションを結合し、いずれかの項目を並べ替えます。", "B. 各ディメンションを右クリックし、[並べ替え] を選択し、オプションで [データソース順] を選択します。", "C. 一番右のディメンションを右クリックし、[並べ替え] を選択し、オプションで [ネスト] を選択します。", "D. グループ機能を使用してディメンションを結合し、グループ化された項目を並べ替えます。"], "ans": ["C"], "exp": "A. セット機能を使用してディメンションを結合し、いずれかの項目を並べ替えます。 - セットは、ディメンションのメンバーを「内/外」のカテゴリに分類する機能です。ビュー全体の並べ替え、特に複数のディメンションにまたがる並べ替えには適していません。\nB. 各ディメンションを右クリックし、[並べ替え] を選択し、オプションで [データソース順] を選択します。 - [データソース順] は、アルファベット順やデータベースの順序で並べ替えるものです。メジャー(Sales)の値に基づいて並べ替えることはできません。\nC. 一番右のディメンションを右クリックし、[並べ替え] を選択し、オプションで [ネスト] を選択します。 - 正解です。 [ネスト] 並べ替えは、外側のディメンション(例:[地域])の内部で、内側のディメンション(例:[都道府県])をメジャー(Sales)に基づいて並べ替える機能です。\nD. グループ機能を使用してディメンションを結合し、グループ化された項目を並べ替えます。 - グループは、複数のメンバーを1つのカテゴリにまとめる機能です。これによりデータの詳細レベルが変わってしまい、求められる並べ替え操作とは異なります。", "img": ""}, {"id": 48, "dom": 4, "cat": "Tableau Server/Cloud", "q": "データアナリストが、Tableau Server上のダッシュボードで、売上が10万円を下回った場合に自動通知を受けたいと考えています。使用すべき機能はどれですか？", "opts": ["A. サブスクリプション", "B. データドリブンアラート", "C. カスタムビュー", "D. コメント"], "ans": ["B"], "exp": "A. サブスクリプション - サブスクリプションはビューのスナップショットを定期的にメール配信する機能です。特定の条件に基づく通知ではなく、スケジュールに基づく配信です。\nB. データドリブンアラート - 正解です。データドリブンアラートは、ビュー上の数値軸に対して閾値を設定し、データがその条件を満たした時にメール通知を送信する機能です。「売上が10万円を下回る」のような条件を設定できます。\nC. カスタムビュー - カスタムビューはフィルターやパラメーターの設定状態を保存する機能であり、条件付き通知とは無関係です。\nD. コメント - コメントはビューに対するテキストの注記機能であり、自動通知機能ではありません。", "img": ""}, {"id": 49, "dom": 2, "cat": "計算・関数", "q": "データセットに、データアナリストが不要な末尾のスペースを含む 'Category' という名前の文字列項目を持っています。アナリストが 'Category' 項目から末尾のスペースを削除するために使用すべき関数はどれですか?", "opts": ["A. LTRIM", "B. REPLACE", "C. RTRIM", "D. SPLIT"], "ans": ["C"], "exp": "A. LTRIM - LTRIM関数は、文字列の先頭(左側)にあるスペースを削除します。この問題では末尾(右側)のスペースを削除する必要があるため、不適切です。\nB. REPLACE - REPLACE関数は、文字列内の一致する部分文字列を別の文字列に置き換えます。末尾のスペースだけを削除する目的には最適ではありません。\nC. RTRIM - 正解です。RTRIM関数は、文字列の末尾(右側)にある不要なスペースを削除するために使用されます。\nD. SPLIT - SPLIT関数は、指定された区切り文字に基づいて文字列を複数の部分に分割するために使用されます。スペースの削除には使用しません。", "img": ""}, {"id": 50, "dom": 1, "cat": "ファイル形式", "q": "同僚が、データアナリストに以下のファイルを含むフォルダへのアクセスを提供します:\nSales.csv\nBook1.twb\nSales.hyper\nExport.mdb\nどのファイルがTableau抽出ファイルですか?", "opts": ["A. Book1.twb", "B. Sales.hyper", "C. Export.mdb", "D. Sales.csv"], "ans": ["B"], "exp": "A. Book1.twb - これはTableauワークブックファイル(.twb)です。ワークシートやダッシュボードの構成(設計図)を保存するファイルであり、データそのものは含まれません。\nB. Sales.hyper - 正解です。.hyperは、Tableauの高性能なデータ抽出ファイル形式の拡張子です。これはデータソースのデータのスナップショット(コピー)を保存したファイルです。\nC. Export.mdb - これはMicrosoft Accessデータベースファイル(.mdb)の拡張子です。これはTableauが接続できるデータソースの一つですが、Tableau抽出ファイルではありません。\nD. Sales.csv - これはカンマ区切り値ファイル(.csv)の拡張子です。これは一般的なテキストベースのデータソースファイルであり、Tableau抽出ファイルではありません。", "img": ""}, {"id": 51, "dom": 1, "cat": "データ接続", "q": "データアナリストが、既存のダッシュボードを更新する必要があります。現在のダッシュボードは財務結果データを表示していますが、ユーザーから予算との比較をダッシュボードに追加するよう依頼されました。実績コストと予算の両方を含む新しいデータソースが作成され、企業のTableauサイトにパブリッシュされています。アナリストは既存のダッシュボードをどのように更新すべきですか?", "opts": ["A. Tableau Desktopで新しいワークブックを作成し、新しいデータソースに接続します。古いワークブックからすべてのタブをコピーして、新しいワークブックに貼り付けます。", "B. Tableauサイトで既存のワークブックを編集し、新しいデータソースに接続します。新しいデータソースを既存のデータソースとブレンドします。", "C. Tableauサイトで既存のワークブックを編集し、新しいデータソースに接続します。[データ] メニューから、[データソースの置換] を選択します。", "D. 既存のワークブックのコピーを作成し、Tableau Desktopで開き、新しいデータソースに接続します。新しいデータソースの項目を使用して、各シートを更新します。"], "ans": ["C"], "exp": "A. Tableau Desktopで新しいワークブックを作成し、新しいデータソースに接続します。古いワークブックからすべてのタブをコピーして、新しいワークブックに貼り付けます。 - データソースが異なるワークブック間でシートをコピー＆ペーストすると、計算項目、フィルター、パラメータなどが壊れる可能性が高く、修正に多大な労力がかかるため非効率です。\nB. Tableauサイトで既存のワークブックを編集し、新しいデータソースに接続します。新しいデータソースを既存のデータソースとブレンドします。 - データブレンドは、複数の異なるデータソースをビュー上で結合するために使用します。今回のケースでは、新しいデータソース（実績と予算）が古いデータソース（実績のみ）を完全に置き換えるため、ブレンドは適切なアプローチではありません。\nC. Tableauサイトで既存のワークブックを編集し、新しいデータソースに接続します。[データ] メニューから、[データソースの置換] を選択します。 - 正解です。[データソースの置換] 機能は、既存のワークシートやダッシュボードの構造（レイアウト、計算項目、フィルターなど）を可能な限り維持したまま、基になるデータソースを新しいものに効率的に切り替えるための最適な方法です。\nD. 既存のワークブックのコピーを作成し、Tableau Desktopで開き、新しいデータソースに接続します。新しいデータソースの項目を使用して、各シートを更新します。 - [データソースの置換] を使わずに、各シートで古いデータソースの項目を新しいデータソースの項目に手動で一つずつ置き換えていくのは、非常に時間がかかり非効率です。", "img": ""}, {"id": 52, "dom": 2, "cat": "計算・関数", "q": "データセットに、不要なセミコロンを含む 'Name' という名前の文字列項目があります。'Name' 項目からセミコロンを削除するために使用すべき関数はどれですか?", "opts": ["A. TRIM", "B. CONTAINS", "C. REPLACE", "D. SPLIT"], "ans": ["C"], "exp": "A. TRIM - TRIM関数は、文字列の先頭および末尾にあるスペース（空白）を削除するために使用されます。文字列の途中にある文字やセミコロンを削除することはできません。\nB. CONTAINS - CONTAINS関数は、文字列内に特定の部分文字列が含まれているかどうかを判定し、True（真）またはFalse（偽）のブール値を返す関数です。文字列を削除・変更する機能はありません。\nC. REPLACE - 正解です。REPLACE関数は、文字列内にある特定の部分文字列を、別の文字列に置き換えるために使用されます。セミコロンを削除するには、REPLACE([Name], \";\", \"\") のように、セミコロン（\";\"）を空の文字列（\"\"）に置き換えることで実現できます。\nD. SPLIT - SPLIT関数は、指定された区切り文字（この場合はセミコロン）に基づいて文字列を複数の部分に分割するために使用されます。文字列からセミコロンを削除（置換）するのとは異なります。", "img": ""}, {"id": 53, "dom": 2, "cat": "フィルター", "q": "米国のすべての都市のデータを含むデータソースがあります。Cityディメンションを使用して、人口が100万人を超える都市を表示する動的フィルターを作成する必要があります。どのタイプのフィルターを使用すべきですか?", "opts": ["A. 一般フィルター", "B. ワイルドカードフィルター", "C. Top フィルター", "D. 条件フィルター"], "ans": ["D"], "exp": "A. 一般フィルター - [一般] フィルターは、ディメンションのメンバー（都市名など）をリストから手動で選択または除外する基本的なフィルターです。「人口が100万人を超える」といった動的な条件式を設定することはできません。\nB. ワイルドカードフィルター - [ワイルドカード] フィルターは、ディメンションのメンバー名（都市名）に基づいて、特定の文字列パターン（例：「New」で始まる、「City」で終わる）で一致するものをフィルタリングするために使用されます。メジャー（人口）の数値に基づく条件には使用できません。\nC. Top フィルター - [Top] フィルターは、「人口の上位10都市」や「売上の下位5都市」のように、メジャーに基づいて上位または下位のN件を抽出するために使用されます。100万人という特定のしきい値を超えるすべての都市を抽出するのには適していません。\nD. 条件フィルター - 正解です。ディメンションのフィルター設定には [条件] タブが含まれており、ここで [項目によって] を選択し、別のメジャー（この場合は人口）に基づいた条件式（例: SUM([Population]) > 1000000）を指定できます。これにより、条件を満たす都市のみを動的に表示できます。", "img": ""}, {"id": 54, "dom": 4, "cat": "パブリッシュ", "q": "データベースに接続するワークブックがあります。そのデータベースには認証が必要です。ワークブックをパブリッシュし、データの毎日の更新をスケジュールする予定です。更新をスケジュールするために満たす必要がある2つの条件はどれですか?(2つ選択)", "opts": ["A. 認証情報を埋め込む必要があります。", "B. データソースを .hyper ファイルとして保存する必要があります。", "C. データソースはライブ接続を使用する必要があります。", "D. データを抽出する必要があります。"], "ans": ["A", "D"], "exp": "A. 認証情報を埋め込む必要があります。 - 正解です。スケジュールされた更新は、ユーザーが不在の時（例：夜間）に自動実行されます。Tableau Serverがデータベースに自動でアクセスしてデータを取得できるように、認証情報（パスワードなど）をパブリッシュ時に埋め込んでおく必要があります。\nB. データソースを .hyper ファイルとして保存する必要があります。 - .hyperはTableau抽出ファイルの形式ですが、更新をスケジュールするための前提条件は「抽出(D)」に設定することであり、.hyperファイルとして別途保存することではありません。\nC. データソースはライブ接続を使用する必要があります。 - ライブ接続は、データがリアルタイムでデータベースに照会される接続方法です。「スケジュールされた更新」は、抽出接続に対してのみ実行される機能であり、ライブ接続では使用しません。\nD. データを抽出する必要があります。 - 正解です。「スケジュールされた更新（リフレッシュ）」とは、データソースのコピー（抽出）を最新の状態に更新する操作のことです。したがって、データ接続が「抽出」に設定されていることが大前提となります。", "img": ""}, {"id": 55, "dom": 3, "cat": "ダッシュボード", "q": "ダッシュボードにフィルターアクションを設定する際、ソースシートでデータポイントの選択を解除したときの動作として、どのオプションを設定できますか？", "opts": ["A. 「フィルターを保持」- 最後に選択したフィルターを維持する", "B. 「すべての値を表示」- フィルターを解除してすべてのデータを表示する", "C. 「すべての値を除外」- ターゲットシートのすべてのデータを非表示にする", "D. 「上記すべて」- A、B、Cのすべてが設定可能なオプションである"], "ans": ["D"], "exp": "A. 「フィルターを保持」- 最後に選択したフィルターを維持する - フィルターアクションの「選択項目をクリアした場合」の設定オプションの1つです。選択解除しても直前のフィルター状態を維持します。\nB. 「すべての値を表示」- フィルターを解除してすべてのデータを表示する - これもオプションの1つで、デフォルト設定です。選択解除するとターゲットシートにすべてのデータが表示されます。\nC. 「すべての値を除外」- ターゲットシートのすべてのデータを非表示にする - これもオプションの1つです。選択解除するとターゲットシートが空になります。データを選択するまでターゲットを隠したい場合に使用します。\nD. 「上記すべて」 - 正解です。フィルターアクションの「選択項目をクリアした場合」には「フィルターを保持」「すべての値を表示」「すべての値を除外」の3つのオプションすべてが用意されています。用途に応じて使い分けます。", "img": ""}, {"id": 56, "dom": 2, "cat": "LOD表現", "q": "データアナリストが、カテゴリ別の売上ビューで、各カテゴリ内の顧客ごとの売上合計を集計し、その平均をカテゴリレベルで表示したいと考えています。ビューにはカテゴリのみが表示されています。使用すべきLOD式はどれですか？", "opts": ["A. AVG({INCLUDE [Customer ID] : SUM([Sales])})", "B. AVG({FIXED [Customer ID] : SUM([Sales])})", "C. {FIXED [Category] : AVG([Sales])}", "D. SUM([Sales]) / COUNTD([Customer ID])"], "ans": ["A"], "exp": "A. AVG({INCLUDE [Customer ID] : SUM([Sales])}) - 正解です。INCLUDE LODはビューの詳細レベル（カテゴリ）に[Customer ID]を追加した粒度で計算します。内側のSUM([Sales])が各カテゴリ×顧客の売上合計を算出し、外側のAVGがカテゴリレベルでその平均を返します。INCLUDEはビューのフィルターの影響を受けるため、フィルター適用時も正しく動作します。\nB. AVG({FIXED [Customer ID] : SUM([Sales])}) - FIXEDは顧客ごとの売上合計をビューに関係なく計算します。カテゴリのフィルターを適用しても、FIXEDは全データで計算されるため、カテゴリ内の顧客に限定されません。\nC. {FIXED [Category] : AVG([Sales])} - カテゴリごとの行レベル売上の平均を返しますが、「顧客ごとの売上合計の平均」とは異なる結果になります。顧客の粒度が考慮されません。\nD. SUM([Sales]) / COUNTD([Customer ID]) - 売上合計を顧客数で割る計算です。顧客ごとの売上にばらつきがある場合、AVG({INCLUDE...})とは異なる結果になります（加重平均 vs 単純平均）。", "img": ""}, {"id": 57, "dom": 3, "cat": "ストーリー", "q": "2つのストーリーポイントを含む次のストーリーを作成します。ストーリーポイントの形式を変更して、ストーリーポイントの総数のうち現在のストーリーポイント番号が表示されるようにしたいと考えています。どのレイアウトオプションを使用すべきですか?", "opts": ["A. ドット", "B. 矢印のみ", "C. キャプションボックス", "D. 数値"], "ans": ["D"], "exp": "A. ドット - このレイアウトオプションは、ナビゲーターとして一連のドットを表示し、現在のポイントを強調表示しますが、「1/2」のような総数と現在の番号は表示しません。\nB. 矢印のみ - このレイアウトオプションは、ナビゲーション用の左右の矢印のみを表示し、現在のポイント番号や総数を一切表示しません。\nC. キャプションボックス - このレイアウトオプションは、各ストーリーポイントに設定されたキャプション（タイトルテキスト）をナビゲーターとしてタブのように表示します。番号形式の表示は行いません。\nD. 数値 - 正解です。[レイアウト] オプションで [数値] を選択すると、「1 / 2」（2のうち1）のように、総ポイント数と現在のポイント番号がナビゲーターに表示されます。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MDAgMjAwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjIwMCI+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iMjAwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIyNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7jgrnjg4jjg7zjg6rjg7zjg4rjg5PjgrLjg7zjgr/jg7wgLSDmlbDlgKTjg6zjgqTjgqLjgqbjg4g8L3RleHQ+CjxyZWN0IHg9IjMwIiB5PSI0MCIgd2lkdGg9IjQ0MCIgaGVpZ2h0PSIxNDAiIGZpbGw9IndoaXRlIiBzdHJva2U9IiNEREQiIHJ4PSI0Ii8+CjwhLS0gTmF2aWdhdG9yIGJhciAtLT4KPHJlY3QgeD0iNDAiIHk9IjUwIiB3aWR0aD0iNDIwIiBoZWlnaHQ9IjMwIiBmaWxsPSIjRjBGMEYwIiByeD0iMyIvPgo8cmVjdCB4PSI0NSIgeT0iNTUiIHdpZHRoPSI1NSIgaGVpZ2h0PSIyMCIgZmlsbD0iIzRFNzlBNyIgcng9IjIiLz4KPHRleHQgeD0iNzIiIHk9IjY5IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTEiIGZpbGw9IndoaXRlIiBmb250LXdlaWdodD0iYm9sZCI+MTwvdGV4dD4KPHJlY3QgeD0iMTA1IiB5PSI1NSIgd2lkdGg9IjU1IiBoZWlnaHQ9IjIwIiBmaWxsPSIjRThFOEU4IiByeD0iMiIgc3Ryb2tlPSIjQ0NDIi8+Cjx0ZXh0IHg9IjEzMiIgeT0iNjkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMSIgZmlsbD0iIzY2NiI+MjwvdGV4dD4KPCE [PowerPointとしてエクスポート] は、ワークシートをPDFではなくPowerPointファイルとして出力するための機能です。\nE. バージョンとしてエクスポート - [ファイル] > [バージョンとしてエクスポート] は、ワークブックを古いTableauバージョン形式で保存するための機能であり、PDFの設定とは関係ありません。", "img": ""}, {"id": 60, "dom": 2, "cat": "ビジュアライゼーション", "q": "デュアルアクシス(二重軸)チャートを持つビジュアライゼーションを作成する予定です。デュアルアクシスチャートには、シェイプチャートとラインチャートが含まれ、軸には Population という名前の同じメジャーを使用します。シェイプをラインよりもはるかに大きく見えるように設定する必要があります。何をすべきですか?", "opts": ["A. Population を複製します。複製を2つ目の [マーク] カードにドラッグし、マークのサイズを個別に設定します。", "B. デフォルトのシェイプよりも大きいカスタムシェイプを作成し、そのシェイプを [マイリポジトリ] の [シェイプ] フォルダに追加します。", "C. 2つ目の軸で、[マーク] カードの [シェイプ] を選択します。[シェイプパレットの選択] から [カスタム] を選択し、[リセット] を選択します。", "D. Population を不連続ディメンションに変更します。"], "ans": ["A"], "exp": "A. Population を複製します。複製を2つ目の [マーク] カードにドラッグし、マークのサイズを個別に設定します。 - 正解です。デュアルアクシスチャートを作成すると、[マーク] カードには軸ごとに独立した設定（カード）が生成されます。Populationの複製を2つ目の軸として使用することで、一方のマークタイプを [シェイプ] に、もう一方を [ライン] に設定し、それぞれの [マーク] カードの [サイズ] スライダーを個別に調整して、シェイプのサイズだけを大きくすることができます。\nB. デフォルトのシェイプよりも大きいカスタムシェイプを作成し、そのシェイプを [マイリポジトリ] の [シェイプ] フォルダに追加します。 - カスタムシェイプを追加することは可能ですが、これはシェイプの「形状」を変更するものであり、[マーク] カードの [サイズ] スライダーによる制御とは別です。ラインとの相対的なサイズ差を効率的に調整する方法ではありません。\nC. 2つ目の軸で、[マーク] カードの [シェイプ] を選択します。[シェイプパレットの選択] から [カスタム] を選択し、[リセット] を選択します。 - これは、使用するシェイプの種類を選択またはリセットする操作であり、マークの [サイズ] を調整する操作ではありません。\nD. Population を不連続ディメンションに変更します。 - メジャー（Population、量的データ）をディメンション（カテゴリデータ）に変更すると、チャートの軸の性質が根本的に変わり、意図したデュアルアクシスチャート（特にラインチャート）が作成できなくなります。サイズ設定とは関係ありません。", "img": ""}, {"id": 61, "dom": 1, "cat": "データ操作", "q": "データアナリストが、データペインで都道府県フィールドの複数の値を「東日本」「西日本」のようにカテゴリ分けしたいと考えています。グループとセットの違いとして正しいものはどれですか？", "opts": ["A. グループは複数の値をまとめて新しいカテゴリを作成し、セットはIn/Outの2つに分類する", "B. セットは複数の値をまとめて新しいカテゴリを作成し、グループはIn/Outの2つに分類する", "C. グループもセットも全く同じ機能である", "D. グループは計算フィールドでのみ作成でき、セットはUIからのみ作成できる"], "ans": ["A"], "exp": "A. グループは複数の値をまとめて新しいカテゴリを作成し、セットはIn/Outの2つに分類する - 正解です。グループはディメンションの値を複数のカテゴリにまとめます（例：東京・神奈川→関東）。セットは条件に基づいてメンバーを「内（In）」と「外（Out）」の2グループに分類します。\nB. セットは複数の値をまとめて新しいカテゴリを作成し、グループはIn/Outの2つに分類する - グループとセットの説明が逆です。\nC. グループもセットも全く同じ機能である - 異なる機能です。グループは複数カテゴリ、セットは2値分類です。\nD. グループは計算フィールドでのみ作成でき、セットはUIからのみ作成できる - どちらもUIから作成可能です。", "img": ""}, {"id": 62, "dom": 1, "cat": "データ接続", "q": "TableauワークブックをMicrosoft Excelスプレッドシート内のデータセットに接続したいと考えています。Tableau Desktopから何をすべきですか?", "opts": ["A. [データ] メニューから [新しいデータソース] を選択します", "B. [データ] メニューから [データソースの置換] を選択します", "C. [ファイル] メニューから [ワークブックのインポート] を選択します", "D. [ファイル] メニューから [新規] を選択します"], "ans": ["A"], "exp": "A. [データ] メニューから [新しいデータソース] を選択します - 正解です。すでにワークブックを開いている状態で、Excelファイルなどの新しいデータソースを追加で接続するには、[データ] メニューの [新しいデータソース] オプションを使用します。これにより、[接続] ペインが開き、Microsoft Excelを選択できます。\nB. [データ] メニューから [データソースの置換] を選択します - [データソースの置換] は、ワークブックがすでに使用しているデータソースを、別のデータソースに（置き換える）ために使用する機能です。新しいデータセットに初めて接続する操作ではありません。\nC. [ファイル] メニューから [ワークブックのインポート] を選択します - [ワークブックのインポート] は、別のTableauワークブック（通常は .twb）からシートやダッシュボードを取り込むための機能であり、Excelデータソースに接続するためのものではありません。\nD. [ファイル] メニューから [新規] を選択します - [ファイル] > [新規] は、まったく新しい、空のTableauワークブックを作成する操作です。これによりスタートページが表示され、そこからExcelに接続できますが、既存のワークブックに新しいデータソースを追加する操作はAが適切です。", "img": ""}, {"id": 63, "dom": 2, "cat": "計算・関数", "q": "次のワークシートを作成します。Pick Measureパラメータには、次の値のリストが含まれています。ユーザーはPick Measureから値を選択して、SalesメジャーまたはProfitメジャーのいずれかを表示するようにビジュアライゼーションを変更できます。メジャーを切り替えるために、Selected Measure計算項目で使用される式はどれですか?", "opts": ["A. Case [Pick Measure] WHEN 1 then ([Sales]) WHEN 2 then ([Profit]) END", "B. Case AVG([Pick Measure]) WHEN [Sales] then 1 WHEN [Profit] then 2 END", "C. Case [Pick Measure]: WHEN [Sales] then 1 WHEN [Profit] then 2 END", "D. Case STFMEPick Measure]) WHEN \"Sales\" then ([Sales]) WHEN \"Profit\" then ([Profit]) e::i"], "ans": ["A"], "exp": "A. Case [Pick Measure] WHEN 1 then ([Sales]) WHEN 2 then ([Profit]) END - 正解です。パラメータは「表示名」（Sales、Profit）と「実際の値」（1、2）を持っています。このCASE文は、パラメータの「実際の値」（1または2）を正しく参照し、選択に応じて [Sales] メジャーまたは [Profit] メジャーを返します。\nB. Case AVG([Pick Measure]) WHEN [Sales] then 1 WHEN [Profit] then 2 END - この式は構文的にも論理的にも間違っています。CASE文でパラメータを集計（AVG）する必要はなく、また WHEN 句でパラメータの値（1または2）をメジャー（[Sales]）と比較することはできません。\nC. Case [Pick Measure]: WHEN [Sales] then 1 WHEN [Profit] then 2 END - この式には構文エラー（[Pick Measure]の後のコロン）があります。また、 B と同様に、パラメータの値をメジャー自体（[Sales]）と比較しようとしているため、論理的に誤りです。\nD. Case STFMEPick Measure]) WHEN \"Sales\" then ([Sales]) WHEN \"Profit\" then ([Profit]) e::i - この式には多くの構文エラー（STFME、e::iなど）が含まれています。仮に Case [Pick Measure] WHEN \"Sales\"... を意図していたとしても、パラメータの「実際の値」は整数（1）であり、文字列（\"Sales\"、これは「表示名」）ではないため、この条件は一致しません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MDAgMjgwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjI4MCI+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iMjgwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIyNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7jg5Hjg6njg6Hjg7zjgr/jg7zliIfmm7/jg6/jg7zjgq/jgrfjg7zjg4g8L3RleHQ+CjxyZWN0IHg9IjIwIiB5PSIzNSIgd2lkdGg9IjQ2MCIgaGVpZ2h0PSIyMzAiIGZpbGw9IndoaXRlIiBzdHJva2U9IiNEREQiIHJ4PSI0Ii8+CjwhLS0gUGFyYW1ldGVyIGNvbnRyb2wgLS0+CjxyZWN0IHg9IjMwIiB5PSI0NSIgd2lkdGg9IjEyMCIgaGVpZ2h0PSI1NSIgZmlsbD0iI0Y4RjhGOCIgc3Ryb2tlPSIjQ0NDIiByeD0iMyIvPgo8dGV4dCB4PSI5MCIgeT0iNjIiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMCIgZmlsbD0iIzU1NSIgZm9udC13ZWlnaHQ9ImJvbGQiPlBpY2sgTWVhc3VyZTwvdGV4dD4KPHJlY3QgeD0iNDAiIHk9IjcwIiB3aWR0aD0iMTAwIiBoZWlnaHQ9IjIwIiBmaWxsPSJ3aGl0ZSIgc3Ryb2tlPSIjNEU3OUE3IiByeD0iMiIvPgo8dGV4dCB4PSI5MCIgeT0iODQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMCIgZmlsbD0iIzRFNzlBNyI+U2FsZXMg4pa8PC90ZXh0Pgo8IS0tIEJhciBjaGFydCAtLT4KPGcgdHJhbnNmb3JtPSJ0cmFuc2xhdGUoMTYwLDUwKSI+Cjx0ZXh0IHg9IjE0MCIgeT0iMTAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMSIgZmlsbD0iIzU1NSIgZm9udC13ZWlnaHQ9ImJvbGQiPlNhbGVzIGJ5IENhdGVnb3J5PC90ZXh0Pgo8bGluZSB4MT0iOTAiIHkxPSIyNSIgeDI9IjkwIiB5Mj0iMTk1IiBzdHJva2U9IiNDQ0MiLz4KPGxpbmUgeDE9IjkwIiB5MT0iMTk1IiB4Mj0iMzAwIiB5Mj0iMTk1IiBzdHJva2U9IiNDQ0MiLz4KPHRleHQgeD0iNTUiIHk9IjYwIiB0ZXh0LWFuY2hvcj0iZW5kIiBmb250LWZhbWlseT0iQXJpYWwiIGZ テナの中に、すべてのチャートを配置する - 水平コンテナは横並び配置のため、3つ目を下に配置できません。\nC. 垂直コンテナの中に、すべてのチャートを配置する - 垂直コンテナだけでは1と2が横並びになりません。\nD. 浮動レイアウトですべて配置する - 浮動は自由配置が可能ですが、リサイズ時の自動調整ができず、タイルコンテナの方が推奨されます。", "img": ""}, {"id": 65, "dom": 1, "cat": "ファイル形式", "q": "データアナリストが、データソースの接続情報とフィールドのカスタマイズ（名前の変更、計算フィールド、デフォルト書式設定など）を保存して他のチームメンバーと共有したいと考えています。データ自体は含めません。保存すべきファイル形式はどれですか？", "opts": ["A. .twb（Tableauワークブック）", "B. .tds（Tableauデータソース）", "C. .hyper（Tableau抽出）", "D. .twbx（パッケージドワークブック）"], "ans": ["B"], "exp": "A. .twb（Tableauワークブック） - .twbファイルはワークブック全体（シート、ダッシュボード構成）を保存しますが、データソースのカスタマイズのみを共有する目的には大きすぎます。\nB. .tds（Tableauデータソース） - 正解です。.tdsファイルはデータソースの接続情報、フィールドのカスタマイズ（名前変更、計算フィールド、デフォルト書式等）をXML形式で保存します。データ自体は含まれず、軽量で共有に適しています。\nC. .hyper（Tableau抽出） - .hyperファイルはデータそのものを含む抽出ファイルであり、接続設定やカスタマイズの保存ファイルではありません。\nD. .twbx（パッケージドワークブック） - .twbxはワークブックとデータをパッケージ化したファイルです。データソース設定のみの共有には不適切です。", "img": ""}, {"id": 66, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、顧客の購入金額の分布を確認するためにヒストグラムを作成したいと考えています。ヒストグラムを作成するために最初に必要な手順はどれですか？", "opts": ["A. メジャーフィールドからビンを作成する", "B. ディメンションフィールドをグループ化する", "C. 計算フィールドでIF文を使って分類する", "D. 棒グラフを作成してからビンを追加する"], "ans": ["A"], "exp": "A. メジャーフィールドからビンを作成する - 正解です。ヒストグラムを作成するには、まず連続値のメジャー（例：購入金額）を右クリック→「作成」→「ビン」でビンを作成します。ビンサイズを指定すると、データが均等な範囲のグループに分割されます。\nB. ディメンションフィールドをグループ化する - グループ化は離散値の手動分類であり、連続値の自動区間分割（ビン）とは異なります。\nC. 計算フィールドでIF文を使って分類する - IF文での手動分類も可能ですが、ビン機能の方がはるかに簡単です。\nD. 棒グラフを作成してからビンを追加する - 手順が逆です。まずビンを作成し、それを使ってヒストグラムを構築します。", "img": ""}, {"id": 67, "dom": 2, "cat": "計算・関数", "q": "データアナリストが、文字列フィールドの値が「 Tokyo 」のように前後にスペースを含んでいることに気づきました。先頭と末尾の両方のスペースを一度に削除するために使用すべき関数はどれですか？", "opts": ["A. LTRIM([City])", "B. RTRIM([City])", "C. TRIM([City])", "D. REPLACE([City], ' ', '')"], "ans": ["C"], "exp": "A. LTRIM([City]) - LTRIM関数は先頭（左側）のスペースのみを削除します。末尾のスペースは残ります。\nB. RTRIM([City]) - RTRIM関数は末尾（右側）のスペースのみを削除します。先頭のスペースは残ります。\nC. TRIM([City]) - 正解です。TRIM関数は文字列の先頭と末尾の両方のスペースを削除します。文字列中間のスペースには影響しません。\nD. REPLACE([City], ' ', '') - REPLACE関数はすべてのスペースを削除してしまうため、「New York」が「NewYork」になるなど、意図しない結果になります。", "img": ""}, {"id": 68, "dom": 4, "cat": "Tableau Server/Cloud", "q": "複数のユーザーのためにTableauサブスクリプションを作成する予定です。どの2つの形式を使用できますか?(2つ選択)", "opts": ["A. 画像", "B. Microsoft Excel", "C. Microsoft PowerPoint", "D. PDF"], "ans": ["A", "D"], "exp": "A. 画像 - 正解です。Tableauのサブスクリプション機能では、ビューのスナップショットを画像（.png）としてEメールの本文に含めて送信することができます。\nB. Microsoft Excel - サブスクリプション機能でサポートされている形式は画像とPDFです。Excel形式で送信する機能は標準のサブスクリプションオプションには含まれていません。\nC. Microsoft PowerPoint - Excelと同様に、PowerPoint形式も標準のサブスクリプション機能ではサポートされていません。\nD. PDF - 正解です。サブスクリプションを設定する際、ビューやダッシュボードをPDFファイルとして添付してEメールで送信するオプションを選択できます。", "img": ""}, {"id": 69, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、Tableau Prep Builderでデータクレンジングを完了しました。結果を出力する際、同僚がTableau Desktopで直接使用できるファイル形式はどれですか？", "opts": ["A. .csv（カンマ区切りファイル）", "B. .hyper（Tableau抽出ファイル）", "C. .xlsx（Excelファイル）", "D. AとBの両方"], "ans": ["D"], "exp": "A. .csv（カンマ区切りファイル） - Tableau Prepは.csvファイルとして出力可能で、Tableau Desktopで接続できます。\nB. .hyper（Tableau抽出ファイル） - Tableau Prepは.hyperファイルとして出力可能で、Tableau Desktopで直接開けます。パフォーマンスも優れています。\nC. .xlsx（Excelファイル） - Tableau Prepの標準出力形式にExcelファイルは含まれません。\nD. AとBの両方 - 正解です。Tableau Prepは「ファイルに出力」で.csvと.hyperの両方を出力でき、どちらもTableau Desktopで使用可能です。", "img": ""}, {"id": 70, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストは、ユーザーがコンピュータ、または電話やタブレットから同じURLリンクを使用してアクセスできる売上ダッシュボードを開発する必要があります。アナリストは、特定のデバイス用にフォーマットされたダッシュボードをどのように作成すべきですか?", "opts": ["A. ダッシュボードにデバイスレイアウトを追加し、デバイスに基づいて適切なレイアウトが表示されるようにします。", "B. デバイスタイプごとにワークブックを作成し、どのデバイスでどれを開くかをユーザーに知らせます。", "C. ダッシュボードで浮動コンテナを使用し、各デバイスに合わせてコンテンツがレスポンシブにシフトするようにします。", "D. ダッシュボードのサイズを [自動] に設定し、Tableauが各デバイスサイズに合わせてレイアウトを自動的に調整するようにします。"], "ans": ["A"], "exp": "A. ダッシュボードにデバイスレイアウトを追加し、デバイスに基づいて適切なレイアウトが表示されるようにします。 - 正解です。Tableauのデバイスレイアウト機能は、単一のダッシュボード（同じURL）内で、デフォルト（デスクトップ）レイアウトに加えて、タブレット用や電話用の特定のレイアウトを設計・追加することができます。アクセスしたデバイスに応じて最適なレイアウトが自動的に表示されます。\nB. デバイスタイプごとにワークブックを作成し、どのデバイスでどれを開くかをユーザーに知らせます。 - これは「同じURLリンクを使用する」という要件に反します。また、管理が煩雑になり、ユーザーにとっても不便です。\nC. ダッシュボードで浮動コンテナを使用し、各デバイスに合わせてコンテンツがレスポンシブにシフトするようにします。 - 浮動コンテナ自体がレスポンシブにコンテンツをシフトするわけではありません。デバイスレイアウト機能（A）が、レスポンシブな表示（特に電話）を実現するための正しい方法です。\nD. ダッシュボードのサイズを [自動] に設定し、Tableauが各デバイスサイズに合わせてレイアウトを自動的に調整するようにします。 - [自動] サイズ設定は、ブラウザウィンドウのサイズに合わせてダッシュボード全体を比例的に拡大・縮小するだけです。電話のような縦長の小さな画面では、レイアウトが崩れたり、非常に小さく表示されたりするため、デバイス固有のフォーマット（A）には適していません。", "img": ""}, {"id": 71, "dom": 4, "cat": "Tableau Server/Cloud", "q": "データを1時間ごとに更新する必要があります。何を選択すべきですか?", "opts": ["A. 新規", "B. 抽出の更新", "C. 接続されているワークブック", "D. 接続"], "ans": ["B"], "exp": "A. 新規 - [新規] オプションは、通常、新しいワークブックやデータソースなど、新しいコンテンツを作成するために使用されます。既存のコンテンツの更新スケジュールを設定するものではありません。\nB. 抽出の更新 - 正解です。これはTableau ServerまたはTableau Cloudでデータソースを選択した際に表示されるタブまたはセクションです。ここで、データ抽出の更新スケジュール（例：1時間ごと）を新規に追加したり、既存のスケジュールを関連付けたりすることができます。\nC. 接続されているワークブック - このタブは、現在このデータソースを使用しているすべてのワークブックのリストを表示します。これは更新スケジュールを設定する場所ではなく、依存関係（変更によってどのワークブックが影響を受けるか）を確認するための場所です。\nD. 接続 - このタブは、データソース自体の接続詳細（例：データベースサーバー名、認証情報）を表示または編集する場所です。データの更新スケジュールを設定する場所ではありません。", "img": ""}, {"id": 72, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストがダッシュボードでコンテナを使用しています。コンテナのサイズが変更されても、コンテナ内の複数のオブジェクトが常に同じ幅または高さを占めるようにするには、アナリストはどうすべきですか?", "opts": ["A. オブジェクトを浮動させ、サイズを手動で調整します。", "B. 各オブジェクトのサイズを個別に調整します。", "C. [均等に配置] オプションを使用します。", "D. [レイアウト] タブを使用して、各オブジェクトのサイズを設定します。"], "ans": ["C"], "exp": "A. オブジェクトを浮動させ、サイズを手動で調整します。 - 浮動オブジェクトは、コンテナ（特にタイル表示コンテナ）のサイズ変更ルールに従いません。また、手動での調整は、コンテナのサイズ変更時に自動的に均等なサイズを維持する方法ではありません。\nB. 各オブジェクトのサイズを個別に調整します。 - 各オブジェクトのサイズを個別に固定することはできますが、コンテナのサイズが変更されたときに、すべてのオブジェクトが自動的に同じ幅や高さを維持するようにはなりません。\nC. [均等に配置] オプションを使用します。 - 正解です。水平または垂直コンテナのメニューから [均等に配置] を選択すると、そのコンテナ内のすべてのオブジェクトが、コンテナの合計サイズに基づいて利用可能なスペースを等しく（同じ幅または高さで）分割するように強制されます。コンテナのサイズを変更しても、この均等な分布は維持されます。\nD. [レイアウト] タブを使用して、各オブジェクトのサイズを設定します。 - [レイアウト] タブで特定のピクセル数にサイズを固定することはできますが、これは「均等に配置」とは異なります。コンテナのサイズが変更された場合、固定サイズのオブジェクトは均等に調整されません。", "img": ""}, {"id": 73, "dom": 1, "cat": "データ接続", "q": "Tableau Desktopでデータモデルを構築する際、2つのテーブル間にリレーションシップを作成しました。リレーションシップに関する記述として正しいものはどれですか？", "opts": ["A. リレーションシップでは内部結合・左結合などの結合タイプを明示的に指定する必要がある", "B. リレーションシップは常にすべてのテーブルのデータを事前に結合する", "C. リレーションシップはクエリ実行時に必要な結合を自動的に判断して実行する", "D. リレーションシップでは1つのテーブルからしかフィールドを使用できない"], "ans": ["C"], "exp": "A. リレーションシップでは内部結合・左結合などの結合タイプを明示的に指定する必要がある - 誤りです。リレーションシップでは結合タイプの指定は不要で、Tableauがクエリに基づいて最適な結合を自動選択します。\nB. リレーションシップは常にすべてのテーブルのデータを事前に結合する - 誤りです。リレーションシップは遅延評価（Lazy Evaluation）を行い、ビューで必要なデータのみを取得します。\nC. リレーションシップはクエリ実行時に必要な結合を自動的に判断して実行する - 正解です。リレーションシップはテーブル間の論理的関係を定義するだけで、実際の結合はビューの構成に基づいて実行時に自動決定されます。\nD. リレーションシップでは1つのテーブルからしかフィールドを使用できない - 誤りです。関連するすべてのテーブルのフィールドをビューで自由に使用できます。", "img": ""}, {"id": 74, "dom": 3, "cat": "エクスポート", "q": "データアナリストが、Microsoft Wordで年次報告書を作成しています。アナリストはTableau Desktopで、ワークシートにチャートを作成しました。アナリストは、年次報告書に追加するためにチャートの画像を作成したいと考えています。アナリストが画像を作成するために使用すべき2つのオプションはどれですか?(2つ選択)", "opts": ["A. [ファイル] メニューの [バージョンとしてエクスポート] オプション", "B. [ワークシート] メニューの [コピー] オプション", "C. [ワークシート] メニューの [エクスポート] オプション", "D. [ダッシュボード] メニューの [イメージをコピー] オプション", "E. [ダッシュボード] メニューの [イメージをエクスポート] オプション"], "ans": ["B", "C"], "exp": "A. [ファイル] メニューの [バージョンとしてエクスポート] オプション - [ファイル] > [バージョンとしてエクスポート] は、ワークブックを以前のTableauバージョン形式で保存するための機能であり、チャートを画像として作成するものではありません。\nB. [ワークシート] メニューの [コピー] オプション - 正解です。[ワークシート] > [コピー] > [イメージ] を選択すると、チャートが画像としてクリップボードにコピーされ、Word文書に直接貼り付けることができます。\nC. [ワークシート] メニューの [エクスポート] オプション - 正解です。[ワークシート] > [エクスポート] > [イメージ] を選択すると、チャートを画像ファイル（.pngなど）として保存できます。その後、そのファイルをWord文書に挿入できます。\nD. [ダッシュボード] メニューの [イメージをコピー] オプション - 問題文は「ワークシート」でチャートを作成したと明記しています。[ダッシュボード] メニューは、ダッシュボード編集画面で使用するものであり、このコンテキストでは適切ではありません。\nE. [ダッシュボード] メニューの [イメージをエクスポート] オプション - Dと同様に、[ダッシュボード] メニューはダッシュボードをエクスポートするためのものであり、「ワークシート」のチャートをエクスポートする操作とは異なります。", "img": ""}, {"id": 75, "dom": 3, "cat": "書式設定", "q": "データアナリストがワークブック設定を書式設定する必要がある場合、[ワークブックの書式設定] ペインで利用可能なオプションはどれですか?", "opts": ["A. ダッシュボードの高さと幅のピクセル設定", "B. フォントとカラーパレット", "C. フォントと線", "D. 数値形式とシェーディング"], "ans": ["C"], "exp": "A. ダッシュボードの高さと幅のピクセル設定 - ダッシュボードのサイズ（高さと幅のピクセル設定）は、ダッシュボードペイン（左側）の [サイズ] セクションで設定します。[ワークブックの書式設定] ペイン（[書式設定] > [ワークブック]）では設定しません。\nB. フォントとカラーパレット - [ワークブックの書式設定] ペインには [フォント] の設定はありますが、[カラーパレット] の設定は含まれていません。カラーパレットは通常、[マーク] カードの [色] や色の凡例から編集します。\nC. フォントと線 - 正解です。[書式設定] > [ワークブック] からアクセスする [ワークブックの書式設定] ペインでは、ワークブック全体に適用されるデフォルトの [フォント] スタイルと [線]（グリッド線、軸線、ゼロ線など）の書式設定を一元管理できます。\nD. 数値形式とシェーディング - [ワークブックの書式設定] ペインには [シェーディング]（背景色）の設定は含まれますが、[数値形式] は含まれません。数値形式は、データペインで個々のメジャーの [デフォルトのプロパティ] として設定するか、各ワークシートの [書式設定] ペインで設定します。", "img": ""}, {"id": 76, "dom": 4, "cat": "Tableau Server/Cloud", "q": "Tableau Server上で、あるユーザーがパブリッシュ済みのワークブックを閲覧し、フィルターを操作できるが、ワークブック自体の編集はできないようにしたいと考えています。割り当てるべきサイトロールはどれですか？", "opts": ["A. Creator", "B. Explorer", "C. Viewer", "D. Unlicensed"], "ans": ["C"], "exp": "A. Creator - Creatorはワークブックの作成・編集・パブリッシュ、データソースの管理、Prepフローの実行など最も広い権限を持ちます。閲覧のみの要件には過剰です。\nB. Explorer - Explorerはワークブックの閲覧に加え、Web編集も可能です。閲覧のみの要件にはExplorerの権限は過剰です。\nC. Viewer - 正解です。Viewerロールはパブリッシュされたビューの閲覧、フィルター操作、データのダウンロード、サブスクリプション・アラートの設定が可能ですが、ワークブックの編集はできません。\nD. Unlicensed - Unlicensedユーザーはサーバーにログインできず、一切のコンテンツにアクセスできません。", "img": ""}, {"id": 77, "dom": 3, "cat": "エクスポート", "q": "データアナリストが、Tableau Desktopで作成したビューの基になるデータをExcelファイルとしてエクスポートしたいと考えています。使用すべき操作はどれですか？", "opts": ["A. 「ワークシート」メニュー→「エクスポート」→「クロス集計としてExcelへ」", "B. 「ファイル」メニュー→「名前を付けて保存」→ .xlsx形式を選択", "C. 「データ」メニュー→「データのエクスポート」", "D. 「ワークシート」メニュー→「コピー」→「データ」"], "ans": ["A"], "exp": "A. 「ワークシート」メニュー→「エクスポート」→「クロス集計としてExcelへ」 - 正解です。この操作でビューに表示されているデータがExcelのクロス集計形式（表形式）でエクスポートされます。\nB. 「ファイル」メニュー→「名前を付けて保存」→ .xlsx形式を選択 - Tableau Desktopの「名前を付けて保存」はTableauワークブック形式(.twb/.twbx)の保存であり、Excel形式での保存はできません。\nC. 「データ」メニュー→「データのエクスポート」 - 「データ」メニューにはデータソースの管理機能がありますが、ビューデータのExcelエクスポートは「ワークシート」メニューから行います。\nD. 「ワークシート」メニュー→「コピー」→「データ」 - 「コピー」→「データ」はクリップボードへのコピーであり、ファイルとしての保存ではありません。", "img": ""}, {"id": 78, "dom": 2, "cat": "表計算", "q": "データアナリストが、カテゴリ別の売上棒グラフで、各棒の上に「全カテゴリの合計に対する割合」をラベル表示したいと考えています。テーブル計算を使用する場合、適切な関数はどれですか？", "opts": ["A. SUM([Sales]) / TOTAL(SUM([Sales]))", "B. SUM([Sales]) / WINDOW_SUM(SUM([Sales]), FIRST(), LAST())", "C. RUNNING_SUM(SUM([Sales])) / SUM([Sales])", "D. AとBの両方が同じ結果を返す"], "ans": ["D"], "exp": "A. SUM([Sales]) / TOTAL(SUM([Sales])) - TOTAL関数はパーティション全体の合計を返すため、各カテゴリの売上を全体合計で割った割合が計算されます。\nB. SUM([Sales]) / WINDOW_SUM(SUM([Sales]), FIRST(), LAST()) - WINDOW_SUM関数でFIRST()からLAST()までの範囲を指定すると、パーティション全体の合計が返されます。Aと同じ結果になります。\nC. RUNNING_SUM(SUM([Sales])) / SUM([Sales]) - 累計を現在値で割る計算であり、合計に対する割合ではありません。\nD. AとBの両方が同じ結果を返す - 正解です。TOTALとWINDOW_SUM(FIRST(), LAST())はどちらもパーティション全体の合計を返すため、同じ割合計算の結果になります。", "img": ""}, {"id": 79, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、プロジェクトの各タスクの開始日と所要日数を視覚化し、タイムライン形式で表示したいと考えています。使用すべきチャートタイプはどれですか？", "opts": ["A. ガントチャート", "B. ウォーターフォールチャート", "C. エリアチャート", "D. ブレットグラフ"], "ans": ["A"], "exp": "A. ガントチャート - 正解です。ガントチャートは各タスクの開始日を基準に所要日数（期間）を水平バーで表示します。列に日付、行にタスク名、サイズに期間を配置し、マークタイプを「ガント」に設定します。\nB. ウォーターフォールチャート - ウォーターフォールチャートは値の累積的な増減を示すチャートであり、タスクのタイムライン表示には適していません。\nC. エリアチャート - エリアチャートは時間経過に伴うメジャーの変化を面積で表現しますが、個別タスクの期間表示には不向きです。\nD. ブレットグラフ - ブレットグラフは実績値と目標値の比較に使用され、タスクのスケジュール管理には適していません。", "img": ""}, {"id": 80, "dom": 4, "cat": "Tableau Server/Cloud", "q": "抽出データソースを使用するワークブックがあります。ワークブックをTableau Serverにパブリッシュします。Tableau Serverの [抽出の更新] ページから実行できる3つのアクションはどれですか?(3つ選択)", "opts": ["A. 更新の実行", "B. 更新を完全から増分に変更", "C. 更新の頻度の変更", "D. 更新の削除", "E. 更新の優先度の変更"], "ans": ["A", "D", "E"], "exp": "A. 更新の実行 - 正解です。[抽出の更新] ページにある [今すぐ実行] オプションを使用して、スケジュールされた時刻以外に手動で抽出の更新を即座に開始させることができます。\nB. 更新を完全から増分に変更 - [抽出の更新] ページからこの設定（完全か増分か）を変更することはできません。これはTableau Desktopで抽出を設定する際に定義されます。\nC. 更新の頻度の変更 - 抽出の更新スケジュール（頻度）の変更は、Tableau Serverの [スケジュール] セクションで管理されますが、この設問で正解として指定されている主要なアクション（A, D, E）とは異なります。\nD. 更新の削除 - 正解です。[抽出の更新] ページで、そのワークブックに関連付けられている既存の更新スケジュールを削除（登録解除）することができます。\nE. 更新の優先度の変更 - 正解です。サーバー上で複数のタスクが競合する場合に備えて、[抽出の更新] ページから特定の更新タスクの優先度（0～100）を変更することができます。", "img": ""}, {"id": 81, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、二重軸チャートを作成しましたが、2つの軸のスケールが異なるため、データの比較が困難です。2つの軸を同じスケールに合わせるために必要な操作はどれですか？", "opts": ["A. 2番目の軸を右クリックして「軸の同期」を選択する", "B. 両方の軸の範囲を手動で同じ値に設定する", "C. マークタイプを両方とも「線」に変更する", "D. メジャーを正規化する計算フィールドを作成する"], "ans": ["A"], "exp": "A. 2番目の軸を右クリックして「軸の同期」を選択する - 正解です。二重軸チャートで2番目の軸を右クリックし「軸の同期」を選択すると、両軸が同じスケール・範囲に自動調整されます。\nB. 両方の軸の範囲を手動で同じ値に設定する - 手動設定も可能ですが、データが変化するたびに再設定が必要で非効率です。\nC. マークタイプを両方とも「線」に変更する - マークタイプの変更は軸のスケールに影響しません。\nD. メジャーを正規化する計算フィールドを作成する - 正規化は有効な手法ですが、「軸の同期」の方がはるかに簡単です。", "img": ""}, {"id": 82, "dom": 2, "cat": "ビジュアライゼーション", "q": "ワークシートに線グラフがあります。次のビジュアライゼーションに示すように、2020年3月にコメントを追加したいと考えています。何をすべきですか?", "opts": ["A. [成長率] を [マーク] カードの [テキスト] にドラッグします", "B. キャプションを有効にします", "C. 2020年3月に注釈を付けます", "D. ツールヒントを追加します"], "ans": ["C"], "exp": "A. [成長率] を [マーク] カードの [テキスト] にドラッグします - この操作は、データ内のすべてのマーク（線上のすべての点）に「成長率」の値をラベルとして表示します。2020年3月という特定の1点だけに自由なテキストの「コメント」を追加する操作ではありません。\nB. キャプションを有効にします - キャプション（[ワークシート] > [表示] > [キャプション]）は、ワークシートの下にデータの概要（合計、平均など）を自動生成されたテキストで表示する機能です。グラフ上の特定のデータポイントにコメントを追加するものではありません。\nC. 2020年3月に注釈を付けます - 正解です。[注釈] (Annotate) 機能は、グラフ上の特定のマーク（2020年3月の点）、ポイント、またはエリアを右クリックして選択し、そこにカスタムテキストのコメントボックスを追加するために使用されます。\nD. ツールヒントを追加します - ツールヒントは、データポイントにカーソルを合わせたとき（ホバーしたとき）に表示されるポップアップボックスです。グラフ上に常に表示される静的な「コメント」を追加する機能ではありません。", "img": "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MDAgMjYwIiB3aWR0aD0iNTAwIiBoZWlnaHQ9IjI2MCI+CjxyZWN0IHdpZHRoPSI1MDAiIGhlaWdodD0iMjYwIiBmaWxsPSIjRjVGNUY1IiByeD0iNiIvPgo8dGV4dCB4PSIyNTAiIHk9IjIyIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTMiIGZpbGw9IiMzMzMiIGZvbnQtd2VpZ2h0PSJib2xkIj7mipjjgoznt5rjgrDjg6njg5UgKyDjg57jg7zjgq/ms6jph4jvvIgyMDIw5bm0M+aciO+8iTwvdGV4dD4KPHJlY3QgeD0iMjAiIHk9IjM1IiB3aWR0aD0iNDYwIiBoZWlnaHQ9IjIxMCIgZmlsbD0id2hpdGUiIHN0cm9rZT0iI0RERCIgcng9IjQiLz4KPGxpbmUgeDE9IjU1IiB5MT0iNDUiIHgyPSI1NSIgeTI9IjIyNSIgc3Ryb2tlPSIjQ0NDIi8+CjxsaW5lIHgxPSI1NSIgeTE9IjIyNSIgeDI9IjQ2MCIgeTI9IjIyNSIgc3Ryb2tlPSIjQ0NDIi8+CjwhLS0gWSBheGlzIGxhYmVscyAtLT4KPHRleHQgeD0iNTAiIHk9IjU1IiB0ZXh0LWFuY2hvcj0iZW5kIiBmb250LWZhbWl
