"cat": "計算・関数", "q": "売上データを含むデータセットがあります。ある月の売上が50,000ドルを超える場合はtrueの値を、それ以外の場合はfalseの値を返す必要があります。どの2つの式がこの目標を達成しますか?(2つ選択)", "opts": ["A. SUM{[Sales]) IN (50000)", "B. IIF(SUM( [Sales] )>50000, TRUE, FALSE)", "C. MAX( [Sales], 50000)", "D. [Sales] > 50000"], "ans": ["B", "D"], "exp": "A. SUM{[Sales]) IN (50000) - この式は構文エラー（角括弧と丸括弧の不一致）を含んでいます。仮に SUM([Sales]) IN (50000) であったとしても、IN 演算子はリスト内の特定の値と「等しい」かどうかをチェックするものであり、「より大きい」という条件は満たしません。\nB. IIF(SUM( [Sales] )>50000, TRUE, FALSE) - 正解です。IIF 関数は、条件（この場合は月の売上合計 SUM([Sales]) が50,000より大きい）を評価します。条件が真であればTRUEを、偽であればFALSEを返すため、要件に一致します。\nC. MAX( [Sales], 50000) - この MAX 関数は、[Sales] の値と 50000 のうち、より大きい方の「数値」を返します。TRUE/FALSEのブール値（真偽値）を返すものではないため、不適切です。\nD. [Sales] > 50000 - 正解です。これは単純なブール式です。データが「月ごと」に事前集計されており、[Sales] 項目がその月の売上合計を直接表していると仮定した場合、この行レベルの式は、その月の売上が50,000を超えているかを評価し、TRUEまたはFALSEを返します。", "img": ""}, {"id": 86, "dom": 1, "cat": "データ接続", "q": "EmployeelnfoとDepartmentInfoという名前の2つのテーブルがあります。Employeelnfoには、Full Name、Department ID、Start Date、Salaryという4つの項目が含まれています。DepartmentInfoには、Department Name、Size、Department ID、VPという4つの項目が含まれています。次の要件を満たすようにテーブルを結合したいと考えています:\n・Employeelnfoの各レコードは、結合されたテーブルに保持されなければなりません。\n・レコードには、Department Name、Size、VPの各項目が含まれている必要があります。\n・すべてのレコードにフルネーム(Full Name)が必要です。\nどのタイプの結合を使用すべきですか?", "opts": ["A. 内部", "B. 左", "C. 完全外部", "D. ユニオン"], "ans": ["B"], "exp": "A. 内部 - 内部結合は、Employeelnfo と DepartmentInfo の両方に一致する Department ID が存在するレコードのみを返します。Employeelnfo に存在するが DepartmentInfo に一致する部署がない従業員レコードは失われてしまうため、「Employeelnfoの各レコードは...保持されなければなりません」という要件を満たしません。\nB. 左 - 正解です。左結合（Left Join）は、左テーブル（Employeelnfo）のすべてのレコードを保持し、Department ID に基づいて右テーブル（DepartmentInfo）の一致するレコード（Department Name, Size, VP）を結合します。Employeelnfo のレコードに一致する部署がない場合でも、その従業員レコード（Full Nameなど）は保持され、これは要件に一致します。\nC. 完全外部 - 完全外部結合は、両方のテーブルのすべてのレコードを保持します。これにより、Employeelnfo にまだ関連付けられていない部署（DepartmentInfo にのみ存在するレコード）も結果に含まれる可能性があります。これらのレコードは「フルネーム（Full Name）を持たない」ため、要件を満たしません。\nD. ユニオン - ユニオンは、テーブルを縦方向（行を追加）に結合するために使用されます。このシナリオでは、2つのテーブルの列構造が異なり、また要件はテーブルを横方向（列を結合）に結合することであるため、不適切です。", "img": ""}, {"id": 87, "dom": 1, "cat": "データ接続", "q": "Tableau Desktopで、異なるデータベースやファイルにある2つのデータソースを組み合わせて分析を行いたいと考えています。2つのデータソースは同じワークブック内にあり、共通するディメンション（例：地域名）が存在しますが、データソース自体を物理的に結合したくない場合に使用すべき機能はどれですか？", "opts": ["A. データブレンド", "B. ジョイン", "C. ユニオン", "D. グループ"], "ans": ["A"], "exp": "A. データブレンド - 正解です。データブレンドは、異なるデータソースをワークブック内でビューレベルで関連付ける機能です。共通するディメンション（リンクフィールド）を使って、プライマリデータソースとセカンダリデータソースのデータを1つのビューで表示できます。データソースを物理的に結合せずに済むため、異なるデータベース間の分析に適しています。\nB. ジョイン - ジョインは同一データソース内のテーブルを物理的に結合する操作です。異なるデータソース間では使用できません。\nC. ユニオン - ユニオンは同じ構造のテーブルを縦方向に結合する操作であり、異なるデータソース間の関連付けには使用しません。\nD. グループ - グループはディメンションの値をまとめる機能であり、データソースの結合とは無関係です。", "img": ""}, {"id": 88, "dom": 2, "cat": "フィルター", "q": "Tableau Desktopで作成したビューに含まれる特定のディメンションのメンバーを、分析の目的に合わせて一時的に非表示にしたい場合、最も適切な操作は何ですか?", "opts": ["A. フィルターを適用して、非表示にしたいメンバーを除外する。", "B. そのディメンションをビューから削除する。", "C. 非表示にしたいメンバーを選択し、「除外」機能を使用する。", "D. そのディメンションのエイリアスを設定して、表示されないようにする。"], "ans": ["C"], "exp": "A. フィルターを適用して、非表示にしたいメンバーを除外する。 - フィルターを適用して除外した場合、データ自体がビューから除外されるため、後で簡単に再表示することが難しい場合があります。また、フィルターは永続的な操作となる可能性があります。\nB. そのディメンションをビューから削除する。 - ディメンションをビューから削除すると、そのディメンションに関連するすべての情報がビューからなくなり、非表示とは異なります。\nC. 非表示にしたいメンバーを選択し、「除外」機能を使用する。 - 正解です。「除外」機能を使用すると、選択したディメンションメンバーは一時的にビューから非表示になりますが、データ自体は保持されており、後で簡単に再表示できます。これは、特定のメンバーに焦点を当てたい一時的な分析に適しています。\nD. ディメンションのエイリアスを設定して、表示されないようにする。 - ディメンションのエイリアスを設定しても、ディメンションメンバー自体はビューに表示されたままです。エイリアスは表示名を変更するだけで、非表示にする機能はありません。", "img": ""}, {"id": 89, "dom": 1, "cat": "Tableau Prep", "q": "Tableau Prep Builderを使用して複数のテキストファイルを結合する際に、ファイル構造は異なるものの、特定の共通する複数の列を統合して分析を行いたいと考えています。これを実現するために利用できるステップを3つ選択してください。", "opts": ["A. クリーニングステップ", "B. 結合ステップ", "C. ユニオンステップ", "D. 集計ステップ", "E. ピボットステップ"], "ans": ["B", "C", "E"], "exp": "A. クリーニングステップ - クリーニングステップは、データの不整合やエラーを修正するために使用されます。データの結合や統合自体を行うステップではありません。\nB. 結合ステップ - 正解です。結合ステップは、一つ以上の共通する列に基づいて複数の入力を水平方向に結合するために使用します。異なるファイル構造であっても、共通する列を指定して関連付けることができます。\nC. ユニオンステップ - 正解です。ユニオンステップは、同じ列構造を持つ複数の入力を垂直方向に積み重ねるために使用します。ファイル構造が異なる場合でも、手動で列を対応付けることで、共通するデータを統合できます。\nD. 集計ステップ - 集計ステップは、データのグループ化と集計計算を行うために使用されます。データの結合や統合を行うステップではありません。\nE. ピボットステップ - 正解です。ピボットステップは、列を行に、または行を列に変換するために使用します。異なるファイル構造を持つデータにおいて、特定の列を行にピボットすることで、ユニオンステップでの統合を容易にすることができます。", "img": ""}, {"id": 90, "dom": 4, "cat": "パブリッシュ", "q": "Tableau Desktopで作成したワークブックをTableau Serverに公開する際、データソースへのライブ接続を維持したまま、ワークブックのパフォーマンスを向上させるために推奨される対策として適切でないものはどれですか?", "opts": ["A. 不要なフィールドを非表示にする。", "B. 集計されたデータのみを表示するビューを作成する。", "C. ワークブックを開くたびにデータソースへの接続情報を再入力するようユーザーに指示する。", "D. インデックスが適切に設定されているデータベースを使用する。"], "ans": ["C"], "exp": "A. 不要なフィールドを非表示にする。 - パフォーマンス向上に有効な対策です。不要なフィールドを非表示にすることで、Tableau Serverが処理するデータ量を減らし、クエリの効率が向上します。ビューに必要なフィールドのみを表示することは、効率的なデータ処理の基本です。\nB. 集計されたデータのみを表示するビューを作成する。 - パフォーマンス向上に有効な対策です。集計されたデータのみを表示するビューは、詳細なトランザクションレベルのデータよりもデータ量が少なくなるため、クエリの実行時間を短縮できます。\nC. ワークブックを開くたびにデータソースへの接続情報を再入力するようユーザーに指示する。 - 正解（適切でない対策）。接続情報の再入力はパフォーマンスとは無関係です。ライブ接続では、Tableau Serverがデータソースへの接続情報を安全に保存し、ユーザーに透過的に提供します。毎回の再入力はユーザー体験を損なうだけで、クエリ速度やデータ処理の効率化には一切寄与しません。\nD. インデックスが適切に設定されているデータベースを使用する。 - パフォーマンス向上に有効な対策です。データベースに適切なインデックスが設定されていると、Tableau Serverからのクエリ実行時にデータベースが迅速にデータを検索できるため、応答時間が大幅に短縮されます。", "img": ""}, {"id": 91, "dom": 2, "cat": "計算・関数", "q": "Tableau Desktopで、あるメジャーの値を別のメジャーの値で割った割合を各ディメンションメンバーに対して表示したい場合、最も直接的な方法はどれですか?", "opts": ["A. 2つのメジャーを個別の行または列に配置し、参照線を追加して割合を表示する。", "B. 2つのメジャーを結合した新しいデータソースを作成し、その新しいメジャーを使用する。", "C. 計算フィールドを作成し、除算の式を定義してその計算フィールドをビューで使用する。", "D. パーセント構成のテーブル計算を適用する。"], "ans": ["C"], "exp": "A. 2つのメジャーを個別の行または列に配置し、参照線を追加して割合を表示する。 - 参照線は、ビュー内の特定の値を示すために使用されますが、メジャー間の割合を直接的に表示するものではありません。\nB. 2つのメジャーを結合した新しいデータソースを作成し、その新しいメジャーを使用する。 - データソースの結合は、異なるテーブルやデータソースのデータを組み合わせるための操作であり、既存のメジャー間の演算を行うものではありません。\nC. 計算フィールドを作成し、除算の式を定義してその計算フィールドをビューで使用する。 - 正解です。計算フィールドを作成することで、既存のメジャーを参照し、除算の式（例えば、[メジャーA] / [メジャーB]）を定義できます。作成した計算フィールドをビューに配置することで、各ディメンションメンバーに対する割合を直接表示できます。\nD. パーセント構成のテーブル計算を適用する。 - パーセント構成のテーブル計算は、テーブル内の合計に対する各値の割合を表示するものであり、2つの異なるメジャー間の割合を直接計算するものではありません。", "img": ""}, {"id": 92, "dom": 1, "cat": "データ接続", "q": "Tableau Desktopで、複数の異なる粒度のデータソースを組み合わせて分析する際に、考慮すべき事項として正しいものを2つ選択してください。", "opts": ["A. 常に結合(ジョイン)を使用してデータを統合する。", "B. 関連するディメンションがデータソース間で一意の名前を持っていることを確認する。", "C. 必要に応じて、データブレンドのセカンダリデータソースで集計関数を使用する。", "D. ライブ接続のみを使用して、データの鮮度を保つ。"], "ans": ["B", "C"], "exp": "A. 常に結合（ジョイン）を使用してデータを統合する。 - 結合（ジョイン）は、共通の列を持つテーブルを組み合わせる場合に適していますが、異なる粒度のデータソースを組み合わせる際には、データブレンドの方が柔軟に対応できる場合があります。\nB. 関連するディメンションがデータソース間で一意の名前を持っていることを確認する。 - 正解です。データブレンドを使用する際、関連するディメンションがプライマリデータソースとセカンダリデータソースで異なる名前を持っている場合、それらのディメンション間のリレーションシップを正しく定義する必要があります。一意の名前であれば、Tableauが自動的に関連性を認識しやすくなります。\nC. 必要に応じて、データブレンドのセカンダリデータソースで集計関数を使用する。 - 正解です。データブレンドのセカンダリデータソースでは、プライマリデータソースの粒度に合わせて集計関数（SUM、AVG、MIN、MAXなど）を使用することが推奨されます。これにより、異なる粒度のデータ間での比較や分析が適切に行えます。\nD. ライブ接続のみを使用して、データの鮮度を保つ。 - ライブ接続は常に最新のデータを取得できますが、異なる粒度のデータソースを組み合わせる際には、抽出を使用することでパフォーマンスが向上する場合があります。", "img": ""}, {"id": 93, "dom": 2, "cat": "計算・関数", "q": "Tableau Desktopで、ある連続した日付データに基づいて、各月の最初の日の値を表示する計算フィールドを作成したいと考えています。適切な関数または関数の組み合わせとして最も適切なものはどれですか?", "opts": ["A. DATEPART('day', [日付フィールド]) == 1", "B. DATETRUNC('month', [日付フィールド])", "C. IF DATEPART('day', [日付フィールド]) = 1 THEN [メジャー] END", "D. WINDOW_MIN([メジャー], FIRST(), FIRST())"], "ans": ["C"], "exp": "A. DATEPART('day', [日付フィールド]) == 1 - DATEPART('day', [日付フィールド]) == 1 は、日付フィールドの「日」の部分が1であるかどうかを評価するブール値の結果を返します。これだけでは、その日の「値」を取得することはできません。\nB. DATETRUNC('month', [日付フィールド]) - DATETRUNC('month', [日付フィールド]) は、日付フィールドをその月の最初の日に切り詰めた日付値を返します。これは日付の特定には役立ちますが、関連する「値」を取得するわけではありません。\nC. IF DATEPART('day', [日付フィールド]) = 1 THEN [メジャー] END - 正解です。IF DATEPART('day', [日付フィールド]) = 1 THEN [メジャー] END は、日付フィールドの「日」の部分が1である場合に、指定されたメジャーの値を返し、それ以外の場合はNULLを返します。これにより、各月の最初の日の値のみを抽出した新しいメジャーを作成できます。\nD. WINDOW_MIN([メジャー], FIRST(), FIRST()) - WINDOW_MIN([メジャー], FIRST(), FIRST()) は、テーブル計算の一種で、パーティションの最初の値（最小値）を返します。これは、必ずしも各月の最初の日の値を取得するとは限りません。", "img": ""}, {"id": 94, "dom": 3, "cat": "ダッシュボード", "q": "Tableau Desktopで、複数のシートから構成されるダッシュボードを作成する際に、ユーザーが特定のシートのドリルダウン操作を行った際に、その操作が他の関連するシートにも影響を与えるように設定したいと考えています。これを実現するための適切な機能は何ですか?", "opts": ["A. パラメータ", "B. アクション", "C. セット", "D. グループ"], "ans": ["B"], "exp": "A. パラメータ - パラメータは、ユーザーが入力できる動的な値であり、フィルターや計算フィールドなどで使用されますが、シート間のドリルダウン操作を連携させる機能はありません。\nB. アクション - 正解です。アクション機能を使用すると、あるシートでのユーザーの操作（選択、ホバー、メニューなど）をトリガーとして、別のシートのフィルターやハイライトなどを変更することができます。これにより、ドリルダウン操作を複数のシート間で連携させることが可能になります。\nC. セット - セットは、ディメンションメンバーのサブグループを定義するために使用され、ビュー内のデータを整理したり、ハイライトしたりするのに役立ちますが、シート間の操作を連携させる機能はありません。\nD. グループ - グループは、ディメンションメンバーを手動または条件に基づいてまとめるために使用され、データの集計や表示を制御しますが、シート間のインタラクションを連携させる機能はありません。", "img": ""}, {"id": 95, "dom": 2, "cat": "パフォーマンス", "q": "Tableau Desktopで、複数の異なるデータソースに接続し、それらを組み合わせて分析を行う際に、パフォーマンスへの影響を最小限に抑えるために考慮すべき対策として正しいものを2つ選択してください。", "opts": ["A. 常にすべてのフィールドをビューに追加してからフィルターを適用する。", "B. 抽出(Extract)を作成して、必要なデータのみをインポートする。", "C. データブレンドを使用する際に、より詳細な粒度のデータソースをプライマリデータソースとして設定する。", "D. 可能な限り、データソース側でデータのクリーニングや変換処理を実施する。"], "ans": ["B", "D"], "exp": "A. 常にすべてのフィールドをビューに追加してからフィルターを適用する。 - 誤りです。すべてのフィールドをビューに追加すると、Tableauが処理するデータ量が増加し、パフォーマンスが低下する可能性があります。必要なフィールドのみを使用するべきです。\nB. 抽出（Extract）を作成して、必要なデータのみをインポートする。 - 正解です。抽出（Extract）を使用すると、Tableau Desktopのインメモリデータエンジンにデータの一部または全部を保存できます。これにより、ライブ接続と比較してクエリの実行速度が向上し、パフォーマンスの改善に繋がります。\nC. データブレンドを使用する際に、より詳細な粒度のデータソースをプライマリデータソースとして設定する。 - 誤りです。データブレンドを使用する際には、より粗い粒度のデータソースをプライマリデータソースとして設定する方が、一般的にクエリの効率が良くなります。\nD. 可能な限り、データソース側でデータのクリーニングや変換処理を実施する。 - 正解です。データソース側（例えば、データベースやTableau Prep）でデータのクリーニングや変換処理を事前に行っておくことで、Tableau Desktopでの処理負荷を軽減し、ワークブックのパフォーマンスを向上させることができます。", "img": ""}, {"id": 96, "dom": 2, "cat": "分析", "q": "ある小売企業のデータアナリストは、顧客の購買履歴データを用いて、特定の製品カテゴリに関心を持つ可能性の高い顧客セグメントを特定したいと考えています。この分析を実現するために、Tableau Desktopで利用できる最も適切な機能は何でしょうか?", "opts": ["A. 抽出(Extract)の作成と共有", "B. グループ化とセットの作成", "C. 予測(Forecasting)機能の適用", "D. パラメータを使用したインタラクティブなフィルターの作成"], "ans": ["B"], "exp": "A. 抽出（Extract）の作成と共有 - 抽出は、データソースから一部またはすべてのデータをTableau Desktopのローカル環境に保存し、パフォーマンスを向上させるための機能です。抽出を作成し共有することは、データの準備段階としては重要ですが、特定の製品カテゴリに関心を持つ可能性の高い顧客セグメントを特定する直接的な分析機能ではありません。\nB. グループ化とセットの作成 - 正解です。グループ化を使用すると、類似したディメンションのメンバーをまとめることができ、セットを使用すると、特定の条件に基づいてデータのサブセットを定義できます。顧客の購買履歴データに対してこれらの機能を活用することで、特定の製品カテゴリの購入頻度や購入金額などの属性に基づいて顧客をセグメント化し、関心を持つ可能性の高いグループを特定することができます。\nC. 予測（Forecasting）機能の適用 - 予測機能は、時系列データに基づいて将来の値を予測するために使用されます。顧客の購買履歴データに適用することで、将来の売上予測などは可能になりますが、現時点での顧客セグメントの特定には直接的な関連はありません。\nD. パラメータを使用したインタラクティブなフィルターの作成 - パラメータを使用すると、ユーザーが動的にフィルターの条件を変更できるインタラクティブなフィルターを作成できます。これはデータ探索には役立ちますが、特定の製品カテゴリに関心を持つ可能性の高い顧客セグメントを自動的に特定する機能ではありません。", "img": ""}, {"id": 97, "dom": 1, "cat": "Tableau Prep", "q": "ある航空会社のデータアナリストは、顧客のフライト予約データと顧客満足度調査の結果を組み合わせて分析し、特定の機材を使用するフライトの顧客満足度が低い傾向があるかどうかを調査したいと考えています。この分析を行うために、Tableau Prep Builderで実行すべき最も適切な操作は何でしょうか?", "opts": ["A. 複数の入力ステップでデータを個別にクリーニングした後、ユニオンステップで結合する。", "B. 複数の入力ステップでデータを読み込み、結合ステップで共通のキーを使用して結合する。", "C. 1つの入力ステップで両方のデータを読み込み、ピボットステップでデータを再構成する。", "D. 1つの入力ステップで予約データを読み込み、集計ステップで満足度調査の結果を集計する。"], "ans": ["B"], "exp": "A. 複数の入力ステップでデータを個別にクリーニングした後、ユニオンステップで結合する。 - ユニオンは、同じ構造を持つ複数のデータセットを縦に結合するために使用します。フライト予約データと顧客満足度調査の結果は通常異なる構造を持つため、ユニオンは適切ではありません。\nB. 複数の入力ステップでデータを読み込み、結合ステップで共通のキーを使用して結合する。 - 正解です。フライト予約データと顧客満足度調査の結果は、通常、フライトIDや顧客IDなどの共通のキーを持つため、結合ステップを使用してこれらのデータを関連付けることができます。それぞれのデータセットを個別の入力ステップで読み込んだ後、共通のキーに基づいて結合することで、両方のデータセットの情報を組み合わせて分析することが可能になります。\nC. 1つの入力ステップで両方のデータを読み込み、ピボットステップでデータを再構成する。 - Tableau Prep Builderでは、通常、異なるデータソースを同時に1つの入力ステップで読み込むことはできません。また、ピボットステップは、データの列を行に、または行を列に変換するために使用され、異なるデータセットの結合には適していません。\nD. 1つの入力ステップで予約データを読み込み、集計ステップで満足度調査の結果を集計する。 - 同様に、異なるデータソースを1つの入力ステップで読み込むことは通常できません。集計ステップは、データの要約統計量を計算するために使用され、異なるデータセットのレコードを関連付ける操作ではありません。", "img": ""}, {"id": 98, "dom": 2, "cat": "ビジュアライゼーション", "q": "あるマーケティングアナリストは、複数のキャンペーンの成果を比較するために、各キャンペーンの費用対効果を視覚化したいと考えています。各キャンペーンの費用と獲得したリード数がデータソースに含まれている場合、Tableau Desktopで最も適切なグラフの種類は何でしょうか?", "opts": ["A. 積み上げ棒グラフ", "B. 折れ線グラフ", "C. バブルチャート", "D. ヒートマップ"], "ans": ["C"], "exp": "A. 積み上げ棒グラフ - 積み上げ棒グラフは、全体に対する各部分の割合を示したり、複数のカテゴリの合計値を比較したりするのに適しています。キャンペーンの費用対効果を比較する目的には、各キャンペーンの費用とリード数の二つの異なる数値の関係性を視覚化する必要があるため、積み上げ棒グラフは最適ではありません。\nB. 折れ線グラフ - 折れ線グラフは、時間の経過に伴うデータの変化や傾向を示すのに適しています。キャンペーンの成果を比較する時点が複数ある場合には有用ですが、単一時点での費用と効果の関係性を比較するのには適していません。\nC. バブルチャート - 正解です。バブルチャートは、3つの数値変数を同時に視覚化するのに適しています。このケースでは、X軸にキャンペーンの費用、Y軸に獲得したリード数を配置し、バブルのサイズを別の指標（例えば、顧客転換率）で表現することで、各キャンペーンの費用対効果を直感的に比較することができます。\nD. ヒートマップ - ヒートマップは、主に2つのカテゴリ間の関係性を色の濃淡で表現するのに適しています。キャンペーンと何らかのカテゴリの組み合わせによる成果を示すのには使えるかもしれませんが、キャンペーンの費用とリード数の直接的な関係性を視覚化するのには適していません。", "img": ""}, {"id": 99, "dom": 4, "cat": "パブリッシュ", "q": "あるデータアナリストは、Tableau Desktopで作成したワークブックを同僚と共有したいと考えています。ワークブックには、組織内の共有データベースへのライブ接続が含まれています。同僚はTableau Desktopを持っていないため、インタラクティブなダッシュボードを閲覧する方法として最も適切なものはどれでしょうか?", "opts": ["A. ワークブックをPDF形式でエクスポートして共有する。", "B. Tableau Readerを使用してワークブックを開いてもらう。", "C. Tableau Publicにワークブックを公開して共有する。", "D. Tableau ServerまたはTableau Cloudにワークブックをパブリッシュして共有する。"], "ans": ["D"], "exp": "A. ワークブックをPDF形式でエクスポートして共有する。 - ワークブックをPDF形式でエクスポートすると、静的な画像の集合となり、Tableauのインタラクティブなフィルタリングやドリルダウンなどの機能は失われます。同僚がインタラクティブなダッシュボードを閲覧したいという要件を満たしません。\nB. Tableau Readerを使用してワークブックを開いてもらう。 - Tableau Readerは、Tableau Desktopで作成されたパッケージドワークブック（.twbx）を開いて操作できる無料のアプリケーションです。しかし、ライブ接続されたワークブック（.twb）を開く場合、Tableau Readerがデータソースに直接アクセスできる必要があります。組織内の共有データベースへのアクセス権限や接続設定が必要になるため、必ずしも最適な方法とは言えません。\nC. Tableau Publicにワークブックを公開して共有する。 - Tableau Publicは、誰でもアクセスできる公開プラットフォームです。機密情報を含む可能性のある組織内の共有データベースへのライブ接続を含むワークブックを公開することは、セキュリティ上のリスクがあるため推奨されません。\nD. Tableau ServerまたはTableau Cloudにワークブックをパブリッシュして共有する。 - 正解です。Tableau ServerまたはTableau Cloudは、組織内で安全にワークブックやデータソースを共有するためのプラットフォームです。ワークブックをパブリッシュすることで、Tableau Desktopを持っていない同僚もWebブラウザを通じてインタラクティブなダッシュボードを閲覧し、操作することができます。ライブ接続も維持されるため、常に最新のデータに基づいて分析を行うことが可能です。", "img": ""}, {"id": 100, "dom": 1, "cat": "Tableau Prep", "q": "あるデータアナリストは、複数の異なるテキストファイルに保存されている顧客からのフィードバックデータを統合し、感情分析のためにTableau Prep Builderで前処理したいと考えています。これらのテキストファイルの構造は同一であり、ヘッダー行も共通しています。このタスクを効率的に実行するために推奨されるTableau Prep Builderの機能は何でしょうか?", "opts": ["A. 結合(Join)", "B. ユニオン(Union)", "C. ピボット(Pivot)", "D. 集計(Aggregate)"], "ans": ["B"], "exp": "A. 結合（Join） - 結合は、一つ以上の共通の項目に基づいて、異なるデータセットの行を横方向に組み合わせる操作です。このシナリオでは、複数のファイルに同じ構造のデータが含まれているため、横方向の組み合わせではなく、縦方向への統合が適切です。\nB. ユニオン（Union） - 正解です。ユニオンは、同じ構造を持つ複数のデータセットを縦方向に連結する操作です。複数のテキストファイルが同じ構造とヘッダーを持つ場合、ユニオンを使用することで、すべてのファイルのデータを一つのデータストリームとして統合し、その後の分析や前処理を効率的に行うことができます。\nC. ピボット（Pivot） - ピボットは、データの列を行に、または行を列に変換する操作です。この操作は、データの構造を再構成するために使用され、複数のファイルを統合する目的には適していません。\nD. 集計（Aggregate） - 集計は、データのグループに対して合計、平均、最大値などの要約統計量を計算する操作です。複数のファイルを統合する前に、個々のファイルに対して集計を行うことは考えられますが、ファイル統合の主要な機能ではありません。", "img": ""}, {"id": 101, "dom": 1, "cat": "データ接続", "q": "データアナリストが、Tableauで使用できるデータソースのタイプを確認しています。Tableau Desktopが直接接続をサポートしているデータソースとして正しいものはどれですか?（2つ選択）", "opts": ["A. Microsoft Excel", "B. Adobe Photoshop", "C. Microsoft SQL Server", "D. Microsoft Word"], "ans": ["A", "C"], "exp": "A. Microsoft Excel - 正解です。Tableau DesktopはExcelファイル(.xlsx, .xls)への直接接続をネイティブサポートしています。\nB. Adobe Photoshop - Photoshopは画像編集ソフトウェアであり、Tableauのデータソースとしては使用できません。\nC. Microsoft SQL Server - 正解です。Tableau DesktopはSQL Serverへのネイティブコネクタを提供しています。ライブ接続と抽出の両方に対応します。\nD. Microsoft Word - Wordは文書作成ソフトウェアであり、構造化データソースではないためTableauでは接続できません。", "img": ""}, {"id": 102, "dom": 1, "cat": "データ接続", "q": "データアナリストが、既存のTableau抽出ファイルにTableau Desktopから直接接続したいと考えています。接続先として選択すべきファイルタイプはどれですか?", "opts": ["A. .twb", "B. .hyper", "C. .tds", "D. .twbx"], "ans": ["B"], "exp": "A. .twb - .twbファイルはTableauワークブックの設計情報（シート、ダッシュボード構成等）をXML形式で保存するファイルです。データそのものは含まれておらず、抽出ファイルへの接続には使用しません。\nB. .hyper - 正解です。.hyperファイルはTableauの高速データエンジン形式の抽出ファイルです。「ファイルに接続」→「その他のファイル」から.hyperファイルを直接指定して開くことで、既存の抽出データに接続できます。\nC. .tds - .tdsファイルはデータソース定義ファイルで、接続情報やフィールドのカスタマイズを保存しますが、データ自体は含まれません。抽出データへの直接接続には.hyperを使用します。\nD. .twbx - .twbxファイルはパッケージドワークブックで、ワークブックとデータを1つにまとめたファイルです。既存の抽出ファイルに「直接接続」するファイル形式ではなく、ワークブック全体のパッケージです。", "img": ""}, {"id": 103, "dom": 1, "cat": "データ操作", "q": "データアナリストが、Tableauにデータを読み込んだ後、データの品質を評価しています。データ品質の問題を特定するために確認すべき項目として適切でないものはどれですか?", "opts": ["A. NULL値の有無と割合", "B. フィールドのデータ型が正しいかどうか", "C. ワークブックのファイルサイズ", "D. 値の一貫性（例：同じカテゴリの異なる表記）"], "ans": ["C"], "exp": "A. NULL値の有無と割合 - データの完全性（Completeness）を評価する重要な指標です。NULL値が多い場合、データの欠損が分析結果に影響を与える可能性があります。\nB. フィールドのデータ型が正しいかどうか - データの正確性（Accuracy）を評価する項目です。例えば、日付データが文字列として格納されている場合、正しい計算や分析ができません。\nC. ワークブックのファイルサイズ - 正解（データ品質の評価項目ではない）。ファイルサイズはストレージやパフォーマンスに関する指標であり、データ品質の評価項目ではありません。公式試験ガイドでは、データ品質の3要素として「完全性（Completeness）」「一貫性（Consistency）」「正確性（Accuracy）」を定義しており、ファイルサイズはいずれにも該当しません。\nD. 値の一貫性（例：同じカテゴリの異なる表記） - データの一貫性（Consistency）を評価する重要な項目です。例えば「Tokyo」と「東京」が混在していると、正しい集計ができません。", "img": ""}, {"id": 104, "dom": 1, "cat": "データ操作", "q": "データアナリストが、データペイン内の多数のディメンションとメジャーを整理して、ユーザーが必要なフィールドを素早く見つけられるようにしたいと考えています。最も適切な方法はどれですか?", "opts": ["A. フィールドの名前をアルファベット順に変更する", "B. 使用しないフィールドをすべて削除する", "C. フォルダーを作成してフィールドをグループ化する", "D. すべてのフィールドを計算フィールドに変換する"], "ans": ["C"], "exp": "A. フィールドの名前をアルファベット順に変更する - フィールド名のリネームは可能ですが、名前変更すると既存の計算フィールドや参照に影響を与える可能性があります。整理の方法としてはリスクが高く、効果も限定的です。\nB. 使用しないフィールドをすべて削除する - フィールドの削除はデータソースから完全に除去してしまうため、後から必要になった場合に復元できません。非表示にする方が安全ですが、問題の意図は「整理して見つけやすくする」ことなので、フォルダ化が最適です。\nC. フォルダーを作成してフィールドをグループ化する - 正解です。データペインで「フォルダでグループ化」を選択し、「顧客情報」「売上指標」「地理情報」などのフォルダを作成してフィールドをドラッグ＆ドロップで整理できます。多数のフィールドを論理的に分類でき、ユーザーが必要なフィールドを素早く見つけられるようになります。\nD. すべてのフィールドを計算フィールドに変換する - 既存フィールドを計算フィールドに変換する意味はなく、整理の手段としては不適切です。計算フィールドは新しいロジックが必要な場合に作成するものです。", "img": ""}, {"id": 105, "dom": 1, "cat": "データ接続", "q": "データアナリストが、ExcelファイルをTableauに接続した際、データに余分なヘッダー行やサブテーブルが含まれており、正しく読み込めませんでした。この問題を最も簡単に解決する方法は何ですか?", "opts": ["A. Excel側で手動でデータをクリーニングしてから再接続する", "B. データインタープリターを使用する", "C. カスタムSQLを記述する", "D. Tableau Prep Builderでフローを作成する"], "ans": ["B"], "exp": "A. Excel側で手動でデータをクリーニングしてから再接続する - Excel側で不要なヘッダー行やサブテーブルを手動で削除してから再接続する方法です。確実にクリーンなデータを取得できますが、元のExcelファイルを変更する必要があり、ファイルが更新されるたびに再度クリーニングが必要になります。最も簡単な方法ではありません。\nB. データインタープリターを使用する - 正解です。データインタープリターは、Tableau Desktopのデータ接続画面で利用できる機能で、Excelファイルの余分なヘッダー行、サブテーブル、マージされたセル、脚注、空白行などを自動的に検出し、クリーンなデータテーブルとして解釈します。チェックボックスをオンにするだけで適用でき、解釈結果のプレビューも確認できます。元のExcelファイルを変更せずに対処できるため、最も簡単な方法です。\nC. カスタムSQLを記述する - ExcelファイルにはSQLクエリを直接適用できません。SQLはデータベース接続にのみ使用可能であり、ファイルベースのデータソースに対する解決策としては不適切です。\nD. Tableau Prep Builderでフローを作成する - Tableau Prepでもデータのクリーニングは可能ですが、余分なヘッダー行やサブテーブルの処理にはデータインタープリターの方が直接的で効率的です。Prepは、より複雑な変換（複数ソースの統合、条件付き処理等）が必要な場合に適しています。", "img": ""}, {"id": 106, "dom": 1, "cat": "データ接続", "q": "データアナリストが、月ごとの売上が列として横に並んでいるデータ（Jan_Sales, Feb_Sales, Mar_Sales...）を持っています。これを分析に適した縦長の形式に変換するために使用すべき機能はどれですか?", "opts": ["A. ユニオン", "B. ピボット", "C. データブレンド", "D. 結合（JOIN）"], "ans": ["B"], "exp": "A. ユニオン - ユニオンは複数のテーブルを縦方向（行の追加）に結合する操作です。各月が別々のテーブルにある場合はユニオンが適切ですが、1つのテーブルに横並びの列がある場合はピボットが必要です。\nB. ピボット - 正解です。ピボット機能を使用して、横に並んだ月別の列（Jan_Sales, Feb_Sales, Mar_Sales...）を「月」と「売上」の2列に変換（アンピボット）できます。Tableau DesktopとPrepの両方で使用可能で、データを分析に適した「縦長」のフォーマットに変換します。\nC. データブレンド - データブレンドは異なるデータソース間でデータを関連付ける機能であり、単一テーブル内の列変換には使用しません。\nD. 結合（JOIN） - JOINは異なるテーブル間の横方向の結合であり、単一テーブル内の列をピボットする操作とは関係ありません。", "img": ""}, {"id": 107, "dom": 2, "cat": "フィルター", "q": "データアナリストが、機密性の高い人事データを含むデータソースに接続しています。特定の部門のデータのみをワークブック全体で使用し、他の部門のデータにはアクセスできないようにしたいと考えています。最も適切な方法はどれですか?", "opts": ["A. 各シートにディメンションフィルターを追加する", "B. データソースフィルターを設定する", "C. コンテキストフィルターを使用する", "D. 表計算フィルターを使用する"], "ans": ["B"], "exp": "A. 各シートにディメンションフィルターを追加する - ディメンションフィルターはシート単位の設定であり、ビューの表示を制限するだけです。ユーザーがフィルターを変更すれば機密データにアクセスできてしまい、セキュリティ対策としては不十分です。\nB. データソースフィルターを設定する - 正解です。データソースフィルターはデータソースレベルで適用され、ワークブック内のすべてのシートに影響します。特定の部門のデータのみを許可することで、機密データへのアクセスを一元的に制限できます。ユーザーはこのフィルターを変更できないため、セキュリティが確保されます。\nC. コンテキストフィルターを使用する - コンテキストフィルターは他のフィルターの処理順序を制御する機能であり、セキュリティ目的のデータアクセス制限には適していません。ユーザーがフィルターを解除できてしまいます。\nD. 表計算フィルターを使用する - 表計算フィルターはビュー上の表示制御のみで、元データはすべて取得された状態です。データセキュリティの目的には全く不適切です。", "img": ""}, {"id": 108, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、Tableau Prep Builderで注文データの詳細レベルを変更したいと考えています。各顧客の注文件数と合計売上金額を計算し、顧客レベルのサマリーデータを作成する必要があります。使用すべきステップはどれですか?", "opts": ["A. クリーニングステップ", "B. 結合ステップ", "C. 集計ステップ", "D. ピボットステップ"], "ans": ["C"], "exp": "A. クリーニングステップ - クリーニングステップはデータの修正・変換・フィルタリングを行いますが、データの集計レベル（粒度）を変更する機能ではありません。\nB. 結合ステップ - 結合（JOIN）は2つのテーブル間でキーを使ってデータを横方向に結合する操作であり、データの詳細レベルの変更とは異なります。\nC. 集計ステップ - 正解です。集計ステップではグループ化するフィールド（ディメンション）と集計するフィールド（メジャー：SUM, AVG, COUNT等）を選択し、データの粒度を変更できます。例えば、注文明細レベルのデータを顧客レベルに集計できます。\nD. ピボットステップ - ピボットは列と行の変換を行う操作であり、データの集計レベルを変更する機能ではありません。", "img": ""}, {"id": 109, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、月別の売上推移を折れ線グラフで表示しています。現在、各月がX軸上で均等に配置されていますが、データが存在しない月もギャップとして表示したいと考えています。どの操作が必要ですか?", "opts": ["A. 日付フィールドを不連続から連続に変換する", "B. 日付フィールドを連続から不連続に変換する", "C. 日付フィールドをメジャーからディメンションに変換する", "D. 日付フィールドに「正確な日付」を適用する"], "ans": ["A"], "exp": "A. 日付フィールドを不連続から連続に変換する - 正解です。不連続（青いピル）の場合、各月は等間隔のカテゴリとして配置され、データのない月は飛ばされます。連続（緑のピル）に変更すると時間軸が連続的なタイムラインになり、データのない月も適切に表現されます。\nB. 日付フィールドを連続から不連続に変換する - これは逆の操作です。不連続に変換すると等間隔カテゴリ配置になり、時間比例の配置が失われます。\nC. 日付フィールドをメジャーからディメンションに変換する - 日付フィールドは通常ディメンションとして扱われるため、この操作は問題の解決に直接関係しません。\nD. 日付フィールドに「正確な日付」を適用する - 「正確な日付」は個々の日付を不連続の値として表示する設定であり、連続的な時間軸の作成とは逆方向です。", "img": ""}, {"id": 110, "dom": 1, "cat": "データ操作", "q": "データアナリストが、郵便番号（数値）のフィールドを使用して地域ごとの分析を行いたいと考えています。しかし、Tableauが郵便番号をメジャーとして認識し、SUMで集計してしまいます。この問題を解決するために行うべき操作はどれですか?", "opts": ["A. 郵便番号フィールドのデータ型を「文字列」に変更し、地理的役割を「郵便番号」に設定する", "B. STR()関数で文字列に変換する計算フィールドを作成する", "C. 郵便番号フィールドをフィルターシェルフに配置する", "D. AとBの両方が有効"], "ans": ["A"], "exp": "A. 郵便番号フィールドのデータ型を「文字列」に変更し、地理的役割を「郵便番号」に設定する - 正解です。数値型の郵便番号はメジャーとして扱われ、SUMで集計されてしまいます。データ型を「文字列」に変更するとディメンションとして認識され、さらに地理的役割を「郵便番号」に設定するとマップ表示も可能になります。最も直接的で推奨される方法です。\nB. STR()関数で文字列に変換する計算フィールドを作成する - STR関数で計算フィールドを作成して文字列に変換する方法も有効ですが、Aの方がシンプルです。\nC. 郵便番号フィールドをフィルターシェルフに配置する - フィルターはデータの絞り込みであり、フィールドのデータ型問題を解決するものではありません。\nD. AとBの両方が有効 - 技術的にはAもBも有効ですが、Aが最も推奨される方法であり、本問の正解はAです。", "img": ""}, {"id": 111, "dom": 1, "cat": "データ接続", "q": "データアナリストが、「東京都-渋谷区-神宮前」のようにハイフンで結合された住所フィールドを持っています。このフィールドを都道府県、区市町村、町名の3つのフィールドに分割するために使用すべき機能はどれですか?", "opts": ["A. ピボット", "B. カスタム分割", "C. グループ", "D. エイリアス"], "ans": ["B"], "exp": "A. ピボット - ピボットは列と行の変換を行う操作であり、ハイフンで結合された文字列を個別のフィールドに分割する機能ではありません。\nB. カスタム分割 - 正解です。カスタム分割（Custom Split）は、フィールド値を指定した区切り文字で分割する機能です。データペインでフィールドを右クリック→「変換」→「カスタム分割」を選択し、区切り文字にハイフン「-」を指定すると、「東京都-渋谷区-神宮前」が3つの個別フィールドに自動分割されます。SPLIT関数と同じロジックですが、UI操作で実行できます。\nC. グループ - グループはディメンションの値をまとめる機能であり、文字列を分割する機能ではありません。\nD. エイリアス - エイリアスはディメンションの値の表示名を変更する機能であり、文字列の分割とは無関係です。", "img": ""}, {"id": 112, "dom": 1, "cat": "データ接続", "q": "データアナリストが、開発環境のSQLデータベースで作成したワークブックを、本番環境のSQLデータベースに切り替える必要があります。すべてのシートの接続先を一括変更する機能はどれですか?", "opts": ["A. データソースの置換", "B. 参照の置換", "C. データの更新", "D. 接続の編集"], "ans": ["D"], "exp": "A. データソースの置換 - データソースの置換（Replace Data Source）は、ワークブック内のデータソースを別のデータソースに切り替える機能ですが、同一構造のデータベースの接続先変更には「接続の編集」の方が直接的です。\nB. 参照の置換 - 参照の置換はフィールドの参照先を変更する機能であり、データベースサーバーの接続先変更とは異なります。\nC. データの更新 - データの更新（Refresh）は現在の接続先から最新データを取得する操作であり、接続先サーバーを変更する機能ではありません。\nD. 接続の編集 - 正解です。「接続の編集」からサーバー名（ホスト名やIPアドレス）を変更することで、同じ構造を持つ別のデータベースに切り替えることができます。テーブル構造が同一であれば、ワークブック内のすべてのシートやダッシュボードはそのまま動作します。", "img": ""}, {"id": 113, "dom": 2, "cat": "計算・関数", "q": "データアナリストが、数値型の注文ID（例：10248）を文字列として表示し、先頭に「ORD-」を付加した注文番号（例：「ORD-10248」）を作成したいと考えています。使用すべき計算式はどれですか?", "opts": ["A. 'ORD-' + [Order ID]", "B. 'ORD-' + STR([Order ID])", "C. CONCAT('ORD-', [Order ID])", "D. 'ORD-' + INT([Order ID])"], "ans": ["B"], "exp": "A. 'ORD-' + [Order ID] - この式は文字列と数値型フィールドを直接結合しようとしており、データ型の不一致でエラーになります。数値型のフィールドを文字列結合するにはSTR関数で変換が必要です。\nB. 'ORD-' + STR([Order ID]) - 正解です。STR関数で数値型の注文IDを文字列に変換してから、プレフィックス文字列と結合します。例：STR(10248) = '10248' → 'ORD-' + '10248' = 'ORD-10248'。\nC. CONCAT('ORD-', [Order ID]) - Tableau DesktopにはCONCAT関数は存在しません。文字列結合は「+」演算子を使用します。\nD. 'ORD-' + INT([Order ID]) - INT関数は数値を整数に変換しますが、結果は依然として数値型であるため、文字列との結合でエラーになります。", "img": ""}, {"id": 114, "dom": 2, "cat": "マップ", "q": "データアナリストが、店舗の緯度と経度データを含むCSVファイルと、地区の境界を含むシェープファイルを空間結合したいと考えています。CSVデータに対して作成すべき計算フィールドはどれですか?", "opts": ["A. DISTANCE([Latitude], [Longitude])", "B. MAKEPOINT([Latitude], [Longitude])", "C. MAKELINE([Latitude], [Longitude])", "D. BUFFER([Latitude], [Longitude], 5, 'km')"], "ans": ["B"], "exp": "A. DISTANCE([Latitude], [Longitude]) - DISTANCE関数は2地点間の距離を計算する空間関数であり、ポイントジオメトリの生成には使用しません。また引数の形式が正しくありません。\nB. MAKEPOINT([Latitude], [Longitude]) - 正解です。MAKEPOINT関数は緯度と経度の2つの数値フィールドからポイント（地理的ジオメトリ）を生成します。生成されたポイントフィールドを使って、シェープファイルの地区ポリゴンと空間結合（Spatial Join）を実行できます。\nC. MAKELINE([Latitude], [Longitude]) - MAKELINE関数は2つのポイント間の線を生成する空間関数です。引数にはポイントオブジェクトが必要であり、緯度と経度を直接渡すことはできません。\nD. BUFFER([Latitude], [Longitude], 5, 'km') - BUFFER関数はポイントの周囲にバッファ領域（円形ポリゴン）を生成しますが、引数にはポイントオブジェクトが必要です。まずMAKEPOINTでポイントを作成する必要があります。", "img": ""}, {"id": 115, "dom": 2, "cat": "表計算", "q": "データアナリストが、各製品カテゴリの売上が全体の売上に占める割合を計算したいと考えています。最も簡単な方法はどれですか?", "opts": ["A. SUM([Sales]) / {FIXED : SUM([Sales])} を計算フィールドとして作成する", "B. SUM([Sales])ピルを右クリックし、簡易表計算から「合計に対する割合」を選択する", "C. 円グラフを作成してラベルに%を表示する", "D. AとBの両方が有効"], "ans": ["D"], "exp": "A. SUM([Sales]) / {FIXED : SUM([Sales])} を計算フィールドとして作成する - LOD表現で全体売上を計算し、各カテゴリの売上をそれで割る方法です。正しい結果が得られますが、簡易表計算より手間がかかります。\nB. SUM([Sales])ピルを右クリックし、簡易表計算から「合計に対する割合」を選択する - ワンクリックで合計に対する割合を計算でき、最も簡単な方法です。\nC. 円グラフを作成してラベルに%を表示する - ラベルに%を付けるだけでは実際の割合計算は行われません。書式設定の問題であり、計算の問題ではありません。\nD. AとBの両方が有効 - 正解です。AのLOD表現による計算もBの簡易表計算も、どちらも有効な方法です。", "img": ""}, {"id": 116, "dom": 2, "cat": "表計算", "q": "データアナリストが、売上の高い順に製品をランク付けしたいと考えています。同じ売上の製品には同じ順位を割り当て、次の順位は飛ばさないようにしたいです（例：1位、2位、2位、3位）。使用すべき関数はどれですか?", "opts": ["A. RANK(SUM([Sales]))", "B. RANK_DENSE(SUM([Sales]))", "C. INDEX()", "D. RANK_UNIQUE(SUM([Sales]))"], "ans": ["B"], "exp": "A. RANK(SUM([Sales])) - RANK関数は同じ値に同じ順位を割り当てますが、次の順位をスキップします（例：1, 1, 3）。問題の「次の順位は飛ばさない」という要件を満たしません。\nB. RANK_DENSE(SUM([Sales])) - 正解です。RANK_DENSEは同じ値に同じ順位を割り当て、次の順位をスキップしません（例：1, 1, 2）。問題文の「1位、2位、2位、3位」というパターンに完全に一致します。\nC. INDEX() - INDEX関数はパーティション内の行位置を返しますが、値の大小に基づく順位付けは行いません。\nD. RANK_UNIQUE(SUM([Sales])) - RANK_UNIQUEは同じ値でも異なる順位を割り当てます（例：1, 2, 3）。「同じ売上に同じ順位」という要件を満たしません。", "img": ""}, {"id": 117, "dom": 2, "cat": "表計算", "q": "データアナリストが、地域×年の表で、各地域内での年ごとの累計売上を計算しています。表計算の「計算に使用」の設定として正しいものはどれですか?", "opts": ["A. 表（横）", "B. 表（下）", "C. ペイン（下）", "D. セル"], "ans": ["C"], "exp": "A. 表（横） - 「表（横）」は左から右に計算します。地域をまたいで横方向に計算されてしまい、各地域内での累計にはなりません。\nB. 表（下） - 「表（下）」は上から下に計算しますが、テーブル全体を通して計算されるため、地域のパーティション境界を越えてしまいます。\nC. ペイン（下） - 正解です。「ペイン（下）」は各ペイン（パーティション）内で上から下に計算します。地域×年のクロステーブルでは各地域が1つのペインを形成し、その中で年方向に累計が計算されます。\nD. セル - 「セル」は個々のセルに対する計算で、前の値を参照する累計計算には適していません。", "img": ""}, {"id": 118, "dom": 2, "cat": "フィルター", "q": "データアナリストが、製品名に「Pro」という文字列を含む製品のみを表示したいと考えています。フィルターのどのタブを使用すべきですか?", "opts": ["A. 一般タブ", "B. ワイルドカードタブ", "C. 条件タブ", "D. 上位タブ"], "ans": ["B"], "exp": "A. 一般タブ - フィルターダイアログの一般タブは、値のリストから手動で選択する画面です。「Pro」を含む全製品を手動で探して選択する必要があり、製品数が多い場合は非効率的です。\nB. ワイルドカードタブ - 正解です。フィルターダイアログの「ワイルドカード」タブで「含む」を選択し「Pro」と入力すると、製品名に「Pro」が含まれるすべての製品が自動的にフィルタリングされます。文字列の部分一致検索に最適な方法です。\nC. 条件タブ - 条件タブはフィールドの集計値（SUM, AVGなど）に基づく条件フィルタリングに使用されます。文字列の部分一致にはCONTAINS関数を式として記述可能ですが、ワイルドカードタブの方が直感的です。\nD. 上位タブ - 上位タブは上位N件や下位N件のフィルタリングに使用され、文字列の部分一致検索には対応していません。", "img": ""}, {"id": 119, "dom": 2, "cat": "フィルター", "q": "データアナリストが、あるシートに適用したディメンションフィルターを、同じデータソースを使用する他のすべてのシートにも適用したいと考えています。どの操作を行うべきですか?", "opts": ["A. フィルターを右クリック→「ワークシートに適用」→「このデータソースを使用するすべてのワークシート」", "B. フィルターをコンテキストフィルターに追加する", "C. データソースフィルターとして設定する", "D. AとCの両方が有効"], "ans": ["D"], "exp": "A. フィルターを右クリック→「ワークシートに適用」→「このデータソースを使用するすべてのワークシート」 - 有効な方法です。フィルターカード上で右クリックし「ワークシートに適用」→「関連するすべてのデータソースを使用するワークシート」を選択すると、同じデータソースのすべてのシートにフィルターが適用されます。\nB. フィルターをコンテキストフィルターに追加する - コンテキストフィルターはフィルターの処理順序を制御する機能であり、複数シートへのフィルター共有とは異なります。\nC. データソースフィルターとして設定する - 有効な方法です。データソースフィルターはデータソースレベルで適用され、すべてのシートに影響します。\nD. AとCの両方が有効 - 正解です。Aの「ワークシートに適用」もCの「データソースフィルター」も、複数のシートにフィルターを適用する有効な方法です。目的に応じて使い分けます。", "img": ""}, {"id": 120, "dom": 2, "cat": "パラメータ", "q": "データアナリストが、ユーザーが動的に売上目標値を設定でき、チャート上に参照線として表示されるようにしたいと考えています。必要な手順を正しい順序で並べたものはどれですか?", "opts": ["A. パラメーターを作成 → 参照線を追加しパラメーターを値に設定 → パラメーターコントロールを表示", "B. 参照線を追加 → 計算フィールドを作成 → パラメーターを作成", "C. 計算フィールドを作成 → フィルターシェルフに追加 → パラメーターコントロールを表示", "D. データソースフィルターを設定 → パラメーターを作成 → 参照線を追加"], "ans": ["A"], "exp": "A. パラメーターを作成 → 参照線を追加しパラメーターを値に設定 → パラメーターコントロールを表示 - 正解です。(1)売上目標用のパラメーターを作成、(2)参照線の値としてパラメーターを指定、(3)パラメーターコントロールを表示してユーザーが動的に値を変更可能にします。\nB. 参照線を追加 → 計算フィールドを作成 → パラメーターを作成 - 手順の順序が不適切です。まずパラメーターを作成してから参照線に設定する必要があります。\nC. 計算フィールドを作成 → フィルターシェルフに追加 → パラメーターコントロールを表示 - フィルターと参照線は異なる機能であり、参照線の作成手順としては不適切です。\nD. データソースフィルターを設定 → パラメーターを作成 → 参照線を追加 - データソースフィルターは参照線の設定とは無関係であり、正しい手順ではありません。", "img": ""}, {"id": 121, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、顧客の年齢データを10歳刻みのグループに分類してヒストグラムを作成したいと考えています。ビンのサイズとして設定すべき値はいくつですか?", "opts": ["A. 1", "B. 5", "C. 10", "D. 100"], "ans": ["C"], "exp": "A. 1 - ビンサイズ1では1歳刻みのグループになり、10歳刻みという要件を満たしません。ヒストグラムのビンが多すぎて可読性が下がります。\nB. 5 - ビンサイズ5では5歳刻み（0-4, 5-9, 10-14...）のグループになり、10歳刻みの要件を満たしません。\nC. 10 - 正解です。ビンサイズ10を設定すると、0-9, 10-19, 20-29, 30-39...という10歳刻みのグループが自動作成されます。フィールドを右クリック→「作成」→「ビン」→サイズ10で作成します。\nD. 100 - ビンサイズ100ではほぼ全データが1つのグループに入り、分布の分析ができません。", "img": ""}, {"id": 122, "dom": 1, "cat": "データ操作", "q": "データアナリストが、複数の都道府県を地方ごとにグループ化（例：東京都・神奈川県→「関東」）したいと考えています。新しい「地方」フィールドを作成するために最も適切な方法はどれですか?", "opts": ["A. エイリアスを設定する", "B. グループを作成する", "C. セットを作成する", "D. 階層を作成する"], "ans": ["B"], "exp": "A. エイリアスを設定する - エイリアスは個々の値の表示名を変更する機能であり、複数の都道府県を1つの「地方」にまとめるグループ化とは異なります。\nB. グループを作成する - 正解です。都道府県フィールドを右クリック→「作成」→「グループ」で、複数の都道府県を選択して「関東」「近畿」等のグループ名を付けられます。コーディング不要で直感的にグループを作成できる最も簡単な方法です。\nC. セットを作成する - セットは「内/外」の2グループに分類する機能であり、複数の地方グループを同時に作成する用途には適していません。\nD. 階層を作成する - 階層はディメンション間のドリルダウン関係（国→地域→都道府県）を定義する機能であり、値のグループ化とは異なります。", "img": ""}, {"id": 123, "dom": 2, "cat": "マップ", "q": "データアナリストが、大量の位置データ（10万件以上）を地図上で可視化し、訪問が集中しているエリアを特定したいと考えています。最も適したマップタイプはどれですか?", "opts": ["A. シンボルマップ", "B. 塗りつぶしマップ", "C. 密度マップ（ヒートマップ）", "D. 比例シンボルマップ"], "ans": ["C"], "exp": "A. シンボルマップ - シンボルマップは各ポイントに円マーカーを配置しますが、10万件以上のデータでは大量のマーカーが重なり（オーバープロッティング）、密度パターンの把握が困難です。\nB. 塗りつぶしマップ - 塗りつぶしマップは地域単位の集計値を色で表現しますが、ポイントデータの密度パターンの可視化には適していません。\nC. 密度マップ（ヒートマップ） - 正解です。密度マップはデータポイントの集中度を色の濃淡で可視化します。マークタイプを「密度」に設定すると、大量のポイントの重なりを「熱」として表現し、訪問集中エリアを効果的に特定できます。\nD. 比例シンボルマップ - 比例シンボルマップは値の大きさに応じてマーカーのサイズを変えますが、大量データのオーバープロッティング問題は解決されません。", "img": ""}, {"id": 124, "dom": 2, "cat": "マップ", "q": "データアナリストが、各都道府県の人口密度を色の濃淡で表現するマップを作成したいと考えています。マークタイプとして選択すべきものはどれですか?", "opts": ["A. 円", "B. 四角", "C. マップ", "D. 線"], "ans": ["C"], "exp": "A. 円 - 円マークは各ポイントに円を配置するシンボルマップになります。地理的領域の面的な塗りつぶしには対応しません。\nB. 四角 - 四角マークは各ポイントに四角形を配置するもので、都道府県の境界を塗りつぶす表現はできません。\nC. マップ（塗りつぶし） - 正解です。マークタイプを「マップ」に変更すると、塗りつぶしマップ（コロプレスマップ）が作成されます。都道府県の境界線が表示され、人口密度に応じて各地域が色の濃淡で塗り分けられます。\nD. 線 - 線マークはデータポイントを線で結ぶもので、地理的領域の面的表現には使用しません。", "img": ""}, {"id": 125, "dom": 2, "cat": "分析", "q": "データアナリストが、地域→カテゴリ別の売上テーブルに、各地域の小計と全体の総計を追加したいと考えています。どの機能を使用すべきですか?", "opts": ["A. アナリティクスペインから「合計」をドラッグする", "B. 「分析」メニュー→「合計」→「小計を表示」および「行の総計を表示」", "C. TOTAL()表計算を使用する", "D. {FIXED : SUM([Sales])} LOD計算を使用する"], "ans": ["B"], "exp": "A. アナリティクスペインから「合計」をドラッグ - これも有効な方法ですが、問題の選択肢Bの方法が最も一般的です。\nB. 「分析」メニュー→「合計」→「行の総計を表示」 - 正解です。「分析」メニューから「合計」→「行の総計を表示」「列の総計を表示」を選択して小計と総計を追加できます。\nC. TOTAL()表計算を使用する - TOTAL関数はパーティション全体の集計値を返す表計算ですが、テーブルに小計行を自動追加する機能ではありません。\nD. {FIXED : SUM([Sales])} - FIXED LOD式は全体合計を計算しますが、テーブルに小計/総計行を自動追加する機能はありません。", "img": ""}, {"id": 126, "dom": 2, "cat": "分析", "q": "データアナリストが、散布図に95%の範囲を示す分布バンドを追加したいと考えています。使用すべき機能はどれですか?", "opts": ["A. 参照バンド", "B. 分布バンド", "C. 傾向線", "D. 予測"], "ans": ["B"], "exp": "A. 参照バンド - 参照バンドは2つの固定値または計算値の間の範囲を網掛け表示する機能ですが、パーセンタイルに基づく統計的な分布範囲の自動計算は行いません。\nB. 分布バンド - 正解です。アナリティクスペインの「分布バンド」を散布図にドラッグし、「パーセンタイル」設定で2.5%と97.5%を指定すると、95%の範囲を示す分布バンドが表示されます。標準偏差ベースの設定も可能です。\nC. 傾向線 - 傾向線はデータの全体的なトレンド（線形、対数等）を示す線であり、分布範囲を視覚的に表示する機能ではありません。\nD. 予測 - 予測は時系列データに基づく将来値の推定機能であり、既存データの分布範囲表示とは目的が異なります。", "img": ""}, {"id": 127, "dom": 2, "cat": "LOD表現", "q": "データアナリストが、カテゴリ別の売上ビューで、各カテゴリ内の顧客ごとの平均売上を計算したいと考えています。ビューにはカテゴリのみが表示されています。使用すべきLOD式はどれですか?", "opts": ["A. {FIXED [Customer Name]: AVG([Sales])}", "B. {INCLUDE [Customer Name]: SUM([Sales])}", "C. {EXCLUDE [Category]: SUM([Sales])}", "D. {FIXED [Category], [Customer Name]: SUM([Sales])}"], "ans": ["B"], "exp": "A. {FIXED [Customer Name] : AVG([Sales])} - FIXED LODは顧客名の粒度で平均を計算しますが、ビューのカテゴリ別コンテキストを無視して計算されるため、「カテゴリ内での顧客ごとの平均」にはなりません。\nB. {INCLUDE [Customer Name] : AVG([Sales])} - 正解です。INCLUDE LOD表現は、ビューの詳細レベルに[Customer Name]を追加して計算します。カテゴリ別ビューに対してINCLUDEを指定すると、各カテゴリ×顧客の粒度で平均が計算され、その結果がビューレベルで集計されます。\nC. {EXCLUDE [Category] : AVG([Sales])} - EXCLUDE LODはカテゴリを除外して計算するため、カテゴリ別の分析という要件と矛盾します。\nD. {FIXED [Category] : AVG([Sales])} - FIXED [Category]はカテゴリ粒度の平均を計算しますが、顧客レベルの粒度を追加する動作はしないため、「顧客ごとの平均売上」にはなりません。", "img": ""}, {"id": 128, "dom": 2, "cat": "LOD表現", "q": "データアナリストが、カテゴリ×サブカテゴリ別の売上テーブルで、各行にそのカテゴリの合計売上を表示したいと考えています。使用すべきLOD式はどれですか?", "opts": ["A. {FIXED [Category]: SUM([Sales])}", "B. {EXCLUDE [Sub-Category]: SUM([Sales])}", "C. {INCLUDE [Category]: SUM([Sales])}", "D. AとBの両方が同じ結果を返す"], "ans": ["D"], "exp": "A. {FIXED [Category]: SUM([Sales])} - 有効な方法です。FIXEDでカテゴリのみを指定すると、ビューの詳細レベル（サブカテゴリ）に関係なく、各カテゴリの売上合計が計算されます。ただしFIXEDはコンテキストフィルター以外のフィルターの影響を受けません。\nB. {EXCLUDE [Sub-Category]: SUM([Sales])} - 有効な方法です。EXCLUDEでサブカテゴリを除外すると、ビューの詳細レベルからサブカテゴリが取り除かれ、カテゴリレベルの売上合計が返されます。ただしEXCLUDEはディメンションフィルター等の影響を受けます。\nC. {INCLUDE [Category]: SUM([Sales])} - ビューに既にカテゴリが含まれている場合、INCLUDEでカテゴリを追加しても効果はありません。サブカテゴリレベルの集計と同じ結果になります。\nD. AとBの両方が同じ結果を返す - 正解です。多くの場合、FIXED [Category]とEXCLUDE [Sub-Category]は同じカテゴリレベルの合計を返します。ただし、フィルターの影響範囲が異なる点に注意が必要です（FIXEDはフィルターを無視、EXCLUDEはフィルターの影響を受ける）。", "img": ""}, {"id": 129, "dom": 2, "cat": "分析", "q": "データアナリストが、Tableauの予測機能を使用するために必要な条件として正しいものはどれですか?（2つ選択）", "opts": ["A. ビューに少なくとも1つの日付ディメンションが必要", "B. ビューに少なくとも1つのメジャーが必要", "C. データソースがライブ接続である必要がある", "D. ビューに少なくとも3つのディメンションが必要"], "ans": ["A", "B"], "exp": "A. ビューに少なくとも1つの日付ディメンションが必要 - 正解です。Tableauの予測機能は時系列データに基づくため、日付ディメンションが必須です。日付がないと「分析」メニューの「予測」がグレーアウトします。\nB. ビューに少なくとも1つのメジャーが必要 - 正解です。予測は数値データ（メジャー）の将来値を推定する機能であるため、メジャーが必須です。日付ディメンションとメジャーの両方がビューに含まれている必要があります。\nC. データソースがライブ接続である必要がある - 誤りです。予測機能はデータの接続方式に依存しません。ライブ接続でも抽出でも使用可能です。\nD. ビューに少なくとも3つのディメンションが必要 - 誤りです。予測に必要なのは日付ディメンション1つとメジャーです。ディメンションが多すぎると予測の精度が低下する場合があります。", "img": ""}, {"id": 130, "dom": 2, "cat": "パラメータ", "q": "データアナリストが、パラメーターの値リストをデータソースの値に基づいて自動更新されるようにしたいと考えています。必要な設定はどれですか?", "opts": ["A. パラメーター編集画面で「ワークブックを開いたときにデータベースから値を設定」にチェックを入れる", "B. パラメーターアクションを作成する", "C. 計算フィールドでパラメーターを参照する", "D. パラメーターをフィルターシェルフに追加する"], "ans": ["A"], "exp": "A. パラメーター編集画面で「ワークブックを開いた時に値を更新」にチェックを入れる - 正解です。パラメーターの許容値を「リスト」に設定し、「ワークブックを開いた時にデータソースの値を追加」オプションをチェックすると、開くたびに最新の値が自動反映されます。\nB. パラメーターアクションを作成する - パラメーターアクションはダッシュボード上の操作に基づいてパラメーターの値を変更する機能であり、値リスト自体の自動更新とは異なります。\nC. 計算フィールドでパラメーターを動的に更新する - 計算フィールドはパラメーターの値リストを更新する機能を持っていません。\nD. パラメーターをフィルターシェルフに追加する - パラメーターをフィルターシェルフに追加することはできません。パラメーターはフィルターとは異なる仕組みです。", "img": ""}, {"id": 131, "dom": 2, "cat": "マップ", "q": "データアナリストが、地図上に店舗の位置（ポイント）と各地区の売上（塗りつぶし）を同時に表示したいと考えています。使用すべき機能はどれですか?", "opts": ["A. 二重軸", "B. マークレイヤー", "C. ダッシュボードで2つのマップシートを重ねる", "D. データブレンド"], "ans": ["A"], "exp": "A. 二重軸 - 正解です。デュアル軸（二重軸）マップは緯度を複製してデュアル軸を設定し、各レイヤーに異なるマークタイプ（ポイント、塗りつぶし）を適用できます。Tableauの全バージョンで使用可能な標準的な方法です。\nB. マークレイヤー - マークレイヤー機能（Map Layers）はTableau 2024.2以降で利用可能です。複数のデータレイヤーを独立して管理できますが、比較的新しい機能であり、試験では二重軸マップが標準的な回答です。\nC. ダッシュボードで2つのマップシートを重ねる - 並置では軸の連動が困難で、同一マップ上の重ね合わせとしては不適切です。\nD. データブレンド - データブレンドはデータソースの結合方法であり、マップのレイヤー表示方法ではありません。", "img": ""}, {"id": 132, "dom": 2, "cat": "分析", "q": "データアナリストが、月別売上チャートに全期間の平均値を示す水平線を追加したいと考えています。参照線のスコープとして正しいものはどれですか?", "opts": ["A. テーブル全体（Table）", "B. ペインごと（Per Pane）", "C. セルごと（Per Cell）", "D. 軸ごと（Per Axis）"], "ans": ["A"], "exp": "A. テーブル全体（Table） - 正解です。参照線の「範囲」を「テーブル全体」に設定し、集計方法を「平均」にすると、ビュー内のすべてのデータポイントの平均値を示す水平線がチャートに追加されます。全期間の平均を1本の線で表示するのに最適です。\nB. ペインごと（Per Pane） - ペインごとの参照線は、各パーティション（ペイン）内で個別に平均を計算して線を表示します。「全期間の平均値を示す1本の水平線」にはなりません。\nC. セルごと（Per Cell） - セルごとの参照線は各セル内で計算されるため、全体の平均を示す単一の水平線にはなりません。\nD. 軸ごと（Per Axis） - Tableauの参照線の範囲オプションに「軸ごと」は存在しません。", "img": ""}, {"id": 133, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、4つの製品カテゴリの売上構成比を円グラフで表示しています。各セグメントに売上金額とパーセンテージの両方をラベルとして表示するにはどうすべきですか?", "opts": ["A. SUM([Sales])をラベルに追加し、簡易表計算「合計に対する割合」を適用した別のSUM([Sales])もラベルに追加する", "B. SUM([Sales])を色に、パーセンテージの計算フィールドをラベルに追加する", "C. ツールヒントにパーセンテージを追加する", "D. 書式設定でラベルの数値形式をパーセンテージに変更する"], "ans": ["A"], "exp": "A. SUM([Sales])をラベルに配置する - 正解です。マークカードの「ラベル」にSUM([Sales])をドラッグすると、円グラフの各セグメント上に売上金額が表示されます。ラベルのフォント、位置、数値形式もカスタマイズ可能です。\nB. SUM([Sales])を色に配置する - 色に配置すると各セグメントの色の濃淡が変わりますが、金額のテキスト表示は行われません。\nC. ツールヒントにパーセンテージを追加する - ツールヒントはマウスホバー時にのみ表示され、常時表示されるラベルとは異なります。\nD. 書式設定でラベルの数値形式をパーセントに変更する - 書式設定の変更は表示形式の調整であり、ラベルの追加自体ではありません。まずラベルにフィールドを配置する必要があります。", "img": ""}, {"id": 134, "dom": 2, "cat": "並べ替え", "q": "データアナリストが、棒グラフの棒を「高」「中」「低」の順序で並べたいと考えています。デフォルトではアルファベット順に並んでいます。使用すべき並べ替え方法はどれですか?", "opts": ["A. ツールバーの並べ替えボタンをクリックする", "B. フィールドを右クリックし「手動」並べ替えで順序をドラッグして変更する", "C. SUM([Sales])の降順で並べ替える", "D. フィルターで順序を制御する"], "ans": ["B"], "exp": "A. ツールバーの並べ替えボタンをクリック - 並べ替えボタンは昇順/降順の自動並べ替えのみで、「高→中→低」のような任意のカスタム順序は指定できません。\nB. フィールドを右クリックし「手動の並べ替え」で順序を指定 - 正解です。フィールドを右クリック→「並べ替え」→「手動」タブで項目をドラッグして任意の順序に並べ替えられます。この設定は保存され、データ更新後も維持されます。\nC. SUM([Sales])の降順で自動並べ替え - 値に基づく自動並べ替えは数値順になりますが、「高→中→低」というラベルの論理的順序とは一致しない場合があります。\nD. フィルターで順序を制御する - フィルターはデータの絞り込み機能であり、表示順序の制御には使用しません。", "img": ""}, {"id": 135, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード内の3つのチャートを横並びで均等な幅で配置したいと考えています。最も適切な方法はどれですか?", "opts": ["A. 各シートを個別にダッシュボードにドラッグする", "B. 水平コンテナを追加し、その中に3つのシートを配置する", "C. 垂直コンテナを追加し、その中に3つのシートを配置する", "D. 浮動レイアウトで3つのシートを手動で配置する"], "ans": ["B"], "exp": "A. 各シートを個別にダッシュボードに配置して幅を手動調整する - 個別配置では幅の均等化に手動計算が必要で、リサイズ時にも自動調整されません。\nB. 水平コンテナを追加し、その中に3つのシートを配置する - 正解です。水平コンテナ内にシートを配置すると「均等配分」で各シートの幅が自動的に等分されます。3つのチャートが正確に1/3ずつの幅で横並びになります。\nC. 垂直コンテナを追加し、その中に3つのシートを配置する - 垂直コンテナは縦並び配置であり、「横並びで均等な幅」という要件を満たしません。\nD. 浮動レイアウトで3つのシートを座標指定で配置する - 浮動レイアウトでは各オブジェクトの位置とサイズを手動で指定する必要があり、均等配分の自動調整が利用できません。", "img": ""}, {"id": 136, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード上の棒グラフで製品をクリックした際に、外部Webサイトの製品詳細ページが開くようにしたいと考えています。使用すべきアクションはどれですか?", "opts": ["A. フィルターアクション", "B. ハイライトアクション", "C. URLアクション", "D. パラメーターアクション"], "ans": ["C"], "exp": "A. フィルターアクション - フィルターアクションはダッシュボード内の他のシートにフィルターを適用する機能であり、外部Webサイトへの遷移には使用できません。\nB. ハイライトアクション - ハイライトアクションは関連データポイントの強調表示機能であり、外部URLへの遷移には対応していません。\nC. URLアクション - 正解です。URLアクションはマーク選択時に指定URLに遷移する機能です。URLにフィールド値を埋め込めるため（例：https://example.com/product/<Product ID>）、製品クリック時に対応する詳細ページを開けます。\nD. パラメーターアクション - パラメーターアクションはパラメーター値の更新機能であり、外部URLへの遷移とは異なります。", "img": ""}, {"id": 137, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード上でカテゴリを選択すると「選択中」と「それ以外」のデータを色分けで同時比較表示したいと考えています。フィルターアクションの代わりにセットアクションを使用する利点は何ですか?", "opts": ["A. セットアクションはフィルターアクションより高速に動作する", "B. セットアクションは「選択中」と「それ以外」のデータを同時に比較表示できる", "C. セットアクションはダッシュボード全体に自動適用される", "D. セットアクションは複数のデータソース間で動作する"], "ans": ["B"], "exp": "A. セットアクションはフィルターアクションより高速に動作する - 誤りです。セットアクションの主な利点は速度ではなく、「選択中」と「それ以外」のデータを同時に表示できることです。パフォーマンスはデータ量やビューの複雑さに依存します。\nB. セットアクションは「選択中」と「それ以外」のデータを同時に比較表示できる - 正解です。セットアクションの最大の利点は、フィルターアクションと異なり、選択されたメンバー（In）と選択されていないメンバー（Out）を異なる色やスタイルでビュー上に同時表示できることです。フィルターアクションはフィルター対象外のデータを非表示にしてしまいます。\nC. セットアクションはダッシュボード全体に自動適用される - 誤りです。セットアクションはダッシュボードのアクション設定で、ソースシートとターゲットシートを明示的に指定する必要があります。自動的にすべてのシートに適用されるわけではありません。\nD. セットアクションは複数のデータソース間で動作する - 誤りです。セットはデータソースに紐づくため、セットアクションは単一のデータソース内でのみ機能します。", "img": ""}, {"id": 138, "dom": 3, "cat": "書式設定", "q": "データアナリストが、散布図にカスタム形状（アイコン）を割り当てたいと考えています。必要な操作はどれですか?", "opts": ["A. 画像ファイルをマイTableauリポジトリのShapesフォルダに配置し、マークタイプを「形状」に設定する", "B. Preferences.tpsファイルに形状を定義する", "C. ダッシュボードに画像オブジェクトを追加する", "D. 書式設定メニューからカスタム形状をアップロードする"], "ans": ["A"], "exp": "A. 画像ファイルをマイTableauリポジトリの形状フォルダに配置する - 正解です。カスタム形状を使用するには、画像ファイルを「マイドキュメント\\マイ Tableauリポジトリ\\形状」フォルダ内のサブフォルダに配置し、マークカードの「形状」で割り当てます。\nB. Preferences.tpsファイルに形状パスを記述する - Preferences.tpsファイルは色のカスタマイズ等に使用されますが、カスタム形状の設定には形状フォルダへのファイル配置が必要です。\nC. ダッシュボードに画像オブジェクトを追加する - 画像オブジェクトは固定位置への静的画像配置であり、データポイントに紐づく動的な形状割り当てとは異なります。\nD. 書式設定メニューからカスタム形状をインポートする - 書式設定メニューにカスタム形状のインポート機能はありません。形状フォルダへのファイル配置が正しい方法です。", "img": ""}, {"id": 139, "dom": 3, "cat": "書式設定", "q": "データアナリストが、折れ線グラフ上の特定データポイントにコメントを追加し、データ移動に追従させたいです。どの注釈を使用すべきですか?", "opts": ["A. マーク注釈", "B. ポイント注釈", "C. エリア注釈", "D. テキストオブジェクト"], "ans": ["A"], "exp": "A. マーク注釈 - 正解です。マーク注釈は特定のデータポイントに紐づき、データ移動に追従します。右クリック→「注釈」→「マーク」で追加し、フィールド値を動的に含められます。\nB. ポイント注釈 - ポイント注釈はビュー上の固定座標に配置され、データマークには紐づきません。データ変更時に追従しないため不適切です。\nC. エリア注釈 - エリア注釈はビューの範囲に配置される注釈で、特定のデータポイントに紐づかず、データ移動に追従しません。\nD. テキストオブジェクト - テキストオブジェクトはダッシュボード上の固定テキストであり、チャート内の特定データポイントへの注釈としては使用しません。", "img": ""}, {"id": 140, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード上のシートの周囲に余白を追加して間隔を広げたいと考えています。使用すべき設定はどれですか?", "opts": ["A. レイアウトタブの「内側のパディング」を増やす", "B. レイアウトタブの「外側のパディング」を増やす", "C. ダッシュボードサイズを大きくする", "D. 空白オブジェクトを挿入する"], "ans": ["B"], "exp": "A. レイアウトタブの「内側のパディング」を増やす - 内側のパディングはオブジェクト内部の余白を増やします。シートの周囲の間隔を広げるには外側のパディングが適切です。\nB. レイアウトタブの「外側のパディング」を増やす - 正解です。Tableauのレイアウトタブで「外側のパディング」を設定すると、選択したオブジェクトの外側に余白が追加され、隣接するオブジェクトとの間隔が広がります。\nC. ダッシュボードサイズを大きくする - ダッシュボード全体のサイズ変更はシート間の間隔を直接制御する方法ではありません。\nD. 空白オブジェクトを挿入する - 空白オブジェクトの挿入も間隔追加に使えますが、外側パディングの方が直接的で保守性が高いです。", "img": ""}, {"id": 141, "dom": 3, "cat": "書式設定", "q": "データアナリストが、テーブル形式のビューで行ごとに交互に背景色（ゼブラストライプ）を設定したいと考えています。使用すべき書式設定はどれですか?", "opts": ["A. 行のバンド（Row Banding）", "B. グリッド線", "C. 行の境界線", "D. セルの網掛け"], "ans": ["A"], "exp": "A. 行のバンド（Row Banding） - 正解です。書式設定→「シェーディング」→「行のバンディング」で行ごとに交互の背景色を設定できます。バンドの色とサイズを指定してテーブルの読みやすさを向上させます。\nB. グリッド線 - グリッド線は行や列の境界線であり、行ごとの交互の背景色（ゼブラストライプ）とは異なります。\nC. 行の境界線 - 行の境界線は行間の線の設定であり、交互の背景色の設定ではありません。\nD. セルの網掛け - Tableauの書式設定に「セルの網掛け」という名称の機能はありません。行のバンディングが正しい設定です。", "img": ""}, {"id": 142, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード上のチャートをブール型パラメーターで表示/非表示を切り替えたいと考えています。Dynamic Zone Visibilityに必要な条件はどれですか?（2つ選択）", "opts": ["A. 制御フィールドがブール型", "B. 制御フィールドが単一の値を返す", "C. ダッシュボードが浮動レイアウト", "D. チャートが水平コンテナ内"], "ans": ["A", "B"], "exp": "A. 制御フィールドがブール型 - 正解です。Dynamic Zone Visibilityの条件にはブール型（True/False）のフィールドまたはパラメーターが必要です。\nB. 制御フィールドが単一の値を返す - 正解です。制御フィールドは各レコードで単一のブール値を返す必要があります。\nC. ダッシュボードが浮動レイアウト - 誤りです。Dynamic Zone Visibilityはタイルでもフローティングでも使用可能です。\nD. チャートが水平コンテナ内 - 誤りです。コンテナの種類に依存しません。", "img": ""}, {"id": 143, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボードにリアルタイムのWebサイト分析ページを埋め込みたいと考えています。使用すべきオブジェクトはどれですか?", "opts": ["A. 画像オブジェクト", "B. テキストオブジェクト", "C. Webページオブジェクト", "D. 拡張機能オブジェクト"], "ans": ["C"], "exp": "A. 画像オブジェクト - 画像オブジェクトは静的な画像ファイルの表示であり、リアルタイムのWebコンテンツ表示には対応していません。\nB. テキストオブジェクト - テキストオブジェクトはリッチテキストの表示のみで、Webページの埋め込みには対応していません。\nC. Webページオブジェクト - 正解です。「オブジェクト」→「Webページ」をドラッグ＆ドロップしURLを指定すると、ダッシュボード内にiframeでWebページが埋め込まれます。リアルタイムのWebコンテンツ表示が可能です。\nD. 拡張機能オブジェクト - 拡張機能はサードパーティのカスタム機能を追加するものであり、単純なWebページの埋め込みとは異なります。", "img": ""}, {"id": 144, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、同じダッシュボードをPCとスマートフォンで最適表示したいと考えています。スマートフォン用レイアウトからデフォルトレイアウトの要素を除外できるものはどれですか?（2つ選択）", "opts": ["A. 特定のシート", "B. フィルターオブジェクト", "C. データソースの接続", "D. 計算フィールドの定義"], "ans": ["A", "B"], "exp": "A. 特定のシート - 正解です。デバイスレイアウトではシートの表示/非表示を制御でき、スマートフォン版で不要なシートを非表示にできます。\nB. フィルターオブジェクト - 正解です。フィルターオブジェクトもデバイスレイアウトで表示/非表示を制御できます。\nC. データソースの接続 - 誤りです。デバイスレイアウトはオブジェクト配置の制御であり、データソース接続は変更できません。\nD. 計算フィールドの定義 - 誤りです。計算フィールドはデータの定義であり、デバイスレイアウトの対象外です。", "img": ""}, {"id": 145, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、売上の推移を折れ線で、利益の推移を棒グラフで、同じチャート上に重ねて表示したいと考えています。この複合チャートの作成手順として正しいものはどれですか?", "opts": ["A. 売上と利益を行シェルフに配置 → 利益のピルを右クリックして「二重軸」を選択 → 各メジャーのマークタイプを個別に設定", "B. 売上をラベルに、利益を色に配置する", "C. メジャーネームとメジャーバリューを使用して自動的に重ねる", "D. ダッシュボードで折れ線グラフと棒グラフの2つのシートを重ねる"], "ans": ["A"], "exp": "A. 売上と利益を行シェルフに配置 → 利益のピルを右クリックして「二重軸」を選択 → 各メジャーのマークタイプを個別に設定 - 正解です。行シェルフに2つのメジャーを配置すると初期状態では2段のチャートになりますが、2つ目のメジャーを右クリックして「二重軸」を選択すると同じチャート上に重なります。その後、各メジャーのマークカードで個別にマークタイプ（棒/線）を設定できます。\nB. 売上をラベルに、利益を色に配置する - 利益が色の濃淡で表現されるだけで、棒と折れ線の重ね合わせにはなりません。\nC. メジャーネームとメジャーバリューを使用して自動的に重ねる - メジャーネーム/バリューは1つのチャートに複数メジャーを表示できますが、各メジャーのマークタイプを個別設定できません。\nD. ダッシュボードで折れ線グラフと棒グラフの2つのシートを重ねる - 浮動配置で重ねることは可能ですが、軸の連動が困難で推奨されません。", "img": ""}, {"id": 146, "dom": 4, "cat": "パブリッシュ", "q": "データアナリストが、Tableau Desktopで作成したデータソース（計算フィールドやデフォルト書式設定を含む）を、組織内の他のアナリストが再利用できるようにTableau Serverにパブリッシュしたいと考えています。「サーバー」メニューから選択すべきオプションはどれですか?", "opts": ["A. ワークブックのパブリッシュ", "B. データソースのパブリッシュ", "C. データの更新", "D. フローのパブリッシュ"], "ans": ["B"], "exp": "A. ワークブックのパブリッシュ - ワークブック全体（シート、ダッシュボード含む）をパブリッシュする操作です。データソースのみの共有には適していません。\nB. データソースのパブリッシュ - 正解です。「サーバー」→「データソースのパブリッシュ」を選択すると、データソースの接続情報、計算フィールド、デフォルトプロパティなどのメタデータがServer上に保存されます。他のアナリストはこのパブリッシュ済みデータソースに接続して、一貫した定義で分析を行えます。\nC. データの更新 - 既存の抽出データを更新する操作であり、パブリッシュとは異なります。\nD. フローのパブリッシュ - Tableau Prepのフローをパブリッシュする操作です。", "img": ""}, {"id": 147, "dom": 4, "cat": "Tableau Server/Cloud", "q": "データアナリストが、Tableau Prep Builderで作成したデータ準備フローを自動スケジュール実行するためにTableau Serverにパブリッシュしたいと考えています。フローをパブリッシュした後、スケジュール実行を設定するために必要な権限は何ですか?", "opts": ["A. Viewerロール", "B. Explorerロール", "C. Creatorロール", "D. どのロールでも設定可能"], "ans": ["C"], "exp": "A. Viewerロール - Viewerはパブリッシュ済みビューの閲覧のみが可能で、フローの実行やスケジュール設定はできません。\nB. Explorerロール - ExplorerはWeb上でのワークブック編集は可能ですが、Tableau Prepフローの作成やスケジュール設定には対応していません。\nC. Creatorロール - 正解です。Tableau Prepフローの作成、パブリッシュ、およびスケジュール実行の設定にはCreatorライセンスが必要です。Creatorロールには、Tableau Desktop、Tableau Prep Builder、およびServer/Cloud上でのフロー管理権限が含まれています。\nD. どのロールでも設定可能 - フローの管理にはCreatorロールが必要であり、すべてのロールで利用できるわけではありません。", "img": ""}, {"id": 148, "dom": 4, "cat": "Tableau Server/Cloud", "q": "Tableau Server上でパブリッシュ済みのワークブックをWebブラウザから編集（Web編集）できるのは、どのサイトロールのユーザーですか?（2つ選択）", "opts": ["A. Viewer", "B. Explorer", "C. Creator", "D. Unlicensed"], "ans": ["B", "C"], "exp": "A. Viewer - Viewerロールはパブリッシュされたビューやダッシュボードの閲覧、フィルター操作、データのエクスポート、サブスクリプションの作成のみが可能です。Web編集は許可されていません。Viewerはコンテンツの消費者向けのロールです。\nB. Explorer - 正解です。Explorerロールは、パブリッシュ済みのワークブックをWebブラウザ上で編集（Web編集）する権限を持っています。既存のパブリッシュ済みデータソースに接続して新しいワークブックやビューを作成することも可能です。ただし、新しいデータソースの作成やTableau Desktop/Prepの使用はできません。ExplorerはViewerの全権限に加えて、Web編集とパブリッシュ済みデータソースの使用が可能です。\nC. Creator - 正解です。CreatorロールはExplorerの全権限に加えて、Tableau Desktop/Prepの使用、新規データソースへの接続と作成、フローの管理など、すべての機能を利用できます。当然Web編集も可能です。CreatorはTableauの全機能にアクセスできる最上位のロールです。\nD. Unlicensed - ライセンスが割り当てられていないユーザーはTableau Serverにログインすることすらできません。Unlicensedステータスは、アカウントは存在するがライセンスが未割り当ての状態を示します。", "img": ""}, {"id": 149, "dom": 3, "cat": "エクスポート", "q": "データアナリストが、Tableau ServerにパブリッシュされたダッシュボードのデータをCSVファイルとしてダウンロードしたいと考えています。ダッシュボード上で使用する機能はどれですか?", "opts": ["A. ツールバーの「ダウンロード」ボタンからCSVを選択する", "B. ビューを右クリックして「データのエクスポート」を選択する", "C. シートのツールバーで「クロス集計」をクリックし、CSVを選択する", "D. 「サーバー」メニューから「データのダウンロード」を選択する"], "ans": ["A"], "exp": "A. ツールバーの「ダウンロード」ボタン→「データ」 - 正解です。Tableau Server上のビューのツールバーにある「ダウンロード」ボタンから「データ」を選択すると、基になるデータをCSV形式でダウンロードできます。「サマリー」タブと「完全なデータ」タブから選択可能です。\nB. ビューを右クリックして「データのエクスポート」 - Tableau Serverのビュー上では右クリックメニューからの直接エクスポートは提供されていません。ツールバーのダウンロードボタンを使用します。\nC. シートのツールバーで「クロス集計」を選択 - 「クロス集計」はExcel形式でのダウンロードであり、CSV形式ではありません。\nD. 「サーバー」メニューから「データのエクスポート」を選択 - Webブラウザ上での操作のため、Tableau Desktopの「サーバー」メニューは存在しません。", "img": ""}, {"id": 150, "dom": 4, "cat": "Tableau Server/Cloud", "q": "データアナリストが、Tableau Server上のダッシュボードにフィルターとパラメーターを設定した状態を保存し、次回アクセス時に同じ状態で表示されるようにしたいと考えています。また、この設定をチームメンバーにも共有したいと考えています。使用すべき機能はどれですか?", "opts": ["A. お気に入りに追加する", "B. カスタムビューを作成し、「他のユーザーに表示」を有効にする", "C. ダッシュボードのURLをブックマークする", "D. サブスクリプションを作成する"], "ans": ["B"], "exp": "A. お気に入りに追加する - お気に入りはコンテンツへのショートカットであり、フィルターやパラメーターの設定状態は保存されません。\nB. カスタムビューを保存する - 正解です。カスタムビューはフィルター、パラメーター、並べ替えの設定状態を名前付きで保存でき、「他のユーザーに表示」で共有可能です。「マイデフォルト」に設定すると常にその状態で表示されます。\nC. ダッシュボードのURLをブックマークする - URLブックマークは一部のフィルター状態を含む場合がありますが、すべての設定が保持されるわけではありません。\nD. サブスクリプションを作成する - サブスクリプションはスナップショットの定期メール配信であり、インタラクティブな設定状態の保存・共有ではありません。", "img": ""}, {"id": 151, "dom": 2, "cat": "表計算", "q": "次のビジュアライゼーションは、4つの製品（A, B, C, D）の売上を表示しています。表計算関数を使用して、各製品の位置を特定したいと考えています。\n\n製品A = 最初の行、製品D = 最後の行\n\nFIRST()、LAST()、INDEX()のそれぞれが製品Bの行で返す値の組み合わせとして正しいものはどれですか?", "opts": ["A. FIRST()=-1, LAST()=2, INDEX()=2", "B. FIRST()=1, LAST()=-2, INDEX()=2", "C. FIRST()=-1, LAST()=-2, INDEX()=2", "D. FIRST()=1, LAST()=2, INDEX()=1"], "ans": ["A"], "exp": "A. FIRST()=-1, LAST()=2, INDEX()=2 - 正解です。4つの製品（A,B,C,D）のうち、製品Bは2番目の行にあります。FIRST()は先頭行からの距離で-1（先頭から1行離れている）、LAST()は最終行までの距離で2（最終行まで2行ある）、INDEX()は行番号で2です。\nB. FIRST()=1, LAST()=-2, INDEX()=2 - FIRST()が正の値を取ることはありません（先頭行で0、それ以降は負の値）。また、LAST()が負の値を取ることもありません。\nC. FIRST()=-1, LAST()=-2, INDEX()=2 - LAST()は最終行までの残り行数なので常に0以上です。負の値にはなりません。\nD. FIRST()=1, LAST()=2, INDEX()=1 - FIRST()は先頭行からの距離（先頭行=0、2行目=-1）であり、正の値にはなりません。INDEX()=1は先頭行（製品A）を示すため、2番目の行ではありません。", "img": ""}, {"id": 152, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、売上と利益の関係を調べるために散布図を作成しています。散布図の正しい構成として適切なものはどれですか?", "opts": ["A. 列：SUM([Sales])、行：SUM([Profit])、マーク：円、詳細：[Category]", "B. 列：[Category]、行：SUM([Sales])、マーク：棒、色：SUM([Profit])", "C. 列：SUM([Sales])、行：[Category]、マーク：線、ラベル：SUM([Profit])", "D. 列：SUM([Profit])、行：SUM([Sales])、マーク：四角、サイズ：[Category]"], "ans": ["A"], "exp": "A. 列：SUM([Sales])、行：SUM([Profit])、マーク：円、詳細：[Category] - 正解です。散布図は列にメジャー（X軸）、行にメジャー（Y軸）を配置し、ディメンションを「詳細」に配置して各カテゴリを個別のデータポイントとして表示します。\nB. 列：[Category]、行：SUM([Sales])、マーク：線 - X軸がディメンション（不連続）であるため散布図にはなりません。カテゴリ別の売上折れ線グラフになります。\nC. 列：SUM([Sales])、行：[Category]、マーク：棒 - 行にディメンションがあるため散布図ではなく、カテゴリ別の横棒グラフになります。\nD. 列：SUM([Profit])、行：SUM([Sales])、マーク：棒、色：[Category] - 両軸にメジャーはありますが、マークタイプが「棒」であるため散布図ではなく棒グラフになります。散布図のマークタイプは通常「円」です。", "img": ""}, {"id": 153, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストがTableau Prep Builderでクリーニングステップを使用しています。顧客名フィールドに「Suzuki」「Szuki」「Susuki」のような類似するスペルミスが含まれています。これらを自動的にグループ化するために使用すべきオプションはどれですか?", "opts": ["A. 手動選択", "B. スペル（Spelling）", "C. 発音（Pronunciation）", "D. 共通の文字（Common Characters）"], "ans": ["B"], "exp": "A. 手動選択 - 手動でメンバーを選択してグループ化する方法です。大量のスペルミスがある場合は非効率です。\nB. スペル（Spelling） - 正解です。スペルグループ化は、編集距離（レーベンシュタイン距離）に基づいて類似する文字列を検出します。「Suzuki」「Szuki」「Susuki」のような1-2文字の違いを持つ値を自動的にグループ化します。\nC. 発音（Pronunciation） - 発音グループ化は、音声的に類似する値（例：「Smith」と「Smyth」）を検出します。今回のケースではスペルミスの検出にスペルオプションの方が適切です。\nD. 共通の文字（Common Characters） - 共通文字グループ化は、文字列に含まれる文字の共通性に基づきます。語順や構成が大きく異なる場合に使用します。", "img": ""}, {"id": 154, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、Tableauダッシュボードでオブジェクトを配置しています。タイルオブジェクトと浮動オブジェクトの違いとして正しいものはどれですか?（2つ選択）", "opts": ["A. タイルオブジェクトはグリッドに従って自動配置され、他のオブジェクトと重ならない", "B. 浮動オブジェクトはダッシュボード上の任意の位置に自由に配置でき、他のオブジェクトと重ねることができる", "C. タイルオブジェクトのみがフィルターアクションのターゲットになれる", "D. 浮動オブジェクトのみがDynamic Zone Visibilityを使用できる"], "ans": ["A", "B"], "exp": "A. タイルオブジェクトは自動的にグリッドに沿って配置される - 正解です。タイルはグリッドベースで自動配置されます。\nB. 浮動オブジェクトは自由な位置に配置でき、他のオブジェクトと重なることができる - 正解です。フローティングは自由配置でオーバーラップも可能です。\nC. タイルオブジェクトのみがフィルターアクションのターゲットになれる - 誤りです。両方ともフィルターアクションのターゲットになれます。\nD. 浮動オブジェクトのみがDynamic Zone Visibilityに対応する - 誤りです。タイルにもフローティングにも適用できます。", "img": ""}, {"id": 155, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボードに「詳細を見る」ボタンを追加し、クリック時に別のダッシュボードに移動できるようにしたいと考えています。使用すべきオブジェクトはどれですか?", "opts": ["A. テキストオブジェクトにハイパーリンクを追加する", "B. ナビゲーションオブジェクトをダッシュボードに追加する", "C. URLアクションを作成する", "D. フィルターアクションを作成する"], "ans": ["B"], "exp": "A. テキストにハイパーリンク - テキストオブジェクトにハイパーリンクを追加できますが、ワークブック内の別ダッシュボードへの内部ナビゲーションには適していません。\nB. ナビゲーションオブジェクト - 正解です。ダッシュボードのオブジェクトペインから「ナビゲーション」オブジェクトをドラッグすると、ボタンが追加されます。ボタンの設定で移動先のシートまたはダッシュボードを指定できます。ボタンのテキストや画像もカスタマイズ可能です。\nC. URLアクション - URLアクションは外部Webページを開く機能です。ワークブック内の別ダッシュボードへの移動にはナビゲーションオブジェクトが適切です。\nD. フィルターアクション - フィルターアクションはデータのフィルタリングであり、ダッシュボード間の移動機能ではありません。", "img": ""}, {"id": 156, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード上のフィルターパネル（垂直コンテナ内）を、ボタンのクリックで表示/非表示を切り替えられるようにしたいと考えています。正しい手順はどれですか?", "opts": ["A. フィルターパネルのコンテナを選択し、「表示/非表示ボタンの追加」をクリックする", "B. Dynamic Zone Visibilityを設定し、ブール型パラメーターで制御する", "C. ナビゲーションオブジェクトを追加して、別のダッシュボードに切り替える", "D. フィルターをシートレベルのフィルターに変更する"], "ans": ["A"], "exp": "A. フィルターパネルのコンテナを選択し「表示/非表示ボタンの追加」を実行する - 正解です。コンテナを選択して右クリック→「表示/非表示ボタンの追加」を実行すると、ボタンクリックでコンテナの展開/折りたたみを制御できます。\nB. Dynamic Zone Visibilityをブールパラメーターで制御する - Dynamic Zone Visibilityでもオブジェクトの表示/非表示は制御できますが、表示/非表示ボタンの方がコンテナの展開/折りたたみに直接対応しています。\nC. ナビゲーションオブジェクトを追加してフィルターパネル用ダッシュボードに遷移する - ナビゲーションは別ダッシュボードへの遷移であり、同一ダッシュボード上でのパネル表示切替とは異なります。\nD. フィルターをシートレベルのフィルターに変更する - シートレベルフィルターへの変更は表示/非表示の切替とは無関係です。", "img": ""}, {"id": 157, "dom": 1, "cat": "データ接続", "q": "データアナリストが、Tableau Desktopから、Tableau Serverにパブリッシュされたデータソースに接続したいと考えています。正しい手順はどれですか?", "opts": ["A. 「データ」メニュー→「新しいデータソース」→「Tableau Server」を選択し、サーバーにサインインしてデータソースを選択する", "B. 「ファイル」メニュー→「開く」でサーバー上のデータソースファイルを直接開く", "C. 「サーバー」メニュー→「データのダウンロード」でローカルにコピーしてから接続する", "D. Webブラウザでデータソースをダウンロードし、ローカルファイルとして接続する"], "ans": ["A"], "exp": "A. 「データ」メニュー→「新しいデータソース」→「Tableau Server」を選択し、サーバーにサインインしてデータソースを選択する - 正解です。Tableau Desktopの「データ」メニューから「新しいデータソース」を選択し、コネクタリストで「Tableau Server」を指定します。サーバーURLを入力してサインインすると、アクセス権のあるパブリッシュ済みデータソースが一覧表示され、接続できます。\nB. 「ファイル」メニュー→「開く」でサーバー上のデータソースファイルを直接開く - 「ファイル」→「開く」はワークブック(.twb/.twbx)を開く操作であり、パブリッシュ済みデータソースへの接続方法ではありません。\nC. 「サーバー」メニュー→「データのダウンロード」でローカルにコピーしてから接続する - ダウンロードするとパブリッシュ済みデータソースの利点（一元管理、自動更新）が失われます。\nD. Webブラウザでデータソースをダウンロードし、ローカルファイルとして接続する - これもデータソースの一元管理の利点を失う方法であり不適切です。", "img": ""}, {"id": 158, "dom": 2, "cat": "LOD表現", "q": "データアナリストが、各顧客の最初の注文日における売上金額を計算し、その平均を地域ごとに表示したいと考えています。ビューの行シェルフに[Region]を配置した状態で、メジャーとして使用すべき計算式はどれですか？", "opts": ["A. AVG({FIXED [Customer ID] : MIN([Order Date])})", "B. AVG(IF [Order Date] = {FIXED [Customer ID] : MIN([Order Date])} THEN [Sales] END)", "C. {FIXED [Region] : AVG([Sales])}", "D. {EXCLUDE [Customer ID] : AVG([Sales])}"], "ans": ["B"], "exp": "A. AVG({FIXED [Customer ID] : MIN([Order Date])}) - この式は各顧客の初回注文「日付」の平均を返します。日付の平均値であり、売上金額ではないため要件を満たしません。\nB. AVG(IF [Order Date] = {FIXED [Customer ID] : MIN([Order Date])} THEN [Sales] END) - 正解です。内側の{FIXED [Customer ID] : MIN([Order Date])}で各顧客の初回注文日を特定し、IF文で注文日が初回注文日と一致する行のみ[Sales]を返します。AVGで集計すると、ビューの行シェルフに配置した[Region]ごとに「初回注文日の売上」の平均が自動的にパーティションされます。FIXEDはビューのディメンションに依存しないため、地域に関係なく正しい初回注文日が取得されます。\nC. {FIXED [Region] : AVG([Sales])} - 地域ごとの全売上の平均を計算します。「最初の注文日」という条件が含まれておらず、要件を満たしません。\nD. {EXCLUDE [Customer ID] : AVG([Sales])} - Customer IDを除外して平均を計算しますが、「最初の注文日」の条件が含まれていないため要件を満たしません。", "img": ""}, {"id": 159, "dom": 2, "cat": "分析", "q": "データアナリストが、散布図に傾向線を追加しました。傾向線のモデルの種類として、Tableauで選択できないものはどれですか?", "opts": ["A. 線形（Linear）", "B. 対数（Logarithmic）", "C. 多項式（Polynomial）", "D. シグモイド（Sigmoid）"], "ans": ["D"], "exp": "A. 線形（Linear） - Tableauで選択可能です。y = mx + bの直線モデルです。\nB. 対数（Logarithmic） - Tableauで選択可能です。y = a * ln(x) + bの対数モデルです。\nC. 多項式（Polynomial） - Tableauで選択可能です。次数2〜8次の曲線モデルです。\nD. シグモイド（Sigmoid） - 正解（選択できない）。Tableauの傾向線ではシグモイドモデルはサポートされていません。選択可能なモデルは線形、対数、指数、多項式、べき乗の5種類です。", "img": ""}, {"id": 160, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、棒グラフのツールヒントに、ホバーしたカテゴリの月別売上推移を示す折れ線グラフを埋め込みたいと考えています。この機能の名称と設定方法として正しいものはどれですか?", "opts": ["A. Viz in Tooltip - ツールヒントの編集画面で「挿入」→「シート」を選択し、埋め込むシートを指定する", "B. ダッシュボードアクション - ハイライトアクションでツールヒントを制御する", "C. ツールヒントの書式設定 - 画像をツールヒントに追加する", "D. 注釈 - マーク注釈にチャートを埋め込む"], "ans": ["A"], "exp": "A. Viz in Tooltip - 正解です。ツールヒント編集画面で「挿入」→「シート」から折れ線グラフシートを選択すると、ホバー時に動的なチャートが表示されます。filter属性により、対象カテゴリのデータのみが表示されます。\nB. ダッシュボードアクション - フィルターアクションはシート間の連動に使用しますが、ツールヒント内にグラフを埋め込む機能ではありません。\nC. ツールヒントの書式設定 - 画像やグラフの直接埋め込みは書式設定では行えません。Viz in Tooltipのシート参照機能が必要です。\nD. 注釈 - マーク注釈にチャートを埋め込む機能はありません。注釈はテキストベースのコメントです。", "img": ""}, {"id": 161, "dom": 1, "cat": "データ操作", "q": "データアナリストが、データソース内の「M」「F」という値を「男性」「女性」と表示したいと考えています。データ自体は変更せず、ビュー上の表示のみを変更したい場合に使用すべき機能はどれですか?", "opts": ["A. グループの作成", "B. エイリアスの編集", "C. 計算フィールドの作成", "D. データソース内の値を直接編集"], "ans": ["B"], "exp": "A. グループの作成 - グループは複数の値をまとめる機能であり、個々の値（M→男性、F→女性）の表示名変更には適していません。\nB. エイリアスの編集 - 正解です。エイリアスは元のデータを変更せず、Tableau上の表示名のみを変更します。フィールドを右クリック→「エイリアス」で「M」→「男性」、「F」→「女性」と設定でき、最もシンプルで安全な方法です。\nC. 計算フィールドの作成 - IF文やCASE文で変換可能ですが、エイリアスと比較して手間がかかります。複雑な条件が不要な単純な名前変更にはエイリアスが適切です。\nD. データソース内の値を直接編集 - データソースの直接編集はデータを変更してしまい、他の使用者にも影響が及ぶため推奨されません。", "img": ""}, {"id": 162, "dom": 2, "cat": "フィルター", "q": "データアナリストが、「テクノロジー」カテゴリ内でTop 10の製品を表示したいと考えています。しかし、カテゴリフィルターで「テクノロジー」を選択し、Top 10フィルターを適用しても、他のカテゴリの製品が表示されてしまいます。この問題を解決するために行うべき操作はどれですか?", "opts": ["A. カテゴリフィルターをコンテキストフィルターに追加する", "B. Top 10フィルターをコンテキストフィルターに追加する", "C. カテゴリフィルターをデータソースフィルターに変更する", "D. AまたはCのいずれか"], "ans": ["D"], "exp": "A. カテゴリフィルターをコンテキストフィルターに設定する - 正解です。カテゴリフィルターをコンテキストフィルターに設定すると、Top 10フィルターより先に処理されるため、「テクノロジーカテゴリ内でのTop 10」が正しく計算されます。\nB. Top 10フィルターをコンテキストフィルターに変更する - Top Nフィルター自体をコンテキストに設定しても、カテゴリのフィルタリングが後に処理されるため意味がありません。\nC. カテゴリフィルターをデータソースフィルターに変更する - データソースフィルターは最も早く処理されるため、テクノロジーカテゴリに限定した上でTop 10が正しく計算されます。これも有効な方法です。\nD. AまたはCのいずれか - 正解です。AのコンテキストフィルターもCのデータソースフィルターも、カテゴリフィルターをTop Nフィルターより先に処理させる方法として有効です。", "img": ""}, {"id": 163, "dom": 2, "cat": "表計算", "q": "データアナリストが、地域×四半期のクロステーブルで売上の「差の割合」表計算を使用しています。各地域内で前の四半期からの変化率を計算するには、「計算に使用」をどのように設定すべきですか?", "opts": ["A. 表（横）", "B. 表（下）", "C. ペイン（横）", "D. セル"], "ans": ["C"], "exp": "A. 表（横） - 「表（横）」は左から右にテーブル全体を通して計算するため、地域の境界をまたいで計算されてしまいます。\nB. 表（下） - 「表（下）」は上から下に計算するため、四半期方向（横）の変化率計算には適しません。\nC. ペイン（横） - 正解です。各地域が1つのペインを形成し、その中で四半期方向（横方向）に差の割合が計算されます。地域をまたがず、各地域内での四半期ごとの変化率が正確に算出されます。\nD. セル - 「セル」は個々のセルに対する計算で、前の値を参照する差の割合計算には適していません。", "img": ""}, {"id": 164, "dom": 1, "cat": "データ接続", "q": "Tableau Desktopで2つのテーブルを組み合わせる際、リレーションシップとジョインの違いとして正しいものはどれですか?（2つ選択）", "opts": ["A. リレーションシップはクエリ実行時に必要なデータのみを結合する（遅延結合）", "B. ジョインは常にすべてのデータを事前に結合する", "C. リレーションシップでは結合タイプ（内部/左/右/完全）を指定する必要がある", "D. リレーションシップはデータの粒度が異なるテーブルを自動的に処理できる"], "ans": ["A", "D"], "exp": "A. リレーションシップはクエリ実行時に必要なデータのみを結合する（遅延結合） - 正解です。リレーションシップは遅延評価で、クエリ実行時に必要なJOINのみを自動生成します。\nB. ジョインは常にすべてのデータを事前に結合する - 正しい記述ですが、厳密には「常にすべて」ではなく結合条件に合致するデータを事前結合します。この問題では正解の選択肢に含まれていません。\nC. リレーションシップでは結合タイプ（内部/左/右/完全）を指定する必要がある - 誤りです。リレーションシップでは結合タイプの指定は不要で、Tableauが自動的に最適な結合を選択します。結合タイプの明示的な指定はJOINの特徴です。\nD. リレーションシップはデータの粒度が異なるテーブルを自動的に処理できる - 正解です。リレーションシップはテーブルごとの粒度を維持するため、ファクトテーブルとディメンションテーブルの粒度が異なっても正しく結合されます。", "img": ""}, {"id": 165, "dom": 1, "cat": "データ操作", "q": "データアナリストが、[Sales]フィールドを使用するすべてのビューで、値が自動的に通貨形式（¥1,234,567）で表示されるようにしたいと考えています。各シートで個別に書式設定を行わずにこれを実現する方法はどれですか?", "opts": ["A. [Sales]フィールドを右クリック→「デフォルトのプロパティ」→「数値の書式設定」で通貨を設定する", "B. 「書式」メニュー→「ワークブックの書式設定」で数値形式を変更する", "C. 計算フィールドでSTR(ROUND([Sales],0))を作成する", "D. データソース内で書式を変更する"], "ans": ["A"], "exp": "A. [Sales]フィールドを右クリック→「デフォルトのプロパティ」→「数値の書式設定」で通貨を設定する - 正解です。デフォルトプロパティで設定した数値形式は、そのフィールドを使用するすべてのシートに自動適用されるため、各シートで個別設定が不要です。\nB. 「書式」メニュー→「ワークブックの書式設定」で数値形式を変更する - ワークブックの書式設定はフォントや線の一括変更機能であり、特定フィールドの数値形式設定には対応していません。\nC. 計算フィールドでSTR(ROUND([Sales],0))を作成する - STR関数で文字列に変換すると数値としての集計（SUM, AVG等）ができなくなります。通貨表示にはデフォルトプロパティが適切です。\nD. データソース内で書式を変更する - データソース側の書式変更はTableauの制御外であり、Tableau上での一括書式設定にはデフォルトプロパティが適切です。", "img": ""}, {"id": 166, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、Tableau Prep Builderで、四半期ごとの売上列（Q1_Sales, Q2_Sales, Q3_Sales, Q4_Sales）を持つデータを、Quarter列とSales列の2列に変換したいと考えています。使用すべきステップはどれですか?", "opts": ["A. ユニオンステップ", "B. 結合ステップ", "C. ピボットステップ（列を行に）", "D. 集計ステップ"], "ans": ["C"], "exp": "A. ユニオンステップ - ユニオンは複数テーブルの縦方向結合であり、1つのテーブル内の列変換には使用しません。\nB. 結合ステップ - 結合（JOIN）は別テーブルとの横方向の結合であり、単一テーブル内の列ピボットとは異なります。\nC. ピボットステップ（列を行に） - 正解です。ピボット機能で横に並んだ四半期列（Q1_Sales, Q2_Sales等）を「四半期」と「売上」の2列に変換（アンピボット）します。分析に適した縦長フォーマットに変換されます。\nD. 集計ステップ - 集計ステップはデータの粒度を変更する機能であり、列を行に変換するピボット操作とは異なります。", "img": ""}, {"id": 167, "dom": 1, "cat": "Tableau Prep", "q": "データアナリストが、Tableau Prep Builderのクリーニングステップで、2023年以降の注文データのみを保持するフィルターを適用したいと考えています。使用すべきフィルターの種類はどれですか?", "opts": ["A. 値フィルター（個別値のリストから選択）", "B. 範囲フィルター（開始日を2023年1月1日に設定）", "C. 計算フィルター（YEAR([Order Date]) >= 2023）", "D. BとCの両方が有効"], "ans": ["D"], "exp": "A. 値フィルター（個別値のリストから選択） - 値フィルターは特定の日付値を手動で選択する方法です。動的な範囲指定には適していません。\nB. 範囲フィルター（開始日を2023年1月1日に設定） - 有効な方法です。日付フィールドに対して範囲フィルターで開始日を指定し、2023年以降のデータのみを保持できます。\nC. 計算フィルター（YEAR([Order Date]) >= 2023） - 有効な方法です。計算式でYEAR関数を使い、2023年以降という条件で柔軟にフィルタリングできます。\nD. BとCの両方が有効 - 正解です。Bの範囲フィルターもCの計算フィルターも、2023年以降のデータを抽出する有効な方法です。範囲フィルターはUI操作で設定でき、計算フィルターはより柔軟な条件指定が可能です。", "img": ""}, {"id": 168, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、Tableauダッシュボードで複数のオブジェクト（シート、フィルター、テキスト等）を配置しています。ダッシュボードの左下に表示される「アイテム階層」ペインの説明として正しいものはどれですか?（2つ選択）", "opts": ["A. ダッシュボード上のすべてのオブジェクトの親子関係（ネスト構造）をツリー形式で表示する", "B. アイテム階層でオブジェクトを選択すると、ダッシュボード上の対応するオブジェクトがハイライトされる", "C. アイテム階層はフィルターの処理順序を制御する", "D. アイテム階層はデータソース内のディメンション階層を表示する"], "ans": ["A", "B"], "exp": "A. ダッシュボード上のすべてのオブジェクトの親子関係をツリー形式で表示する - 正解です。アイテム階層ペインはネスト構造をツリーで可視化します。\nB. アイテム階層でオブジェクトを選択すると、ダッシュボード上で対応するオブジェクトがハイライトされる - 正解です。階層ペインとダッシュボード上の表示が連動します。\nC. アイテム階層はフィルターの処理順序を制御する機能である - 誤りです。フィルター処理順序はフィルターの種類で決まり、アイテム階層とは無関係です。\nD. アイテム階層はデータソース内のディメンション階層を表示する - 誤りです。アイテム階層はダッシュボードのレイアウト構造であり、データのフィールド階層とは異なります。", "img": ""}, {"id": 169, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボード上の水平コンテナ内にネストされた特定のシートを選択しようとしていますが、クリックするとコンテナ全体が選択されてしまいます。目的のシートだけを正確に選択する方法として最も適切なものはどれですか?", "opts": ["A. ダッシュボードの「アイテム階層」ペインから目的のシートを直接クリックする", "B. シートのタイトルをダブルクリックする", "C. Ctrl+Zで操作を取り消してから再度クリックする", "D. ダッシュボードの書式設定メニューからシートを選択する"], "ans": ["A"], "exp": "A. ダッシュボードの「アイテム階層」ペインからオブジェクトを選択する - 正解です。アイテム階層ペインでツリーを展開し、対象のシートを直接クリックすることで、ネストされたオブジェクトを正確に選択できます。コンテナ内の深い階層にあるオブジェクトでも確実に選択可能です。\nB. シートのタイトルをダブルクリックする - タイトルのダブルクリックはタイトルの編集モードに入る操作であり、オブジェクトの選択方法としては不確実です。コンテナ内でのネスト構造では意図しないオブジェクトが選択される可能性があります。\nC. Ctrl+Zで操作を取り消して再配置する - Ctrl+Zは操作の取り消し（Undo）であり、オブジェクトの選択とは無関係です。\nD. ダッシュボードの書式設定メニューからオブジェクトを選択する - 書式設定メニューにはオブジェクト選択機能はありません。", "img": ""}, {"id": 170, "dom": 2, "cat": "LOD表現", "q": "データアナリストが、各地域における「顧客1人あたりの平均注文金額」を計算したいと考えています。まず顧客ごとの注文合計を計算し、それを地域ごとに平均する必要があります。正しいネストLOD式はどれですか？", "opts": ["A. AVG({FIXED [Customer ID] : SUM([Sales])})", "B. {FIXED [Region] : AVG({FIXED [Customer ID] : SUM([Sales])})}", "C. {FIXED [Region] : SUM({FIXED [Customer ID] : AVG([Sales])})}", "D. {INCLUDE [Customer ID] : AVG([Sales])}"], "ans": ["B"], "exp": "A. AVG({FIXED [Customer ID] : SUM([Sales])}) - 内側のFIXEDで顧客ごとの注文合計を計算し、AVGで平均を取ります。ビューに[Region]があれば地域ごとの値になりますが、FIXEDではなくビュー依存の集計であるため、他のフィルターの影響を受けます。\nB. {FIXED [Region] : AVG({FIXED [Customer ID] : SUM([Sales])})} - 正解です。これはネストLOD式です。内側の{FIXED [Customer ID] : SUM([Sales])}で各顧客の注文合計を計算し、外側の{FIXED [Region] : AVG(...)}で地域ごとの平均を算出します。フィルターに依存しない安定した結果を返します。\nC. {FIXED [Region] : SUM({FIXED [Customer ID] : AVG([Sales])})} - 内側でAVG、外側でSUMを使っているため、「顧客の平均注文額の地域合計」になり、要件の「地域ごとの平均」とは異なります。\nD. {INCLUDE [Customer ID] : AVG([Sales])} - INCLUDEはビューの詳細レベルに顧客を追加しますが、ネストLODではなく、地域レベルの固定計算にはなりません。", "img": ""}, {"id": 171, "dom": 1, "cat": "データ接続", "q": "データアナリストが、Tableau DesktopからMySQLデータベースに初めて接続する際に必要な情報として正しいものはどれですか？（2つ選択）", "opts": ["A. サーバー名（ホスト名またはIPアドレス）", "B. Tableauライセンスキー", "C. データベースのユーザー名とパスワード", "D. Tableau Serverの管理者権限"], "ans": ["A", "C"], "exp": "A. サーバー名（ホスト名またはIPアドレス） - 正解です。リレーショナルデータベースに接続するには、データベースサーバーのホスト名またはIPアドレスが必要です。ポート番号も必要な場合があります。\nB. Tableauライセンスキー - Tableauライセンスはアプリケーションのアクティベーションに使用されますが、データベース接続には不要です。\nC. データベースのユーザー名とパスワード - 正解です。認証が必要なデータベースに接続するには、アクセス権限を持つユーザー名とパスワードが必要です。\nD. Tableau Serverの管理者権限 - Tableau Serverの権限はデータベースへの直接接続には不要です。データベース自体の認証情報が必要です。", "img": ""}, {"id": 172, "dom": 1, "cat": "データ操作", "q": "データアナリストが、新しいデータソースの品質を評価しています。データ品質の3つの主要な評価基準として正しい組み合わせはどれですか？", "opts": ["A. 完全性（Completeness）、一貫性（Consistency）、正確性（Accuracy）", "B. 速度（Speed）、サイズ（Size）、セキュリティ（Security）", "C. 書式（Format）、構造（Structure）、可視化（Visualization）", "D. 接続性（Connectivity）、互換性（Compatibility）、拡張性（Scalability）"], "ans": ["A"], "exp": "A. 完全性（Completeness）、一貫性（Consistency）、正確性（Accuracy） - 正解です。完全性はデータの欠損（NULL値）の有無、一貫性は同じ事象を表すデータの統一性（例：日付形式の統一）、正確性はデータ値が実際の値を正しく反映しているかを評価します。\nB. 速度（Speed）、サイズ（Size）、セキュリティ（Security） - これらはインフラやパフォーマンスの評価基準であり、データ品質の基準ではありません。\nC. 書式（Format）、構造（Structure）、可視化（Visualization） - 可視化はデータ品質の評価基準ではなく、分析結果の表現方法です。\nD. 接続性（Connectivity）、互換性（Compatibility）、拡張性（Scalability） - これらはシステム要件であり、データそのものの品質基準ではありません。", "img": ""}, {"id": 173, "dom": 2, "cat": "計算・関数", "q": "データアナリストが、注文金額に基づいて顧客を分類する計算フィールドを作成しています。$0-$100を「低」、$101-$500を「中」、$501以上を「高」に分類する場合、正しい式はどれですか？", "opts": ["A. IF [Sales] <= 100 THEN '低' ELSEIF [Sales] <= 500 THEN '中' ELSE '高' END", "B. IF [Sales] < 100 THEN '低' IF [Sales] < 500 THEN '中' IF [Sales] >= 500 THEN '高'", "C. CASE [Sales] WHEN <= 100 THEN '低' WHEN <= 500 THEN '中' ELSE '高' END", "D. IIF([Sales] <= 100, '低', IIF([Sales] <= 500, '中', '高'))"], "ans": ["A", "D"], "exp": "A. IF [Sales] <= 100 THEN '低' ELSEIF [Sales] <= 500 THEN '中' ELSE '高' END - 正解です。IF/ELSEIF/ELSE構文で複数条件を順番に評価します。最初の条件がTrueの行はそこで評価が終了し、次のELSEIFは評価されません。\nB. IF [Sales] < 100 THEN '低' IF [Sales] < 500 THEN '中' IF [Sales] >= 500 THEN '高' - 構文エラーです。複数のIFを連続して記述することはできません。ELSEIFまたはネストしたIIF/CASEを使用する必要があります。\nC. CASE [Sales] WHEN <= 100 THEN '低' WHEN <= 500 THEN '中' ELSE '高' END - 構文エラーです。CASE文のWHEN句では不等号（<=）を使用できません。CASE文は特定の値との一致判定にのみ使用します。\nD. IIF([Sales] <= 100, '低', IIF([Sales] <= 500, '中', '高')) - 正解です。ネストしたIIF関数でも同じ結果が得られます。IIFは条件、True値、False値の3引数を取り、False値に別のIIFをネストして複数条件を処理します。", "img": ""}, {"id": 174, "dom": 2, "cat": "計算・関数", "q": "データアナリストが、緯度・経度データを持つ2つの店舗間の距離を計算したいと考えています。Tableauの空間関数として正しい使い方はどれですか？", "opts": ["A. DISTANCE(MAKEPOINT([Lat1],[Lng1]), MAKEPOINT([Lat2],[Lng2]), 'km')", "B. DISTANCE([Lat1], [Lng1], [Lat2], [Lng2])", "C. SQRT(([Lat1]-[Lat2])^2 + ([Lng1]-[Lng2])^2)", "D. BUFFER(MAKEPOINT([Lat1],[Lng1]), 10, 'km')"], "ans": ["A"], "exp": "A. DISTANCE(MAKEPOINT([Lat1],[Lng1]), MAKEPOINT([Lat2],[Lng2]), 'km') - 正解です。DISTANCE関数は2つのポイントオブジェクト間の距離を指定した単位で返します。MAKEPOINTで緯度・経度からポイントを生成し、DISTANCEで距離を計算します。\nB. DISTANCE([Lat1], [Lng1], [Lat2], [Lng2]) - 構文エラーです。DISTANCE関数はポイントオブジェクトを引数に取ります。緯度・経度の数値を直接渡すことはできません。\nC. SQRT(([Lat1]-[Lat2])^2 + ([Lng1]-[Lng2])^2) - ユークリッド距離の計算ですが、地球の曲率を考慮していないため不正確です。Tableau空間関数は測地線距離を使用します。\nD. BUFFER(MAKEPOINT([Lat1],[Lng1]), 10, 'km') - BUFFER関数はポイントの周囲に円形の領域（バッファ）を生成する関数であり、2点間の距離計算には使用しません。", "img": ""}, {"id": 175, "dom": 2, "cat": "表計算", "q": "データアナリストが、月別売上チャートに3か月間の移動平均線を追加したいと考えています。正しい表計算関数はどれですか？", "opts": ["A. WINDOW_AVG(SUM([Sales]), -2, 0)", "B. RUNNING_AVG(SUM([Sales]))", "C. AVG([Sales])", "D. WINDOW_SUM(SUM([Sales]), -2, 0) / 3"], "ans": ["A", "D"], "exp": "A. WINDOW_AVG(SUM([Sales]), -2, 0) - 正解です。WINDOW_AVG関数で、開始位置を-2（2行前）、終了位置を0（現在行）に設定すると、現在月を含む過去3か月の売上平均（移動平均）が計算されます。\nB. RUNNING_AVG(SUM([Sales])) - RUNNING_AVGは先頭行から現在行までのすべての値の累積平均を返します。直近3か月のみの移動平均ではありません。\nC. AVG([Sales]) - AVG関数は行レベルの集計であり、表計算（ビューレベルの計算）ではありません。月別の移動平均は計算できません。\nD. WINDOW_SUM(SUM([Sales]), -2, 0) / 3 - 正解です。WINDOW_SUMで過去3か月の合計を計算し、3で割ることで移動平均と同じ結果が得られます。Aの方がシンプルですが、こちらも有効です。", "img": ""}, {"id": 176, "dom": 2, "cat": "表計算", "q": "データアナリストが、四半期ごとの売上チャートで、前の四半期からの売上変化率（差の割合）を表示したいと考えています。簡易表計算を使用する場合の正しい手順はどれですか？", "opts": ["A. SUM([Sales])を右クリック→「簡易表計算」→「差の割合」を選択する", "B. SUM([Sales])を右クリック→「簡易表計算」→「累計」を選択する", "C. SUM([Sales])を右クリック→「簡易表計算」→「合計に対する割合」を選択する", "D. 計算フィールドでSUM([Sales]) / SUM([Sales]) - 1を記述する"], "ans": ["A"], "exp": "A. SUM([Sales])を右クリック→「簡易表計算」→「差の割合」を選択する - 正解です。「差の割合」（Percent Difference）は、前の値からの変化率を自動計算します。計算式は (現在値 - 前の値) / 前の値 です。\nB. SUM([Sales])を右クリック→「簡易表計算」→「累計」を選択する - 「累計」は値を順次加算する計算であり、変化率の計算ではありません。\nC. SUM([Sales])を右クリック→「簡易表計算」→「合計に対する割合」を選択する - 「合計に対する割合」は各値が全体合計に占める比率を計算するものであり、前期との差の割合ではありません。\nD. 計算フィールドでSUM([Sales]) / SUM([Sales]) - 1を記述する - この式は常に0を返します。前期との比較にはLOOKUP関数が必要です。", "img": ""}, {"id": 177, "dom": 2, "cat": "表計算", "q": "データアナリストが、売上データの90パーセンタイルの値を計算し、その値を上回る注文を特定したいと考えています。使用すべき関数はどれですか？", "opts": ["A. PERCENTILE([Sales], 0.9)", "B. RANK_PERCENTILE(SUM([Sales]))", "C. WINDOW_PERCENTILE(SUM([Sales]), 0.9)", "D. TOP(SUM([Sales]), 10)"], "ans": ["C"], "exp": "A. PERCENTILE([Sales], 0.9) - PERCENTILE関数は集計関数であり、ビュー全体ではなくグループ内の行レベルの計算です。表計算として特定のパーセンタイル値を取得するにはWINDOW_PERCENTILEが適切です。\nB. RANK_PERCENTILE(SUM([Sales])) - RANK_PERCENTILEは各値のパーセンタイルランク（0〜1の範囲で相対位置）を返します。特定のパーセンタイル「値」を返すわけではありません。\nC. WINDOW_PERCENTILE(SUM([Sales]), 0.9) - 正解です。WINDOW_PERCENTILE関数はパーティション全体の中で指定したパーセンタイル位置の値を返します。0.9を指定すると90パーセンタイルの売上値が取得でき、これを参照線や計算フィールドで使用して閾値を設定できます。\nD. TOP(SUM([Sales]), 10) - Tableauに「TOP」という関数は存在しません。上位N件のフィルタリングにはフィルターのTop N機能を使用します。", "img": ""}, {"id": 178, "dom": 2, "cat": "表計算", "q": "データアナリストが、製品サブカテゴリの売上ランキングを表示しています。RANK関数、RANK_DENSE関数、RANK_UNIQUE関数の違いとして正しいものはどれですか？", "opts": ["A. RANK: 同順位あり・次をスキップ、RANK_DENSE: 同順位あり・スキップなし、RANK_UNIQUE: 同順位なし", "B. RANK: 同順位なし、RANK_DENSE: 同順位あり・次をスキップ、RANK_UNIQUE: 同順位あり・スキップなし", "C. 3つの関数はすべて同じ結果を返す", "D. RANK: 降順のみ、RANK_DENSE: 昇順のみ、RANK_UNIQUE: 両方対応"], "ans": ["A"], "exp": "A. RANK: 同順位あり・次をスキップ、RANK_DENSE: 同順位あり・スキップなし、RANK_UNIQUE: 同順位なし - 正解です。例えば売上が100, 100, 80の場合：RANK→1,1,3（3位が2つスキップ）、RANK_DENSE→1,1,2（スキップなし）、RANK_UNIQUE→1,2,3（同値でも異なる順位）。\nB. RANK: 同順位なし、RANK_DENSE: 同順位あり・次をスキップ、RANK_UNIQUE: 同順位あり・スキップなし - 関数の説明が入れ替わっています。RANKは同順位を許可しスキップ、RANK_DENSEは同順位を許可しスキップなしです。\nC. 3つの関数はすべて同じ結果を返す - 誤りです。同じ値のデータが存在する場合、3つの関数は異なる結果を返します。\nD. RANK: 降順のみ、RANK_DENSE: 昇順のみ、RANK_UNIQUE: 両方対応 - 誤りです。3つの関数はすべて昇順・降順の両方に対応しています。第2引数で'asc'または'desc'を指定できます。", "img": ""}, {"id": 179, "dom": 2, "cat": "フィルター", "q": "データアナリストが、ダッシュボード上の複数のシートに対して同じカテゴリフィルターを一括適用したいと考えています。方法として正しくないものはどれですか？", "opts": ["A. フィルターカードのドロップダウンから「ワークシートに適用」→「このデータソースを使用するすべてのワークシート」を選択する", "B. ダッシュボードのアクション機能でフィルターアクションを作成し、ソースとターゲットシートを指定する", "C. フィルターをデータソースフィルターとして設定する", "D. 各シートのマークカードに同じフィールドを色として追加する"], "ans": ["D"], "exp": "A. フィルターカードのドロップダウンから「ワークシートに適用」→「このデータソースを使用するすべてのワークシート」を選択する - 有効な方法です。グローバルフィルターとして、同じデータソースのすべてのシートにフィルターが適用されます。\nB. ダッシュボードのアクション機能でフィルターアクションを作成し、ソースとターゲットシートを指定する - 有効な方法です。ユーザーのインタラクション（選択、ホバー等）に基づいてターゲットシートにフィルターを適用します。\nC. フィルターをデータソースフィルターとして設定する - 有効な方法です。データソースフィルターはすべてのシートに適用されるフィルターです。\nD. 各シートのマークカードに同じフィールドを色として追加する - 正解（正しくない方法）。色のマークカードにフィールドを追加しても、フィルタリングは行われません。色はデータの視覚的な区別のみで、データの絞り込みとは異なります。", "img": ""}, {"id": 180, "dom": 2, "cat": "パラメータ", "q": "データアナリストが、パラメーターを使用して参照線の値をユーザーが動的に変更できるようにしたいと考えています。参照線にパラメーターを適用する正しい手順はどれですか？", "opts": ["A. パラメーターを作成 → アナリティクスペインから参照線を追加 → 値のドロップダウンでパラメーターを選択", "B. 参照線を追加 → 参照線の値に直接パラメーター名をテキスト入力する", "C. パラメーターを計算フィールドに組み込み → 計算フィールドをフィルターシェルフに追加する", "D. パラメーターをマークカードの「詳細」にドロップする"], "ans": ["A"], "exp": "A. パラメーターを作成 → アナリティクスペインから参照線を追加 → 値のドロップダウンでパラメーターを選択 - 正解です。参照線の編集ダイアログで「値」のドロップダウンリストに作成済みのパラメーターが表示されます。選択するとパラメーター値の変更に連動して参照線の位置が動的に変化します。\nB. 参照線を追加 → 参照線の値に直接パラメーター名をテキスト入力する - 参照線の値フィールドにテキストを直接入力する方法はありません。ドロップダウンから選択します。\nC. パラメーターを計算フィールドに組み込み → フィルターシェルフに追加する - フィルターは参照線とは別の機能です。この方法では参照線は作成されません。\nD. パラメーターをマークカードの「詳細」にドロップする - マークカードへの追加はビューの詳細レベルに影響しますが、参照線の作成には無関係です。", "img": ""}, {"id": 181, "dom": 2, "cat": "マップ", "q": "データアナリストが、地図上に売上の塗りつぶしマップ（コロプレス）と各店舗の位置を示すポイントを同時に表示したいと考えています。デュアル軸マップを作成する正しい手順はどれですか？", "opts": ["A. 緯度フィールドを複製して行シェルフに2つ配置 → 2つ目の軸を右クリックして「二重軸」を選択 → 各マークカードで異なるマークタイプを設定", "B. 列シェルフに経度を2つ配置 → 各マークカードで異なるマークタイプを設定", "C. マップメニューから「レイヤーを追加」を選択 → データソースを指定", "D. ダッシュボードで2つのマップシートを浮動レイアウトで重ねる"], "ans": ["A"], "exp": "A. 緯度フィールドを複製して行シェルフに2つ配置 → 2つ目の軸を右クリックして「二重軸」を選択 → 各マークカードで異なるマークタイプを設定 - 正解です。緯度（生成）を行シェルフに2回配置し、2つ目を右クリック→「二重軸」を選択すると、同じ地図上に2つのマークレイヤーが重なります。一方を「マップ」（塗りつぶし）、もう一方を「円」（ポイント）に設定します。\nB. 列シェルフに経度を2つ配置 → 各マークカードで異なるマークタイプを設定 - 列シェルフに経度を2つ配置すると横に2つのマップが並びます。重ね合わせにはなりません。\nC. マップメニューから「レイヤーを追加」を選択 → データソースを指定 - マップメニューにこのようなオプションはありません。\nD. ダッシュボードで2つのマップシートを浮動レイアウトで重ねる - 理論的には可能ですが、軸の同期が困難で、デュアル軸マップが推奨されます。", "img": ""}, {"id": 182, "dom": 2, "cat": "分析", "q": "データアナリストが、地域×カテゴリの売上クロステーブルに小計と総計を追加しています。小計の配置位置を変更するにはどの操作を行いますか？", "opts": ["A. 「分析」メニュー→「合計」→「小計を上に配置」を選択する", "B. 小計行を手動でドラッグして移動する", "C. 計算フィールドで小計を別途作成する", "D. 「分析」メニュー→「合計」→「合計を上に配置」を選択する"], "ans": ["D"], "exp": "A. 「分析」メニュー→「合計」→「小計を上に配置」 - Tableauのメニューには「小計を上に配置」という個別のオプションはありません。\nB. 小計行を手動でドラッグして移動する - 小計行はドラッグで移動できません。メニューから設定を変更する必要があります。\nC. 計算フィールドで小計を別途作成する - 計算フィールドでの再現は複雑で、Tableauの組み込み機能を使うのが適切です。\nD. 「分析」メニュー→「合計」→「合計を上に配置」を選択する - 正解です。このオプションを選択すると、小計と総計の行がテーブルの上部（各グループの先頭）に配置されます。デフォルトでは下部に表示されますが、この設定で上部に変更できます。", "img": ""}, {"id": 183, "dom": 2, "cat": "分析", "q": "データアナリストが、月別売上チャートに「目標売上の下限と上限」を示す色付きの範囲を表示したいと考えています。使用すべきアナリティクス機能はどれですか？", "opts": ["A. 参照線を2本追加する", "B. リファレンスバンド（参照バンド）を追加する", "C. 分布バンドを追加する", "D. 傾向線を追加する"], "ans": ["B"], "exp": "A. 参照線を2本追加する - 参照線は個別の水平線を引くだけで、2本の線の間の範囲を色付けする機能はありません。\nB. リファレンスバンド（参照バンド）を追加する - 正解です。参照バンドは2つの値（定数、パラメーター、または計算値）の間の範囲を色付きの帯として表示します。アナリティクスペインから「参照バンド」をドラッグし、上限と下限の値を設定します。\nC. 分布バンドを追加する - 分布バンドは統計的な分布（標準偏差、パーセンタイルなど）に基づく範囲を表示します。任意の目標値の範囲指定には参照バンドが適切です。\nD. 傾向線を追加する - 傾向線はデータの全体的なトレンドを示す線であり、範囲の表示には使用しません。", "img": ""}, {"id": 184, "dom": 2, "cat": "分析", "q": "データアナリストが、カテゴリ別売上の棒グラフに全カテゴリの平均売上を示す水平線を追加する最も簡単な方法はどれですか？", "opts": ["A. 計算フィールドでWINDOW_AVG(SUM([Sales]))を作成してデュアル軸で表示する", "B. アナリティクスペインから「平均線」をビューにドラッグする", "C. {FIXED : AVG([Sales])} LOD式を作成して参照線に設定する", "D. 各棒に平均値のラベルを手動で追加する"], "ans": ["B"], "exp": "A. 計算フィールドでWINDOW_AVG(SUM([Sales]))を作成してデュアル軸で表示する - 技術的に可能ですが、アナリティクスペインの平均線が最も簡単です。\nB. アナリティクスペインから「平均線」をビューにドラッグする - 正解です。アナリティクスペインの「平均線」をビューにドラッグするだけで、全カテゴリの平均売上を示す水平線が追加されます。スコープ（テーブル全体/ペイン/セル）も選択できます。\nC. {FIXED : AVG([Sales])} LOD式を作成して参照線に設定する - 技術的に可能ですが手順が多く、「最も簡単な方法」ではありません。\nD. 各棒に平均値のラベルを手動で追加する - 手動追加は非効率で、平均線の表示とは異なります。", "img": ""}, {"id": 185, "dom": 2, "cat": "分析", "q": "データアナリストが、散布図にデータの標準偏差に基づく分布バンドを追加したいと考えています。分布バンドの設定で選択できる計算タイプとして正しくないものはどれですか？", "opts": ["A. 標準偏差", "B. パーセンタイル", "C. 四分位数", "D. 移動平均"], "ans": ["D"], "exp": "A. 標準偏差 - 分布バンドで選択可能です。平均±1σ、±2σなどの範囲を表示できます。\nB. パーセンタイル - 分布バンドで選択可能です。例えば5%〜95%の範囲を指定できます。\nC. 四分位数 - 分布バンドで選択可能です。第1四分位（25%）〜第3四分位（75%）の範囲を表示できます。\nD. 移動平均 - 正解（選択できない）。移動平均は分布バンドの計算タイプには含まれません。移動平均は表計算（WINDOW_AVG）で別途計算する必要があります。分布バンドで選択できるのは標準偏差、パーセンタイル、四分位数です。", "img": ""}, {"id": 186, "dom": 3, "cat": "書式設定", "q": "データアナリストが、ダッシュボード上のシート内部のコンテンツとシートの境界線の間に余白を追加して、見やすくしたいと考えています。設定すべきレイアウトオプションはどれですか？", "opts": ["A. 外側のパディング", "B. 内側のパディング", "C. 背景色を白に変更する", "D. ダッシュボードサイズを拡大する"], "ans": ["B"], "exp": "A. 外側のパディング - 外側のパディングはオブジェクトの外側（オブジェクト間）の余白を設定します。シート内部のコンテンツと境界線の間ではなく、シートと隣接オブジェクトの間隔です。\nB. 内側のパディング - 正解です。内側のパディングはオブジェクトの境界線とその内部コンテンツ（チャート）の間の余白を設定します。レイアウトタブで上下左右のピクセル値を個別に指定できます。\nC. 背景色を白に変更する - 背景色の変更は視覚的な変更であり、実際の余白スペースを追加するものではありません。\nD. ダッシュボードサイズを拡大する - ダッシュボード全体のサイズ変更は個別のシート内の余白を制御する方法ではありません。", "img": ""}, {"id": 187, "dom": 4, "cat": "パブリッシュ", "q": "データアナリストが、Tableau Serverにパブリッシュ済みのダッシュボードを、データアクセス権のない外部パートナーに配布する必要があります。最も適切な方法はどれですか？", "opts": ["A. パートナーのメールアドレスでTableau Serverアカウントを作成し、Viewer権限を付与する", "B. ダッシュボードをPDFまたは画像としてエクスポートして送付する", "C. .twbxファイルとしてダウンロードし、Tableau Readerで開くよう案内する", "D. BとCの両方が状況に応じて有効"], "ans": ["D"], "exp": "A. パートナーのメールアドレスでTableau Serverアカウントを作成し、Viewer権限を付与する - 外部パートナーにサーバーアカウントを作成するのはセキュリティリスクがあり、ライセンスコストも発生します。「データアクセス権のない」という制約にも反します。\nB. ダッシュボードをPDFまたは画像としてエクスポートして送付する - 有効な方法です。静的なスナップショットとして配布でき、データへのアクセスは発生しません。ただしインタラクティブ機能は失われます。\nC. .twbxファイルとしてダウンロードし、Tableau Readerで開くよう案内する - 有効な方法です。パッケージドワークブック(.twbx)にはデータの抽出が含まれ、無料のTableau Readerでインタラクティブに閲覧できます。ただし、含まれるデータの範囲に注意が必要です。\nD. BとCの両方が状況に応じて有効 - 正解です。静的な配布にはPDF/画像エクスポート（B）、インタラクティブな共有にはTableau Reader向け.twbx（C）が適しています。", "img": ""}, {"id": 188, "dom": 1, "cat": "データ接続", "q": "データアナリストが、Tableau DesktopからPostgreSQLデータベースに接続しています。接続設定でカスタムSQLを使用する利点として正しいものはどれですか？", "opts": ["A. Tableauが自動生成するクエリよりも常に高速に実行できる", "B. データソースに接続する前に、必要なテーブルの結合やフィルタリングをSQL文で定義できる", "C. カスタムSQLはExcelファイルへの接続でも使用できる", "D. カスタムSQLを使用するとライブ接続が不要になる"], "ans": ["B"], "exp": "A. Tableauが自動生成するクエリよりも常に高速に実行できる - 誤りです。カスタムSQLが必ずしも高速とは限りません。複雑なクエリはパフォーマンスを低下させる場合があります。\nB. データソースに接続する前に、必要なテーブルの結合やフィルタリングをSQL文で定義できる - 正解です。カスタムSQLを使用すると、データベース側でJOIN、WHERE、GROUP BYなどを記述し、Tableauに取り込むデータを事前に制御できます。\nC. カスタムSQLはExcelファイルへの接続でも使用できる - 誤りです。カスタムSQLはリレーショナルデータベース接続でのみ使用可能で、ファイルベースのデータソースには使用できません。\nD. カスタムSQLを使用するとライブ接続が不要になる - 誤りです。カスタムSQLと接続モード（ライブ/抽出）は独立した設定です。", "img": ""}, {"id": 189, "dom": 2, "cat": "表計算", "q": "データアナリストが、散布図に各データポイントのパーセンタイルランク（0〜1の範囲で相対的な位置）を色で表現したいと考えています。使用すべき表計算関数はどれですか？", "opts": ["A. RANK(SUM([Sales]))", "B. RANK_PERCENTILE(SUM([Sales]))", "C. PERCENTILE(SUM([Sales]), 0.5)", "D. WINDOW_PERCENTILE(SUM([Sales]), 0.5)"], "ans": ["B"], "exp": "A. RANK(SUM([Sales])) - RANK関数は順位（1, 2, 3...）を返しますが、0〜1の範囲のパーセンタイルランクではありません。\nB. RANK_PERCENTILE(SUM([Sales])) - 正解です。RANK_PERCENTILE関数は各値のパーセンタイルランクを0〜1の範囲で返します。例えば0.95は上位5%に位置することを意味します。この値を色に配置すると連続的なグラデーションで表現できます。\nC. PERCENTILE(SUM([Sales]), 0.5) - PERCENTILE関数は指定したパーセンタイル位置の「値」を返す集計関数です。各行のランクではなく、データ全体の50パーセンタイル値（中央値）を返します。\nD. WINDOW_PERCENTILE(SUM([Sales]), 0.5) - WINDOW_PERCENTILE関数もパーティション全体の特定パーセンタイル位置の値を返します。各行のランクではありません。", "img": ""}, {"id": 190, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、各製品カテゴリの利益の分布を箱ひげ図で表示したいと考えています。箱ひげ図で表示される要素として正しくないものはどれですか？", "opts": ["A. 中央値（第2四分位数）", "B. 第1四分位数と第3四分位数（箱の上端と下端）", "C. 外れ値", "D. 標準偏差"], "ans": ["D"], "exp": "A. 中央値（第2四分位数） - 箱ひげ図の箱の中央に表示される線です。データの50パーセンタイル値を示します。\nB. 第1四分位数と第3四分位数（箱の上端と下端） - 箱の範囲はQ1（25%）からQ3（75%）で、四分位範囲（IQR）を表します。\nC. 外れ値 - ひげの範囲外のデータポイントが個別の点として表示されます。\nD. 標準偏差 - 正解（表示されない）。箱ひげ図は四分位数ベースの分布表示であり、標準偏差は表示されません。標準偏差を示すには分布バンドやリファレンスラインを使用します。", "img": ""}, {"id": 191, "dom": 2, "cat": "ビジュアライゼーション", "q": "データアナリストが、地域×カテゴリのハイライト表（ヒートマップ）を作成し、売上金額に応じてセルの色の濃淡で表現したいと考えています。必要な操作はどれですか？", "opts": ["A. 行にカテゴリ、列に地域、マークカードの「色」にSUM([Sales])を配置し、マークタイプを「四角」にする", "B. 行にカテゴリ、列に地域、マークカードの「サイズ」にSUM([Sales])を配置する", "C. 行にカテゴリ、列にSUM([Sales])を配置し、マークタイプを「棒」にする", "D. 行にカテゴリ、列に地域を配置し、「分析」メニューから「ハイライト表」を選択する"], "ans": ["A"], "exp": "A. 行にカテゴリ、列に地域、マークカードの「色」にSUM([Sales])を配置し、マークタイプを「四角」にする - 正解です。ハイライト表はクロステーブルの各セルを色の濃淡で表現するチャートです。マークタイプを「四角」にし、メジャーを「色」に配置することで作成できます。「表示形式」パネルからも直接作成可能です。\nB. 行にカテゴリ、列に地域、マークカードの「サイズ」にSUM([Sales])を配置する - 「サイズ」に配置するとバブルチャートのような表現になり、ハイライト表の色の濃淡表現とは異なります。\nC. 行にカテゴリ、列にSUM([Sales])を配置し、マークタイプを「棒」にする - これは横棒グラフであり、ハイライト表ではありません。\nD. 行にカテゴリ、列に地域を配置し、「分析」メニューから「ハイライト表」を選択する - 「分析」メニューにはハイライト表を作成する直接のオプションはありません。「表示形式」パネルを使用します。", "img": ""}, {"id": 192, "dom": 3, "cat": "ダッシュボード", "q": "データアナリストが、ダッシュボードに追加できるオブジェクトとして正しくないものはどれですか？", "opts": ["A. 水平コンテナ", "B. テキストオブジェクト", "C. データソースオブジェクト", "D. 空白オブジェクト"], "ans": ["C"], "exp": "A. 水平コンテナ - ダッシュボードに追加可能です。複数のオブジェクトを横並びに配置するレイアウト要素です。\nB. テキストオブジェクト - ダッシュボードに追加可能です。タイトルや説明文などの静的テキストを表示します。\nC. データソースオブジェクト - 正解（追加できない）。ダッシュボードの「オブジェクト」セクションにデータソースオブジェクトは存在しません。追加可能なオブジェクトは水平/垂直コンテナ、テキスト、画像、Webページ、空白、ナビゲーション、拡張機能、「データに聞く」です。\nD. 空白オブジェクト - ダッシュボードに追加可能です。スペーサーとして使用し、オブジェクト間の間隔を調整します。", "img": ""}, {"id": 193, "dom": 3, "cat": "書式設定", "q": "データアナリストが、棒グラフのツールヒントをカスタマイズして、デフォルトの項目に加えて利益率のメジャーを追加表示したいと考えています。正しい手順はどれですか？", "opts": ["A. マークカードの「ツールヒント」をクリックし、編集画面で「挿入」からフィールドを追加する", "B. 「書式設定」メニューからツールヒントの項目を選択する", "C. データペインからフィールドをツールヒントアイコンに直接ドラッグする", "D. AとCの両方が有効"], "ans": ["D"], "exp": "A. マークカードの「ツールヒント」をクリックし、編集画面で「挿入」からフィールドを追加する - 有効な方法です。ツールヒントの編集画面が開き、テキストの書式設定や「挿入」メニューからフィールドを追加・配置できます。\nB. 「書式設定」メニューからツールヒントの項目を選択する - 「書式設定」メニューはフォントや線の外観設定であり、ツールヒントの内容編集には使用しません。\nC. データペインからフィールドをツールヒントアイコンに直接ドラッグする - 有効な方法です。フィールドをマークカードの「ツールヒント」に直接ドラッグすると、そのフィールドがツールヒントに追加されます。\nD. AとCの両方が有効 - 正解です。ツールヒント編集画面からの追加（A）とドラッグ＆ドロップ（C）の両方でフィールドを追加できます。", "img": ""}, {"id": 194, "dom": 3, "cat": "書式設定", "q": "データアナリストが、利益のメジャーを色に使用している棒グラフで、負の値を赤、正の値を青で表示したいと考えています。正しい設定方法はどれですか？", "opts": ["A. マークカードの「色」をクリック→「色の編集」→分岐パレットを選択し、中心を0に設定する", "B. 計算フィールドでIF [Profit] < 0 THEN 'Red' ELSE 'Blue' ENDを作成し、色に配置する", "C. 「書式設定」メニューから「ワークブックのテーマ」を変更する", "D. 棒ごとに手動で色を選択する"], "ans": ["A"], "exp": "A. マークカードの「色」をクリック→「色の編集」→分岐パレットを選択し、中心を0に設定する - 正解です。連続メジャーが色に配置されている場合、「色の編集」で分岐（Diverging）パレット（例：赤-青）を選択し、「詳細設定」で中心を0に設定すると、負の値と正の値が異なる色で自動的に表現されます。\nB. 計算フィールドでIF文を使用する - 動作しますが、結果は離散的な2色になり、値の大小に応じたグラデーション表現ができません。Aの方が適切です。\nC. 「書式設定」メニューから「ワークブックのテーマ」を変更する - テーマはワークブック全体のフォントやスタイルの設定であり、個別のメジャーの色設定ではありません。\nD. 棒ごとに手動で色を選択する - Tableauでは個別のマークに手動で色を割り当てることはできません。", "img": ""}];
</script>
