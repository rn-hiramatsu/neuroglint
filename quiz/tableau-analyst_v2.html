const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── Palette ─────────────────────────────────────────── */
const C = {
  green:"#2D6A4F", greenL:"#3D8B6A", greenP:"#E8F5EE",
  orange:"#F4A261", orangeL:"#FDEBD3", orangeD:"#B45309",
  dark:"#1F2937", gray:"#6B7280", grayL:"#9CA3AF",
  border:"#E5E7EB", white:"#FFFFFF", bg:"#F7F9F7",
  red:"#DC2626", redP:"#FEF2F2",
  blue:"#3B82F6", blueP:"#EFF6FF",
  purple:"#8B5CF6",
};

const DOMAINS = [
  {id:1, name:"データ接続・変換", w:"24%", icon:"🔗", c:C.green},
  {id:2, name:"分析・探索", w:"41%", icon:"🔍", c:C.orange},
  {id:3, name:"コンテンツ作成", w:"26%", icon:"📊", c:C.blue},
  {id:4, name:"パブリッシュ・管理", w:"9%", icon:"☁️", c:C.purple},
];

/* ── Helpers ──────────────────────────────────────────── */
const shuf = a => {const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;};
const fmt = s => `${0|s/60}:${(s%60+'').padStart(2,'0')}`;
const pct = (n,d) => d ? Math.round(n/d*100) : 0;

/* ── Ring ─────────────────────────────────────────────── */
function Ring({value,size=64,stroke=5,color=C.green,bg=C.border,children}){
  const r=(size-stroke)/2, ci=2*Math.PI*r, off=ci*(1-Math.min(value||0,1));
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bg} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeDasharray={ci} strokeDashoffset={off} strokeLinecap="round"
          style={{transition:"stroke-dashoffset .6s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>{children}</div>
    </div>
  );
}

/* ── Storage ──────────────────────────────────────────── */
function useStore(key, init) {
  const [val, setVal] = useState(() => {
    try { const v=localStorage.getItem(key); return v?JSON.parse(v):init; } catch(e){ return init; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){}
  }, [val, key]);
  return [val, setVal];
}

/* ══════════════════════════════════════════════════════════
   APP
   ══════════════════════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState("home");
  /* setup */
  const [mode, setMode] = useState("study");
  const [domF, setDomF] = useState(0);
  const [numQ, setNumQ] = useState(20);
  /* quiz */
  const [qs, setQs] = useState([]);
  const [qi, setQi] = useState(0);
  const [sel, setSel] = useState([]);
  const [done, setDone] = useState(false);
  const [showExp, setShowExp] = useState(false);
  const [res, setRes] = useState([]);
  const [isExam, setIsExam] = useState(false);
  /* timer */
  const [timer, setTimer] = useState(0);
  const [tOn, setTOn] = useState(false);
  const tRef = useRef(null);
  /* persist */
  const [hist, setHist] = useStore("ng_hist", []);
  const [marks, setMarks] = useStore("ng_marks", []);
  const marksSet = useMemo(() => new Set(marks), [marks]);

  useEffect(() => {
    if(tOn) tRef.current=setInterval(()=>setTimer(t=>t>0?t-1:0),1000);
    return ()=>clearInterval(tRef.current);
  },[tOn]);

  /* ── computed stats ── */
  const wrongIds = useMemo(() => [...new Set(hist.filter(h=>!h.ok).map(h=>h.id))], [hist]);
  const answeredIds = useMemo(() => new Set(hist.map(h=>h.id)), [hist]);
  const totalH = hist.length, correctH = hist.filter(h=>h.ok).length;
  const rateH = totalH ? correctH/totalH : 0;
  const domStats = useMemo(() => DOMAINS.map(d => {
    const dh=hist.filter(h=>h.dom===d.id);
    return {...d, t:dh.length, c:dh.filter(h=>h.ok).length, r:dh.length?dh.filter(h=>h.ok).length/dh.length:0};
  }), [hist]);

  /* ── launchers ── */
  const launch = () => {
    let pool = domF ? ALL_Q.filter(q=>q.dom===domF) : [...ALL_Q];
    if(mode==="study"){
      const ws = new Set(wrongIds);
      pool=[...shuf(pool.filter(q=>ws.has(q.id))),...shuf(pool.filter(q=>!ws.has(q.id)))].slice(0,numQ);
      setIsExam(false);setTOn(false);setTimer(0);
    } else {
      pool=shuf(pool).slice(0,60);
      setIsExam(true);setTimer(105*60);setTOn(true);
    }
    setQs(pool);setQi(0);setSel([]);setDone(false);setShowExp(false);setRes([]);
    setScreen("quiz");
  };
  const launchSet = (ids) => {
    const pool=shuf(ALL_Q.filter(q=>ids.includes(q.id)));
    if(!pool.length) return;
    setQs(pool);setQi(0);setSel([]);setDone(false);setShowExp(false);setRes([]);
    setIsExam(false);setTOn(false);setTimer(0);setScreen("quiz");
  };

  /* ── quiz logic ── */
  const cq = qs[qi];
  const multi = cq?.ans?.length > 1;
  const toggle = l => { if(done) return; multi ? setSel(s=>s.includes(l)?s.filter(x=>x!==l):[...s,l]) : setSel([l]); };
  const submit = () => {
    if(!sel.length) return;
    const ok = cq.ans.every(a=>sel.includes(a)) && sel.every(a=>cq.ans.includes(a));
    const r={id:cq.id,ok,sel:[...sel],dom:cq.dom,ts:Date.now()};
    setRes(p=>[...p,r]);
    setHist(p=>[...p,r].slice(-2000));
    setDone(true);
    if(!isExam) setShowExp(true);
  };
  const next = () => {
    if(qi<qs.length-1){setQi(i=>i+1);setSel([]);setDone(false);setShowExp(false);}
    else{setTOn(false);setScreen("result");}
  };
  const toggleMark = () => {
    setMarks(m => marksSet.has(cq.id) ? m.filter(x=>x!==cq.id) : [...m, cq.id]);
  };

  /* ── styles ── */
  const W={minHeight:"100vh",minHeight:"100dvh",maxWidth:560,margin:"0 auto",paddingBottom:40};
  const H={padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:`1px solid ${C.border}`,background:"rgba(255,255,255,.92)",backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",position:"sticky",top:0,zIndex:10};
  const S={padding:"20px"};
  const Card={background:C.white,borderRadius:16,border:`1px solid ${C.border}`,padding:20,marginBottom:14};
  const CardS={background:C.white,borderRadius:12,border:`1px solid ${C.border}`,padding:14,marginBottom:10};
  const Btn=(bg,fg,bd)=>({width:"100%",padding:"14px",background:bg,color:fg,border:bd||"none",borderRadius:12,fontSize:15,fontWeight:600,cursor:"pointer",textAlign:"center",transition:"opacity .15s"});
  const Tag=(bg,fg)=>({display:"inline-block",padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:600,background:bg,color:fg});
  const Chip=(on,c)=>({padding:"10px 14px",borderRadius:12,border:`2px solid ${on?c:C.border}`,background:on?(c+"15"):C.white,fontSize:13,fontWeight:on?700:500,color:on?c:C.gray,cursor:"pointer",textAlign:"center",transition:"all .15s",lineHeight:1.3});
  const OptBtn=(isSel,isOk,isBad,dis)=>({width:"100%",textAlign:"left",padding:"14px 16px",background:isOk?C.greenP:isBad?C.redP:isSel?C.blueP:C.white,border:`2px solid ${isOk?C.green:isBad?C.red:isSel?C.blue:C.border}`,borderRadius:12,fontSize:14,lineHeight:1.6,color:C.dark,cursor:dis?"default":"pointer",marginBottom:10,transition:"all .15s"});
  const Badge=c=>({width:22,height:22,borderRadius:11,background:c,color:C.white,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,marginRight:10,flexShrink:0,transition:"background .15s"});
  const PBar={height:4,borderRadius:2,background:C.border,overflow:"hidden"};
  const PFill=(p,c=C.green)=>({height:"100%",width:`${Math.min(p,1)*100}%`,background:c,borderRadius:2,transition:"width .5s ease"});

  /* ═══════════════ HOME ═══════════════ */
  if(screen==="home") return(
    <div style={W}>
      <div style={H}>
        <div style={{fontSize:16,fontWeight:800,color:C.green,letterSpacing:"-.03em"}}>NeuroGlint</div>
        <div style={{fontSize:11,color:C.grayL,fontWeight:500}}>Tableau Data Analyst</div>
      </div>
      <div style={S}>
        {/* overall */}
        <div className="fade-in" style={{...Card,display:"flex",alignItems:"center",gap:20}}>
          <Ring value={rateH} size={80} stroke={6}>
            <span style={{fontSize:20,fontWeight:800}}>{pct(correctH,totalH)}%</span>
          </Ring>
          <div>
            <div style={{fontSize:12,color:C.grayL,marginBottom:2}}>総合正答率</div>
            <div style={{fontSize:24,fontWeight:800,letterSpacing:"-.02em"}}>{correctH}<span style={{fontSize:14,fontWeight:500,color:C.gray}}>/{totalH}</span></div>
            <div style={{fontSize:11,color:C.grayL,marginTop:2}}>全{ALL_Q.length}問中 {answeredIds.size}問 回答済み</div>
          </div>
        </div>

        {/* domains */}
        <div style={{fontSize:14,fontWeight:700,marginBottom:10,marginTop:4}}>ドメイン別進捗</div>
        {domStats.map((d,i)=>(
          <div key={d.id} className="fade-in" style={{...CardS,display:"flex",alignItems:"center",gap:12,animationDelay:`${i*60}ms`,animationFillMode:"backwards"}}>
            <Ring value={d.r} size={46} stroke={4} color={d.c}>
              <span style={{fontSize:11,fontWeight:700}}>{pct(d.c,d.t)}%</span>
            </Ring>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                <span style={{fontSize:13}}>{d.icon}</span>
                <span style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
                <span style={{fontSize:10,color:C.grayL,marginLeft:"auto",flexShrink:0}}>配点{d.w}</span>
              </div>
              <div style={PBar}><div style={PFill(d.r,d.c)}/></div>
              <div style={{fontSize:11,color:C.grayL,marginTop:3}}>{d.c}/{d.t} 正解 · {ALL_Q.filter(q=>q.dom===d.id).length}問収録</div>
            </div>
          </div>
        ))}

        {/* quick */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"16px 0"}}>
          <div style={{...CardS,textAlign:"center",cursor:wrongIds.length?"pointer":"default",opacity:wrongIds.length?1:.4}} onClick={()=>wrongIds.length&&launchSet(wrongIds)}>
            <div style={{fontSize:24}}>🔄</div>
            <div style={{fontSize:12,fontWeight:600,marginTop:4}}>間違えた問題</div>
            <div style={{fontSize:20,fontWeight:800,color:wrongIds.length?C.red:C.grayL}}>{wrongIds.length}</div>
          </div>
          <div style={{...CardS,textAlign:"center",cursor:marks.length?"pointer":"default",opacity:marks.length?1:.4}} onClick={()=>marks.length&&launchSet(marks)}>
            <div style={{fontSize:24}}>⭐</div>
            <div style={{fontSize:12,fontWeight:600,marginTop:4}}>ブックマーク</div>
            <div style={{fontSize:20,fontWeight:800,color:marks.length?C.orange:C.grayL}}>{marks.length}</div>
          </div>
        </div>

        {/* buttons */}
        <button style={Btn(C.green,C.white)} onClick={()=>{setMode("study");setScreen("setup");}}>📚 学習をはじめる</button>
        <div style={{height:10}}/>
        <button style={Btn(C.orange,C.white)} onClick={()=>{setMode("exam");setScreen("setup");}}>🎯 模擬試験（60問 / 105分）</button>

        {totalH>0&&(<button onClick={()=>{setHist([]);setMarks([]);}} style={{background:"none",border:"none",width:"100%",marginTop:20,fontSize:11,color:C.grayL,cursor:"pointer"}}>学習データをリセット</button>)}
      </div>
    </div>
  );

  /* ═══════════════ SETUP ═══════════════ */
  if(screen==="setup"){
    const isSt = mode==="study";
    const poolN = domF ? ALL_Q.filter(q=>q.dom===domF).length : ALL_Q.length;
    const countOpts = [10,20,30,60].filter(n=>n<=poolN&&n!==poolN);
    const actual = isSt ? Math.min(numQ, poolN) : 60;

    return(
      <div style={W}>
        <div style={H}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:14,color:C.gray,cursor:"pointer",padding:"4px 0"}}>← 戻る</button>
          <div style={{fontSize:14,fontWeight:700}}>{isSt?"学習モード設定":"模擬試験"}</div>
          <div style={{width:48}}/>
        </div>
        <div style={S}>
          {isSt?(
            <>
              <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>出題範囲</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:24}}>
                <div style={Chip(domF===0,C.green)} onClick={()=>setDomF(0)}>
                  📋 全ドメイン<div style={{fontSize:11,fontWeight:400,marginTop:2}}>{ALL_Q.length}問</div>
                </div>
                {DOMAINS.map(d=>(
                  <div key={d.id} style={Chip(domF===d.id,d.c)} onClick={()=>{setDomF(d.id);setNumQ(n=>Math.min(n,ALL_Q.filter(q=>q.dom===d.id).length));}}>
                    {d.icon} {d.name}<div style={{fontSize:11,fontWeight:400,marginTop:2}}>{ALL_Q.filter(q=>q.dom===d.id).length}問</div>
                  </div>
                ))}
              </div>

              <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>問題数</div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24}}>
                {countOpts.map(n=>(
                  <div key={n} style={{...Chip(numQ===n,C.green),minWidth:56}} onClick={()=>setNumQ(n)}>{n}問</div>
                ))}
                {<div style={{...Chip(numQ===poolN,C.green),minWidth:56}} onClick={()=>setNumQ(poolN)}>全{poolN}問</div>}
              </div>

              <div style={{...CardS,display:"flex",gap:10,cursor:"default",background:C.greenP,border:`1px solid ${C.green}30`}}>
                <span style={{fontSize:20,flexShrink:0}}>💡</span>
                <div style={{fontSize:12,color:C.gray,lineHeight:1.7}}>
                  過去に間違えた問題を<strong style={{color:C.dark}}>優先的に出題</strong>します。<br/>
                  回答後すぐに解説が表示されます。
                </div>
              </div>
            </>
          ):(
            <div style={{...Card,textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:12}}>🎯</div>
              <div style={{fontSize:20,fontWeight:800,marginBottom:12}}>本番シミュレーション</div>
              <div style={{fontSize:14,color:C.gray,lineHeight:2}}>
                <strong>60問</strong> / <strong>105分</strong><br/>
                全ドメインからランダム出題<br/>
                合格ライン: <strong style={{color:C.green}}>75%（45問正解）</strong>
              </div>
            </div>
          )}

          <button style={Btn(isSt?C.green:C.orange,C.white)} onClick={launch}>
            {isSt?`${actual}問で学習スタート 🚀`:"模擬試験スタート ⏱"}
          </button>
        </div>
      </div>
    );
  }

  /* ═══════════════ QUIZ ═══════════════ */
  if(screen==="quiz"){
    if(!cq){setScreen("result");return null;}
    const prog=(qi+1)/qs.length;
    const mked=marksSet.has(cq.id);
    const lastR=res[res.length-1];

    return(
      <div style={W}>
        <div style={H}>
          <button onClick={()=>{setTOn(false);res.length?setScreen("result"):setScreen("home");}}
            style={{background:"none",border:"none",fontSize:14,color:C.gray,cursor:"pointer",padding:"4px 0"}}>
            ← {res.length?"結果":"戻る"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {isExam&&<span style={{fontVariantNumeric:"tabular-nums",fontSize:13,fontWeight:700,background:timer<300?C.redP:C.greenP,color:timer<300?C.red:C.dark,padding:"3px 12px",borderRadius:20}}>⏱ {fmt(timer)}</span>}
            <span style={{fontSize:13,fontWeight:700,color:C.dark}}>{qi+1}<span style={{color:C.grayL,fontWeight:500}}>/{qs.length}</span></span>
          </div>
        </div>

        <div style={{...PBar,borderRadius:0}}><div style={PFill(prog,isExam?C.orange:C.green)}/></div>

        <div style={S}>
          <div className="fade-in" key={cq.id}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <span style={Tag(C.greenP,C.green)}>{cq.cat}</span>
                {multi&&<span style={Tag(C.orangeL,C.orangeD)}>複数選択</span>}
              </div>
              <button onClick={toggleMark} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",padding:4,lineHeight:1}}>{mked?"⭐":"☆"}</button>
            </div>

            {/* image */}
            {cq.img&&cq.img.length>20&&(
              <div style={{marginBottom:16,borderRadius:12,overflow:"hidden",border:`1px solid ${C.border}`}}>
                <img src={cq.img} alt="" style={{width:"100%",display:"block"}}/>
              </div>
            )}

            <div style={{fontSize:15,lineHeight:1.85,fontWeight:500,marginBottom:20}}>{cq.q}</div>

            {cq.opts.map((o,i)=>{
              const l=String.fromCharCode(65+i);
              const isSel=sel.includes(l);
              const isAns=cq.ans.includes(l);
              const isOk=done&&isAns;
              const isBad=done&&isSel&&!isAns;
              return(
                <button key={i} style={OptBtn(isSel,isOk,isBad,done)} onClick={()=>toggle(l)}>
                  <span style={Badge(isOk?C.green:isBad?C.red:isSel?C.blue:C.grayL)}>
                    {isOk?"✓":isBad?"✗":l}
                  </span>
                  <span style={{fontFamily:o.includes('{')?"'JetBrains Mono','Noto Sans JP',monospace":"inherit",fontSize:o.includes('{')?13:14}}>
                    {o.replace(/^[A-D]\. /,"")}
                  </span>
                </button>
              );
            })}

            {!done?(
              <button style={{...Btn(C.green,C.white),opacity:sel.length?1:.4,marginTop:8}} onClick={submit} disabled={!sel.length}>
                解答する
              </button>
            ):(
              <>
                <div className="result-pop" style={{textAlign:"center",padding:"10px 0",fontSize:16,fontWeight:800,color:lastR?.ok?C.green:C.red}}>
                  {lastR?.ok?"✓ 正解！":"✗ 不正解"}
                  {!lastR?.ok&&<div style={{fontSize:12,fontWeight:500,color:C.gray,marginTop:4}}>正解: {cq.ans.join(", ")}</div>}
                </div>

                {showExp&&(
                  <div className="fade-in" style={{marginTop:8,padding:16,background:"#FAFBFA",borderRadius:12,border:`1px solid ${C.border}`,fontSize:13,lineHeight:1.85,color:C.gray}}>
                    <div style={{fontWeight:700,color:C.dark,marginBottom:8,fontSize:13}}>📖 解説</div>
                    {cq.exp.split("\n").map((line,i)=>{
                      const isAnsLine = cq.ans.some(a=>line.trim().startsWith(a+"."));
                      return <div key={i} style={{marginBottom:6,paddingLeft:isAnsLine?0:0,color:isAnsLine?C.dark:C.gray,fontWeight:isAnsLine?600:400}}>{line}</div>;
                    })}
                  </div>
                )}

                {isExam&&!showExp&&(
                  <button onClick={()=>setShowExp(true)} style={{background:"none",border:"none",width:"100%",fontSize:13,color:C.gray,cursor:"pointer",padding:"8px 0"}}>解説を表示 ▼</button>
                )}

                <button style={{...Btn(C.green,C.white),marginTop:12}} onClick={next}>
                  {qi<qs.length-1?"次の問題 →":"結果を見る 📊"}
                </button>
              </>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* ═══════════════ RESULT ═══════════════ */
  if(screen==="result"){
    const ok=res.filter(r=>r.ok).length, tot=res.length, r=tot?ok/tot:0;
    const pass=r>=.75;
    const dBr=DOMAINS.map(d=>{const dr=res.filter(x=>x.dom===d.id);return{...d,t:dr.length,c:dr.filter(x=>x.ok).length,r:dr.length?dr.filter(x=>x.ok).length/dr.length:null};}).filter(d=>d.t>0);
    const wrongQ=res.filter(x=>!x.ok).map(x=>x.id);

    return(
      <div style={W}>
        <div style={H}>
          <button onClick={()=>setScreen("home")} style={{background:"none",border:"none",fontSize:14,color:C.gray,cursor:"pointer",padding:"4px 0"}}>← ホーム</button>
          <div style={{fontSize:13,fontWeight:600,color:C.grayL}}>{isExam?"模擬試験結果":"学習結果"}</div>
          <div style={{width:48}}/>
        </div>
        <div style={S}>
          <div className="fade-in" style={{...Card,textAlign:"center",background:pass?C.greenP:C.redP,border:`2px solid ${pass?C.green:C.red}`}}>
            <Ring value={r} size={110} stroke={8} color={pass?C.green:C.red} bg={pass?"#B7DFCB":"#FECACA"}>
              <span style={{fontSize:28,fontWeight:800}}>{pct(ok,tot)}%</span>
            </Ring>
            <div style={{fontSize:22,fontWeight:800,marginTop:14,color:pass?C.green:C.red}}>
              {pass?"🎉 合格ライン到達！":"もう少し！"}
            </div>
            <div style={{fontSize:14,color:C.gray,marginTop:6}}>{ok} / {tot} 問正解</div>
            <div style={{fontSize:12,color:C.grayL,marginTop:2}}>合格ライン: 75%（{Math.ceil(tot*.75)}問）</div>
            {isExam&&<div style={{fontSize:12,color:C.grayL,marginTop:4}}>残り時間: {fmt(timer)}</div>}
          </div>

          {dBr.length>0&&(
            <>
              <div style={{fontSize:14,fontWeight:700,marginBottom:10}}>ドメイン別スコア</div>
              {dBr.map(d=>(
                <div key={d.id} style={{...CardS,display:"flex",alignItems:"center",gap:12}}>
                  <Ring value={d.r} size={42} stroke={3} color={d.r>=.75?C.green:C.red}>
                    <span style={{fontSize:10,fontWeight:700}}>{pct(d.c,d.t)}%</span>
                  </Ring>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600}}>{d.icon} {d.name}</div>
                    <div style={{fontSize:11,color:C.grayL}}>{d.c}/{d.t} 正解</div>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:d.r>=.75?C.green:C.red,background:d.r>=.75?C.greenP:C.redP,padding:"3px 8px",borderRadius:6}}>
                    {d.r>=.75?"OK":"要復習"}
                  </span>
                </div>
              ))}
            </>
          )}

          {wrongQ.length>0&&(
            <>
              <div style={{fontSize:14,fontWeight:700,marginTop:20,marginBottom:10}}>間違えた問題（{wrongQ.length}問）</div>
              {wrongQ.map(wid=>{
                const wq=ALL_Q.find(q=>q.id===wid);
                if(!wq)return null;
                return(
                  <div key={wid} style={{...CardS}}>
                    <div style={{display:"flex",gap:6,marginBottom:6}}>
                      <span style={Tag(C.redP,C.red)}>✗</span>
                      <span style={Tag(C.greenP,C.green)}>{wq.cat}</span>
                    </div>
                    <div style={{fontSize:12,lineHeight:1.7,color:C.gray}}>{wq.q.length>80?wq.q.slice(0,80)+"…":wq.q}</div>
                    <div style={{fontSize:11,color:C.green,fontWeight:600,marginTop:6}}>正解: {wq.ans.join(", ")}</div>
                  </div>
                );
              })}
            </>
          )}

          <div style={{marginTop:24,display:"flex",flexDirection:"column",gap:10}}>
            {wrongQ.length>0&&(
              <button style={Btn(C.white,C.green,`2px solid ${C.green}`)} onClick={()=>launchSet(wrongQ)}>
                🔄 間違えた{wrongQ.length}問を復習
              </button>
            )}
            <button style={Btn(C.green,C.white)} onClick={()=>{setMode("study");setScreen("setup");}}>
              📚 続けて学習する
            </button>
            <button style={Btn(C.white,C.gray,`1px solid ${C.border}`)} onClick={()=>setScreen("home")}>
              ホームに戻る
            </button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
