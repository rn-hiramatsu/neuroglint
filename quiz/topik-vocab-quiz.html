<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPIK I 単語模擬試験</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --main: #2D6A4F;
  --main-light: #3d8b6a;
  --main-dark: #1e4a37;
  --accent: #F4A261;
  --accent-light: #f6b882;
  --heading: #1F2937;
  --body: #6B7280;
  --bg-white: #FFFFFF;
  --bg-light: #F0F4F0;
  --correct: #2D6A4F;
  --wrong: #DC2626;
  --wrong-light: #FEE2E2;
  --correct-light: #D1FAE5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', 'Noto Sans KR', sans-serif;
  background: linear-gradient(180deg, var(--bg-white) 0%, var(--bg-light) 100%);
  min-height: 100vh;
  color: var(--heading);
}

.app {
  max-width: 640px;
  margin: 0 auto;
  padding: 24px 16px 80px;
  min-height: 100vh;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 32px;
}
.header .logo {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--main), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header h1 {
  font-size: 22px;
  font-weight: 900;
  color: var(--heading);
  line-height: 1.4;
}
.header .sub {
  font-size: 13px;
  color: var(--body);
  margin-top: 4px;
}

/* Start Screen */
.start-screen {
  text-align: center;
  padding: 40px 20px;
}
.start-screen .icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--main), var(--accent));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-size: 36px;
  box-shadow: 0 8px 32px rgba(45,106,79,0.25);
}
.start-screen p {
  color: var(--body);
  font-size: 14px;
  line-height: 1.8;
  margin-bottom: 32px;
}

.config-section {
  background: var(--bg-white);
  border: 1px solid #E5E7EB;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 24px;
  text-align: left;
}
.config-section h3 {
  font-size: 13px;
  font-weight: 700;
  color: var(--main);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.config-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.config-row:last-child { margin-bottom: 0; }
.config-label {
  width: 100%;
  font-size: 13px;
  color: var(--body);
  margin-bottom: 4px;
  font-weight: 500;
}
.chip {
  padding: 8px 16px;
  border-radius: 100px;
  border: 2px solid #E5E7EB;
  background: var(--bg-white);
  font-size: 13px;
  font-weight: 500;
  color: var(--body);
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.chip:hover {
  border-color: var(--main);
  color: var(--main);
}
.chip.active {
  border-color: var(--main);
  background: var(--main);
  color: white;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--main), var(--main-light));
  color: white;
  border: none;
  border-radius: 100px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  font-family: inherit;
  box-shadow: 0 4px 16px rgba(45,106,79,0.3);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(45,106,79,0.35);
}
.btn-primary:active { transform: translateY(0); }

/* Progress Bar */
.progress-area {
  margin-bottom: 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-info .count {
  font-size: 13px;
  font-weight: 700;
  color: var(--main);
}
.progress-info .score {
  font-size: 13px;
  color: var(--body);
}
.progress-info .score span {
  font-weight: 700;
  color: var(--correct);
}
.progress-info .score .wrong {
  color: var(--wrong);
}
.progress-bar {
  height: 6px;
  background: #E5E7EB;
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--main), var(--accent));
  border-radius: 100px;
  transition: width 0.4s ease;
}

/* Question Card */
.question-card {
  background: var(--bg-white);
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  overflow: hidden;
  margin-bottom: 20px;
  animation: slideUp 0.35s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.question-type-bar {
  padding: 10px 24px;
  background: var(--bg-light);
  font-size: 12px;
  font-weight: 700;
  color: var(--main);
  letter-spacing: 1px;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.question-type-bar .timer {
  font-size: 12px;
  color: var(--body);
  font-weight: 500;
}
.question-body {
  padding: 32px 24px;
  text-align: center;
}
.question-word {
  font-size: 40px;
  font-weight: 700;
  color: var(--heading);
  margin-bottom: 6px;
  font-family: 'Noto Sans KR', sans-serif;
  line-height: 1.3;
}
.question-hint {
  font-size: 13px;
  color: var(--body);
}

/* Options */
.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}
.option-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 16px 20px;
  background: var(--bg-white);
  border: 2px solid #E5E7EB;
  border-radius: 14px;
  font-size: 15px;
  color: var(--heading);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-family: inherit;
  line-height: 1.4;
}
.option-btn:hover:not(.disabled) {
  border-color: var(--main);
  background: var(--bg-light);
}
.option-btn .num {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--bg-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  color: var(--body);
  flex-shrink: 0;
  transition: all 0.2s;
}
.option-btn.correct {
  border-color: var(--correct);
  background: var(--correct-light);
}
.option-btn.correct .num {
  background: var(--correct);
  color: white;
}
.option-btn.wrong {
  border-color: var(--wrong);
  background: var(--wrong-light);
}
.option-btn.wrong .num {
  background: var(--wrong);
  color: white;
}
.option-btn.disabled {
  cursor: default;
  opacity: 0.5;
}
.option-btn.disabled.correct {
  opacity: 1;
}

/* Feedback */
.feedback {
  text-align: center;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 16px;
  font-size: 14px;
  font-weight: 500;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}
.feedback.correct {
  background: var(--correct-light);
  color: var(--correct);
}
.feedback.wrong {
  background: var(--wrong-light);
  color: var(--wrong);
}

.btn-next {
  width: 100%;
  padding: 14px;
  background: var(--heading);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-next:hover {
  background: #374151;
}

/* Results Screen */
.results {
  text-align: center;
  animation: slideUp 0.4s ease;
}
.results-circle-wrap {
  margin: 24px auto;
  position: relative;
  width: 180px;
  height: 180px;
}
.results-circle-wrap svg {
  transform: rotate(-90deg);
}
.results-circle-bg {
  fill: none;
  stroke: #E5E7EB;
  stroke-width: 10;
}
.results-circle-fill {
  fill: none;
  stroke: url(#grad);
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}
.results-score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.results-score-text .pct {
  font-size: 42px;
  font-weight: 900;
  color: var(--heading);
}
.results-score-text .label {
  font-size: 12px;
  color: var(--body);
}

.results-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin: 24px 0;
}
.stat-card {
  background: var(--bg-white);
  border: 1px solid #E5E7EB;
  border-radius: 14px;
  padding: 16px 8px;
}
.stat-card .val {
  font-size: 24px;
  font-weight: 900;
}
.stat-card .lbl {
  font-size: 11px;
  color: var(--body);
  margin-top: 4px;
}
.stat-card.green .val { color: var(--correct); }
.stat-card.red .val { color: var(--wrong); }
.stat-card.orange .val { color: var(--accent); }

.wrong-list {
  background: var(--bg-white);
  border: 1px solid #E5E7EB;
  border-radius: 16px;
  margin: 24px 0;
  overflow: hidden;
  text-align: left;
}
.wrong-list-header {
  padding: 14px 20px;
  background: var(--wrong-light);
  font-size: 13px;
  font-weight: 700;
  color: var(--wrong);
}
.wrong-list-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid #F3F4F6;
  font-size: 14px;
}
.wrong-list-item:last-child { border-bottom: none; }
.wrong-list-item .kr {
  font-weight: 700;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 16px;
}
.wrong-list-item .jp {
  color: var(--body);
}

.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}
.btn-group .btn-primary { flex: 1; justify-content: center; }
.btn-outline {
  flex: 1;
  padding: 14px;
  background: transparent;
  color: var(--main);
  border: 2px solid var(--main);
  border-radius: 100px;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-outline:hover {
  background: var(--bg-light);
}

.hidden { display: none !important; }

/* Keyboard shortcut hint */
.shortcut-hint {
  font-size: 11px;
  color: #9CA3AF;
  text-align: center;
  margin-top: 12px;
}

/* Responsive */
@media (max-width: 480px) {
  .question-word { font-size: 32px; }
  .results-stats { gap: 8px; }
  .btn-group { flex-direction: column; }
}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Start Screen -->
  <div id="startScreen" class="start-screen">
    <div class="header">
      <h1>TOPIK I 単語模擬試験</h1>
      <p class="sub">한국어능력시험 初級 1,671語</p>
    </div>

    <div class="start-screen .icon" style="display:flex;justify-content:center;margin-bottom:24px;">
      <div class="icon">📝</div>
    </div>

    <p>TOPIK I（初級）の頻出単語から出題します。<br>韓国語→日本語、日本語→韓国語の両方向で<br>しっかり語彙力をチェックしましょう。</p>

    <div class="config-section">
      <h3>出題数</h3>
      <div class="config-row">
        <button class="chip" data-count="10">10問</button>
        <button class="chip active" data-count="20">20問</button>
        <button class="chip" data-count="30">30問</button>
        <button class="chip" data-count="50">50問</button>
      </div>
    </div>

    <div class="config-section">
      <h3>出題形式</h3>
      <div class="config-row">
        <button class="chip active" data-mode="mixed">ミックス</button>
        <button class="chip" data-mode="kr2jp">韓→日</button>
        <button class="chip" data-mode="jp2kr">日→韓</button>
      </div>
    </div>

    <div class="config-section">
      <h3>出題範囲</h3>
      <div class="config-row">
        <button class="chip active" data-range="all">全範囲</button>
        <button class="chip" data-range="1-500">1〜500</button>
        <button class="chip" data-range="501-1000">501〜1000</button>
        <button class="chip" data-range="1001-1671">1001〜1671</button>
      </div>
    </div>

    <button class="btn-primary" id="startBtn">試験を開始する →</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quizScreen" class="hidden">
    <div class="header">
      <h1>TOPIK I 単語模擬試験</h1>
    </div>

    <div class="progress-area">
      <div class="progress-info">
        <span class="count" id="qCount">1 / 20</span>
        <span class="score"><span id="correctCount">0</span>正解 / <span class="wrong" id="wrongCount">0</span>不正解</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <div class="question-card" id="questionCard">
      <div class="question-type-bar">
        <span id="qTypeLabel">韓国語 → 日本語</span>
      </div>
      <div class="question-body">
        <div class="question-word" id="qWord">가게</div>
        <div class="question-hint" id="qHint"></div>
      </div>
    </div>

    <div class="options" id="optionsArea"></div>

    <div class="feedback hidden" id="feedback"></div>
    <button class="btn-next hidden" id="nextBtn">次の問題 →</button>
    <div class="shortcut-hint" id="shortcutHint">キー 1〜4 で選択 ・ Enter/Space で次へ</div>
  </div>

  <!-- Results Screen -->
  <div id="resultsScreen" class="hidden results">
    <div class="header">
      <h1>試験結果</h1>
    </div>

    <div class="results-circle-wrap">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#2D6A4F"/>
            <stop offset="100%" style="stop-color:#F4A261"/>
          </linearGradient>
        </defs>
        <circle class="results-circle-bg" cx="90" cy="90" r="78"/>
        <circle class="results-circle-fill" id="scoreCircle" cx="90" cy="90" r="78"
          stroke-dasharray="490" stroke-dashoffset="490"/>
      </svg>
      <div class="results-score-text">
        <div class="pct" id="scorePct">0%</div>
        <div class="label">正答率</div>
      </div>
    </div>

    <div class="results-stats">
      <div class="stat-card green">
        <div class="val" id="rCorrect">0</div>
        <div class="lbl">正解</div>
      </div>
      <div class="stat-card red">
        <div class="val" id="rWrong">0</div>
        <div class="lbl">不正解</div>
      </div>
      <div class="stat-card orange">
        <div class="val" id="rTotal">0</div>
        <div class="lbl">出題数</div>
      </div>
    </div>

    <div class="wrong-list hidden" id="wrongList">
      <div class="wrong-list-header">間違えた単語</div>
      <div id="wrongListBody"></div>
    </div>

    <div class="btn-group">
      <button class="btn-outline" id="retryWrongBtn">間違いだけ復習</button>
      <button class="btn-primary" id="restartBtn">もう一度 →</button>
    </div>
  </div>

</div>

// ======== App State ========
let state = {
  questionCount: 20,
  mode: 'mixed', // kr2jp, jp2kr, mixed
  range: 'all',
  questions: [],
  currentQ: 0,
  correct: 0,
  wrong: 0,
  answered: false,
  wrongItems: [],
  retryMode: false
};

// ======== Helpers ========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getRangeVocab() {
  if (state.range === 'all') return VOCAB;
  const [s, e] = state.range.split('-').map(Number);
  return VOCAB.slice(s - 1, e);
}

function generateQuestions(sourceVocab) {
  const pool = sourceVocab || getRangeVocab();
  const selected = shuffle(pool).slice(0, state.questionCount);
  return selected.map((item, idx) => {
    let type;
    if (state.mode === 'kr2jp') type = 'kr2jp';
    else if (state.mode === 'jp2kr') type = 'jp2kr';
    else type = Math.random() > 0.5 ? 'kr2jp' : 'jp2kr';

    // Pick 3 wrong answers from pool
    const wrongPool = pool.filter(w => w[0] !== item[0]);
    const wrongChoices = shuffle(wrongPool).slice(0, 3);

    let options;
    if (type === 'kr2jp') {
      options = shuffle([
        { text: item[1], correct: true },
        ...wrongChoices.map(w => ({ text: w[1], correct: false }))
      ]);
    } else {
      options = shuffle([
        { text: item[0], correct: true },
        ...wrongChoices.map(w => ({ text: w[0], correct: false }))
      ]);
    }

    return { kr: item[0], jp: item[1], type, options };
  });
}

// ======== DOM ========
const $ = id => document.getElementById(id);

// Config chips
document.querySelectorAll('[data-count]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-count]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.questionCount = parseInt(btn.dataset.count);
  });
});
document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
  });
});
document.querySelectorAll('[data-range]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-range]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.range = btn.dataset.range;
  });
});

// Start
$('startBtn').addEventListener('click', () => startQuiz());

function startQuiz(sourceVocab) {
  state.currentQ = 0;
  state.correct = 0;
  state.wrong = 0;
  state.answered = false;
  state.wrongItems = [];
  state.questions = generateQuestions(sourceVocab);
  $('startScreen').classList.add('hidden');
  $('resultsScreen').classList.add('hidden');
  $('quizScreen').classList.remove('hidden');
  renderQuestion();
}

function renderQuestion() {
  const q = state.questions[state.currentQ];
  state.answered = false;

  $('qCount').textContent = `${state.currentQ + 1} / ${state.questions.length}`;
  $('correctCount').textContent = state.correct;
  $('wrongCount').textContent = state.wrong;
  $('progressFill').style.width = `${((state.currentQ) / state.questions.length) * 100}%`;

  $('qTypeLabel').textContent = q.type === 'kr2jp' ? '韓国語 → 日本語' : '日本語 → 韓国語';
  $('qWord').textContent = q.type === 'kr2jp' ? q.kr : q.jp;
  $('qWord').style.fontFamily = q.type === 'kr2jp' ? "'Noto Sans KR', sans-serif" : "'Noto Sans JP', sans-serif";
  $('qHint').textContent = q.type === 'kr2jp' ? '日本語の意味を選んでください' : '韓国語を選んでください';

  // Re-trigger animation
  const card = $('questionCard');
  card.style.animation = 'none';
  card.offsetHeight;
  card.style.animation = '';

  const optionsHTML = q.options.map((opt, i) => `
    <button class="option-btn" data-idx="${i}">
      <span class="num">${i + 1}</span>
      <span>${opt.text}</span>
    </button>
  `).join('');
  $('optionsArea').innerHTML = optionsHTML;

  // Add click listeners
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.idx)));
  });

  $('feedback').classList.add('hidden');
  $('nextBtn').classList.add('hidden');
  $('shortcutHint').style.opacity = '1';
}

function handleAnswer(idx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.currentQ];
  const isCorrect = q.options[idx].correct;

  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    btn.classList.add('disabled');
    if (q.options[i].correct) btn.classList.add('correct');
    if (i === idx && !isCorrect) btn.classList.add('wrong');
  });

  const fb = $('feedback');
  if (isCorrect) {
    state.correct++;
    fb.className = 'feedback correct';
    fb.innerHTML = `⭕ 正解！ <strong>${q.kr}</strong> = ${q.jp}`;
  } else {
    state.wrong++;
    state.wrongItems.push([q.kr, q.jp]);
    fb.className = 'feedback wrong';
    fb.innerHTML = `❌ 不正解… <strong>${q.kr}</strong> = ${q.jp}`;
  }
  fb.classList.remove('hidden');

  $('correctCount').textContent = state.correct;
  $('wrongCount').textContent = state.wrong;

  $('nextBtn').classList.remove('hidden');
  $('nextBtn').textContent = state.currentQ < state.questions.length - 1 ? '次の問題 →' : '結果を見る →';
  $('shortcutHint').style.opacity = '0.5';
}

$('nextBtn').addEventListener('click', nextQuestion);

function nextQuestion() {
  if (!state.answered) return;
  state.currentQ++;
  if (state.currentQ >= state.questions.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

function showResults() {
  $('quizScreen').classList.add('hidden');
  $('resultsScreen').classList.remove('hidden');

  const total = state.questions.length;
  const pct = Math.round((state.correct / total) * 100);

  $('scorePct').textContent = pct + '%';
  $('rCorrect').textContent = state.correct;
  $('rWrong').textContent = state.wrong;
  $('rTotal').textContent = total;

  // Animate circle
  const circle = $('scoreCircle');
  const circumference = 2 * Math.PI * 78;
  circle.style.strokeDasharray = circumference;
  circle.style.strokeDashoffset = circumference;
  setTimeout(() => {
    circle.style.strokeDashoffset = circumference - (circumference * pct / 100);
  }, 100);

  // Wrong list
  const wl = $('wrongList');
  const wlb = $('wrongListBody');
  if (state.wrongItems.length > 0) {
    wl.classList.remove('hidden');
    wlb.innerHTML = state.wrongItems.map(([kr, jp]) =>
      `<div class="wrong-list-item"><span class="kr">${kr}</span><span class="jp">${jp}</span></div>`
    ).join('');
    $('retryWrongBtn').classList.remove('hidden');
  } else {
    wl.classList.add('hidden');
    $('retryWrongBtn').classList.add('hidden');
  }
}

$('restartBtn').addEventListener('click', () => {
  $('resultsScreen').classList.add('hidden');
  $('startScreen').classList.remove('hidden');
});

$('retryWrongBtn').addEventListener('click', () => {
  if (state.wrongItems.length === 0) return;
  state.questionCount = state.wrongItems.length;
  const wrongVocab = state.wrongItems.map(([kr, jp]) => [kr, jp]);
  startQuiz(wrongVocab);
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (!$('quizScreen').classList.contains('hidden')) {
    if (!state.answered && e.key >= '1' && e.key <= '4') {
      handleAnswer(parseInt(e.key) - 1);
    }
    if (state.answered && (e.key === 'Enter' || e.key === ' ')) {
      e.preventDefault();
      nextQuestion();
    }
  }
});
</script>
